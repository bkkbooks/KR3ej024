body:
  text: 丹波元胤跋二十卷元曾榮世撰見於焦竑國史經藉志余家舊藏鈔本僅八卷文理訛舛殆不可句弟茝庭嘗從朝鮮國醫方類聚中錄出成編余謂是書所載自其診視理療之法以至於平素鞠養保攝乳哺嬉戲諄二乎議之甚詳使懷抱中物免為朝菌夏蟲其幼幼之心可謂篤矣世榮又著有活幼心書楊仲叔序稱衡邑遭災連巨楝數千室俱煨爐其書板有好事者納諸池中而得無恙以為天心之使然良有以也乃若是書亦當神物擁護者不宜付於闕如之嘆矣後閱十餘年今秋七月叔父蒨園啟持竹洞後人人見友雪所藏足本而被借驚喜之餘速錄一通以傳家於是乎感世榮慈念之所存果不至湮滅而喜余前言之足以懲矣記其顛末如上文政庚辰孟冬二十有二日東都丹波元胤識於柳沜精盧
