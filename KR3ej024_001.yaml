body:
  text: 卷之一議明至理序竊聞形端表正周公測度之圭音基意到心明華氏扶持之旨處方議幼師傅至理為良憑藥活人學造精粹始妙純乎其道者惟籍專誠違乎其議者可行必用夫人知其難不知其所以難究其學未究其自然學言之難者莫過乎藥備曉其意參詳審察以盡其善然後可以知其難易之旨也僕世居江南叨參醫士極意開陳管見願彰海字同聲雖然利鈍從人畢竟因由有自所著是書悉議幼幼症候誠為學者奧覽一悟至理無問不通捨去褊隘之為體取洞明之見方行淺揭音氣宜探深淵杲通神聖以服衆情者豈不韙歟議明至理二十五篇議原本議曰古人有擇婦孕産之文荊公著昭教育子之法數篇利益萬世規模安得人人而尚之世有君子小人之別故當述陳利害明智審詳而已夫人立室安家求嗣必純納婦種子在賢旦德然而婦乃賢淑夫又質良生男不肖者有之非夫婦之失情人倫失序事有不備者良由公始不能善𦬆胚胎之氣妯娌不興矜顧護愛之理氣胎涵養宜在沖和沖和者同其天地之寬量應乎四時之運行妊娠之間懷育之次但常令孕婦樂以忘憂不作怖畏亦無恐懼飢食有常起居自若此乃以順其中而全其神以和其氣而益其脈是與調而助之扶而補之何患胎氣不安生子不偉所謂婦人之性自未鄙窄因由暴觸以動其氣氣動則傷血血傷則損脈脈損則胎氣不固胎氣不固其子何宜愛子者宜順保其胎氣調婦者宜勻和其血脈然後乃曰得其所哉況夫人生清淨與天地以同原性稟真常合陰陽而假質母懷精血成形夫抱氣神為子何由聰慧蓋為母性彌寬所以智能乃值父精廣愛亦有鄉相起自犁鋤乃是室家相從意同道合至誠禮貌怡然一婦一夫淳謹憨勤豈在多淫多欲雖由拙見亦有至理存乎中矣議通變議曰愚謂初生嬰孩至於童稚血氣柔弱疾病危虛夫疾之在急不可倉皇醫之欲安豈可減裂至於垣午則可行有其巔憸則防蹶醫學得中務令勝善良工進藥藥用在人通變為醫醫行存志志若通則醫不繁機能變則藥不紊音問亂也通變者為奇得志者為妙古云心通方學通愚曰志變作良醫僕輒著此書殊無文墨但實雖則嘍嘍嗦嗦其意乃欲使學者通變而已通者正理廣博觸受咸知變者實明根源開發胸臆若只按古調理今人處用平方飲食坐臥不問飢飽勞逸不使然其天時地利豈可不知犬吠雞鳴尤宜盡意春夏秋冬四時有正邪之令吐利驚疳五臟傳久暴之疾所謂可以進則進可以止則止猶甚堪行即行不堪行即轉轉其意用別當後議是謂通變之道聰慧之施謀機策略智度攻討此乃兵家之權殺罰為用審察詳辨診切視聽此乃醫家之業大隻一切所為皆由通變惟有活人用功過於兵法主治在乎通而知其變此乃良工用心規矩疑其變且智不通此乃庸夫用心操執常運其通而知其變見其症而知其病生死預決危困不戕斯乃上工之謂順逆相投利害相混何由而通何因而變斯乃下客之謂嗟乎幼孩易得候變我即因其症與候而變治之或輕或重而作我亦隨其輕與重而理之通變之道如是而已議難易議曰天地陰陽尚有盈虧世人陰陽自致順逆失其調度者邪正相干違其安和者患災相反小兒一科古人云有異於常者為難然長幼受疾自是不同所有難易之言者非謂陰陽勝伏非謂傳變差殊非謂脈氣參差非謂臟腑虛實是以述其症者悉謂之難違其候者總謂之易無以難症而妄之謂之易無以易候而妄謂之難難易之功不出至誠窮理盡性為得之矣原夫醫學師範性參古風是必臆記諸家明文旨歸要說更須端的審察輕重較量兒觀兒幼傳變又不可執殢於古意亦不可濫恃於常情搜羅盡善究竟周旋無一症一候留連於其間方可謂十舉十全之妙道者耶古人云心中了了指下難明小兒方脈指下易明心用了了其或不然悉關矇昧才有生疏前功俱喪思之掌幼童負利害不可自逞寸能何堪稱譽家傳三世之業未果彰名蓋由滅裂用醫倉皇太急故有得失鳴呼既無深思遠慮豈有廣見多聞若求僥幸之功必害平生之福迂哉淺見寧保無虞性命相投豈可視為容易症候未明萬毋勉強學者幸詳察之議參詳議曰調理嬰孩一科天下之難事也且古從今著載未詳其議世有質能之士未嘗廢業蓋此等方脈之術也然其參習至理妙無它焉所謂審察宛詳按考備既已實矣不為虛設夫苟瞑然取次應急相投致謬濫噫審者審契表裡察者察實陰陽究者究竟臟腑詳者詳悉標本按者按明虛實考者考較輕重推者推評前後備者備准端的入法千心十全保命口無泛語意無濫思脈無虛究藥無虛發凡有嬰兒先以視之為上聽聲為次察脈又為次旦嬰兒所受胎氣未充其色白其形萎其氣怯其聲濁得顱囟音蘆音信乃頂門也固實稍長不任變蒸既於變蒸不備則形體萎而不壯情性不舒疾病無特不有初生之兒所受胎氣充足其色紫其形緊其氣壯其聲清焉得顱囟虛曠稍長漸受變蒸既而變蒸淌足則體實形因情寬性緩疾病經年不仵凡為醫工專誠守業毋浪遊毋泛飲毋傲恣毋耽執用之則專專不以心浮泛遣之則穩令其絶疑執而從機行用以明機變奸而致執每依不可法則輕易設意無太過處性莫不及切須究竟毋太過不及凡遇臨危赴急看候一見使人愴然者勿可徇衆而說但如前八法明度而已若也視之為常聽之為妄視聽不專浮泛致亂虛作實冷作熱表為里壅為通如此倉皇安得不有疏謬今述總要須當致謹參詳乃謂成全日用善工者耶議專業議曰觀形看候察色聽聲宜究陰陽受於邪正皆由一氣生成之本一氣者先天應運造化鎡基稟賦不常故抱虛怯孩童作疾其在實實虛虛損益得中標本無恙過與不及以意逆之凡為醫工須知表裡復審盈虧不和則衆疾皆臨稍順則四大悉正世傳小方脈書八十餘家究竟症候良方妙劑不過五十然其傳變形容諸症該千述萬各顯其長不得不録是故醫家明理藥不繁勞乃知至妙廣博言章欲使學者通變而已太抵小兒得疾所受無過驚積冷熱療理不致散漫者乃為上工其候傳散斯為下客傳散者驚即作癇熱即成風積成痞癖虛作疳痢冷致吐瀉逆為嘔噦其症泛泛其醫䀮䀮若不尋其源流漸入江海愈遠愈深彌開彌大上士治之未萌不待傳變中士治之已行疾作它症下士治之縱橫或有得失盲者治之崢嶸無規法也用藥副之規矩行道從之精專嬰孩無隱疾之情藥餌有反功之嘆勿致矜哀乃招慶善矣議審究議曰幼幼方脈在乎參審推詳究竟盡善深明其理為得之矣不以意竟為務不以疑似為怯不以未用試功不以疏怠為向每一症無不審究古意及師授之因每一候無不察度準繩平善之理所見至良決定有路無可疑者方與投藥庶無勉強肆臆之為豈有傷大壞症之害或有之蓋其滅裂故也初生之兒審其胎氣少穩斷乳之子究其飲食傷脾離母之孩察其暑濕寒邪非角髫童覺其馳遂鬥力勞則傷氣動則傷神役則傷形飽即傷滯毋有四意醫工次焉若也順事致敬嬰孩何疾加之一曰調護謂調適其寒溫護令不受邪觸春不怯凍秋不乘涼夏知清冷冬覺溫煥二曰保持謂保嬌情所欲撮所經任之意乳須及時食無過劑睡無令飫戲勿令飢坐臥起止惟母當知三曰撫育謂幼則順其嬌癡長則變其情忘撫之乃常存其神而知其體育之乃要其形而調其性四曰鞠養謂兒長成宜鞠問之毋令縱恣毋令忽暴毋令悖逆毋令頑慢四者窮理蓋性縱恣毋令忽暴毋令悖逆毋令頑慢四者窮理盡性可謂慈母之道凡兒初生之後出三日氣脈定已脫臍風之難過七日精神全方離鎖肚之害越百日腠理持不致咳嗽之危千日外胃氣正不瀉青黑之咎又亦有四焉一曰和愛二曰順敬三曰謹訓四曰寬責和愛者不恣兒男口腹順敬者不聽暴虐嬉戲謹訓者至誠禮貌相持寬責者忠怒丁寧舉喻若加鞭笞呵叱不惟驚恐怖畏此之用狠彼之亦愚若也父子相尚溫恭相順斯為善矣議同異議曰合之則同離之則異水火之設品物之聚皆有同異何可怪哉火之為煙所鬱則不明及其焰也由煙而明之水之為坎所壅則不流其湍也由坎以流之萬物有品橐出其境則異於常人事有尊卑合其道則異於衆幼幼抱疾不作傳變古今皆知言曰疳積吐利及其更也即作驚風痰熱未為怪異可以循其症候而療之稍或變常當審其輕重而理之茲則世醫務學莫執此端可否之意以盡其善殊不知疾作有同異之別其所受之常曰同所作不常曰異前件八症候中皆能傳之俗流不知其所以傳作即曰差異其實因差異所致當知所受在於傳變欲以暴急之間妄投丸散冷熱相互虛實相摧表裡相隘陰陽相反亂於百脈觸於五臟迫於經絡遏於榮衛是故本症遁作它疾所發不得其名所療不審其理攻劫無端幸全性命即其所受乃謂怪異積症之中得疾差異甚多差異者是積等證候所治不當而傳反致勿謂詫異所受哉也疳氣之疾外候頗衆其候但於積病壞症而與調理疳氣亦然詢其源則應其端體其症則療其疾是以丸散不良陳疾病莫延久凡兒所受異疾蓋由失之明察苟或成人往往抱𮪄薦之疾者有矣議根本議曰夫人之生以氣血為根本人之命以安樂為壽元男即二八衛氣方正女即二七榮血方行天癸至時其氣與血始然父參年既未登即曰小兒然分形其名已載自幼至長久第言之今之世法男年十五女年十三乃通嫁娶其道雖不應古其理在乎通情情動乎中男破陽大早則傷其精氣女破陰大早則傷其經脈雖成胎孕含育必虧兒生傴僂變蒸不備體作侏儒又或男子過於八八女人過於七七産誕嬰孩何足為善又或陰盛陽虧陽盛陰虧又或女因胎寒服藥男以陰萎餌丹如此為後皆不足與議非正論也前賢著述評較調理未嘗與究其源遠見分短夭利害由斯復見男女長成疾抱虛勞相繼而死者人謂傳尸或曰有鬼所致或曰有蟲所作愚謂不然傳尸者傳受骨肉氣血之尸也乃是父精不足母氣虛羸而得之何更外有尸而可傳有鬼致昧有蟲為禍前件意義悉入其候雖則男女長大勿於勞瘵相承但稟賦受氣如花傷培似木敗植榮壯枯謝各由根本所致凡為人子無能自知況又恣妄於女年忽爾氣虛脈脫惟恨天命病家堅忿藥之不良無自責其根本不充所以然也
