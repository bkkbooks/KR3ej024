body:
  text: 卷之二議虛實議曰五行之為物各有輕重虛實得共之性生乎堪任之地資質自然固壯金之至堅隱生虛土質輕色淡火之至虛猛發堅木焰烈炎熾土有固陷水有盈涸本有岩石數十年之秀實者不得陽氣亦萎有之人之資質稟賦父精氣母血脈渾朴胞胎調攝鞠育凡兒變蒸之後其形可知是以顱囟未合筋骨柔弱顱囟青筋脈虛不榮顱囟常玩滑泄便便顱囟睡起風痰不止顱囟久冷吐利清青顱囟虛軟癲癇不免顱囟匾闊暴瀉易脫顱囟喎長風作即三顱囟連額驚風易得顱囟未完怕熱怯寒顱囟緩收怡氣不周顱囟動數神氣昏弱顱囟寬大受疾恐害顱囟者乃精神之門戶也關竅之橐籥也上下相貫百會相通七孔應透五臟所籍泥丸之宮魂魄之穴氣實則合氣虛即開良由長大不可不合醫者一見當知其可否用藥凡兒有顱囟未合受病沉重者慎勿將作尋常矧思究竟猶恐得共何況瞑傑妄投丸散此示嬰兒慮愚者有曰醫殺之說曷不謹歟議脈氣議曰天地造化萬物發萌之端其來有漸其根悉用其名則常其用則別夫人之種性所受胞胎含宏隱密生而未顯長而能知利鈍巧醇良狼戾者未奐言誨亦拙有自然之理血氣身體假質於父母痞泰苦樂稟賦於天地故天地生我以資質相識旦仁義在我以古朴淳素壽夭貧富分之以時賢愚貴賤委之以命惟心惟性乃忠乃神通違智慧之者不可得而言之漸矣其所言漸者久矣知乎微妙之道寄乎清淨之室微妙之道乃心脈之所生清淨之室系肺氣之所主初誕牙兒胃氣未全其脈方行於大極五臟之脈心為元首一月之內未有可挺雖形已具且脈氣方與天地同參血肉初共人事相奪真邪離合猶如混沌初分自此乃曰脈氣之漸矣其脈初行太始陰陽未諧自囟之下發際之前齊鋪三指但按其冷熱察其症候斯可謂脈氣之生漸且微也百日之外脈氣行之大初左右食指三節側看縷紋風氣隨所發作輕重攻擊而生至於五百七十四日之外行於大素於脈應動於息有數高骨之間一指分三部取之浮沉察之緩數可知冷熱虛實之理千日之外行之四方遊於五臟外應萑頰耳花準頭唇口眼目五色隱顯一氣盈虧相生則平而善相剋則凶而惡及其危困然後按之大沖大沖之脈在腳面曲陷之間其脈定吉凶休復應指順息則可尚𣫆指或逆散可謂絶矣幼幼脈氣分之有五深其究竟其次察之症候輕重審之表裡虛實然後可以議藥得不虛設醫工之良也試較優劣而後知之議投藥議曰水有淺涸而可深山有頽荒而可林地有傾陷而可固物有損益而可珍藥有貴賤人有尊卑心存至理追究弗迷然其貴賤長幼嬰孩所患疾病異端傳變異症者受氣稟賦資質厚薄故也由是根不固而體不備氣不充而志不寧貴者則驕多賤者則勞盛驕多即胚胎而得之勞盛乃孕育而招之凡兒氣受之不實或芘蔭之有餘月期過滿或看承之有虧所襲剛柔而然猶抱虛實而已從生成應有別假造亦無違察貴賤各體其根較長幼皆循其理凡療小兒非以一體之謂不可同常之見所言投藥者或用投之於簡的也投之久練純熱也投之窮研精粹也投之益後投之勝前良工用心之至是謂投藥之專若以重劑投於離乳小也或以峻藥投於貴峻調嚴緊藥直不可混淆而設造次而施合以通利者審問扶而下之當用益補者察詳按而調之孰謂恣妄之有耶所謂不可攻擊者曰虛曰幼曰嬌曰重不宜冒致者曰久曰閒不言所受曰冗用藥衆多曰競爭與攻擊復加之以母之情僻執殢也父之性急愚憨也子之意頑不服藥也病之候難傳遇壞證母之殢神父之遣祟如此人事曷可勉強而與勞心枉究哉不惟無補而反無思觀其病家情意相順禮識相傾看傾也功歸於我行著於先叩依先嘗所行是便信醫即愈重藥即痊用其湯劑得為之良者誠在彼此毋忽之之謂也議下藥議曰凡調理小兒須先觀視氣色察其症候其或氣色有不正者謂啼哭而致散亂即憑察紋診脈有不定者謂久睡即究症候其或症有壞候作變謂前人攻擊有傷氣血或傷臟腑即選良妙方藥以主之不及則無咎切不可大過若以意揣其疾盲投其藥深恐有乎得共古云醫者意也審思前賢載述妙用無虞之意文參詳父兄師長教誨指示取捨可否之意又裁度自己曾經療治輕重量度斟酌成全之意三者既備可謂𤜂者意也如此究竟無不盡善原夫醫家為用憑藥以活人所言下藥者臨機輻湊是也可以下即下當下不下其候少頃則過矣不當下而下其症反為它疾矣下藥之法慎勿躊躇若也思慮可否之間或反復再四則疑在中有疑切莫用藥須當預察無大過不及之議即而定已投之決效非止利下之謂下又非於投劑之謂下下者有先有後或先利而後補或先補而後利或先扶表次救里或先救里後解表如此者衆舉隅而言之用藥得其中輕重得其所是謂下藥毋恣意毋致緩毋倉皇毋競利毋勉強毋疑惑或得或失利害有之利則僥幸以全其功害則盡世不可言也凡為醫士用藥不可妄知不容無知不可執見毋徇衆見主醫裁藥明識俱見按脈對症心無虧弊道副自然以應上古聖意端的篇章君臣問答語言玄妙至道而已議行醫議曰醫之為字左七右八乃言表裡其下九晝乃云九道合之二十四以按二十四氣古人設意義理深奧垂象於天地之間以應人倫之道與其成人之夫為契論獨小兒氣脈微弱難以謂之醫蓋是七表八里未全故云調理愚曰不然曷不知其善用心者則奇妙純粹在其中矣茲說孰是經云醫者意也以意理之為得擾之為失得失之義於人禍福是以純粹之妙良工之能學者究備行則盡心可謂善術之道凡見脈不若議症議證不如識病識病爭如藥對小兒作疾多是無事歷家輕狂所以有乎得失如病人危薦但需其藥求速安愈醫者要須得中無有大過不及之害所謂𤜂之為功神聖工巧明其標本表裡陰陽參其盈虧經絡榮衛察平升降臟腑腸胃審其盛衰然後可以度其疾之輕重較其方之優劣行醫之功譬如簧弩發矢一視決中十全為工如此準繩可謂醫者意也若也覷睹僥幸勿謂醫之良工為福使之然也智者謂宜鑑戒二者不可偏有僕謂良魚福烏醫士者乃醇乎醇者耶議稟賦議曰夫人皆知胞胎成形産育具相約以十個月滿足而生究竟至理即有二百七十日為定論亙古自今豈相間說然而就中虛計一月應數大抵九九為上八八次之七七又次之人生稟賦天地二儀之氣會合三才之道各得其九三二十七即二百七十日為正血氣九充實精神固平為人具足相識智性俱通八八者三才各得其八三八二十四即二百四十日生血氣蔭之不及精神有虧為人拙謬鄙鈍智意忘遺七七者三才各得其七三七二十一即二百一十日所受胎氣不足為人狂愚無志惡劣狼戾故也其間或有大過不及之者皆共其正數大過即氣血蔭之有餘不足則氣血養之無逮夫人得中之道以為純粹陰陽得所剛柔兼濟氣血相和百脈相順所以生人心智益通精神俱備腑臟充實形體固壯醫者一觀嬰孩顱囟斯可知之未周之兒顱囟固合睛丸一作黑神清口方背厚骨粗臀滿臍深肚軟莖小卵大齒細發潤聲洪睡穩此乃受氣充足稟賦得中而益之一周三歲之間其囟尚大其顱虛曠額前作坑口闊神露胸高骨細臀削臍突發黃齒疏卵小莖大氣促聲硬皆由受氣不足怯弱得之驚悸易得智性難通父母愛惜良工必憂不以貧富貴賤之所生但賢者當以告之若也愚魯之人寧不投藥稍或藥刀不及反言醫殺之大凡初生孩子少具精神者良由夫婦之情未諧適心未綢繆且喜且驚神不和脫將來得其所宜樂則情濃動則情興懼則情思交則情極深契其意重美其心生男必溫生女必淑斯可知淳和之至如此是故醫家不可一概用藥宜斟酌輕重比附推詳度究可否不至恣妄反為虛設以成重害參審得失之議盡善盡美應機而已議辨理議曰古今天下同議者貧富貴賤是也所産男女自幼及長總曰小兒然幼幼有牙兒嬰兒孩兒長曰髫童兆童稚童殊不究竟富貴之同貧賤之辱二者人情間於中道混而言之蓋胞胎氣血之不同故以辨之貴者富者風化同途貧者賤者門列一等所以禮識相遠日用致差雖有少殊宜審其偏正妾之子有任愛之者度其親疏抱繼之子因人親生視之乃為一等矣中等常情之家禮識未虧日用得過者又有大過不及之議夫人之運神發性惟心不可役心役則氣耗氣耗則血衰血衰則虛自此始腎堂不寒而且憊心室不足而旦虛原夫精元假之為胚為胞為形為骸胎質藉之乃氣乃血乃乳乃脈貴富生子順養撫育之有餘貧賤生子調攝固愛之不足有餘者大過之謂不足者不及之謂也大過則傷之不節不及則復之共時不節共時皆生病疾寒暑冒之或表或里冷熱攻之或脾或胃所謂審度測源醫者必須知之貴富之子食之有傷於不精寒之有傷於大燠暑氣有傷於凡涼泉流有傷於水冷腸胃氣血柔而不剛使之然也貧賤生子食之有傷於不時寒之有傷於凍餒暑之有傷於煩躁脾胃有傷於濕膩水穀不分腸胃氣血壯而不堅使之然也父母不自貴受治稟氣虛謬況貴子懦弱者耶是故胎氣不足血脈蔭籍之有虧良由男方剛情興造次共即兒生之後牙嬰兒固同將護有平飢飽寒暑勞逸之不同又於變蒸之時有傷於氣血及至立行之時有傷於筋骨由是撫養之共情鞠育之不意調度之不宜將理之魚法故易得其病病易得虛虛易得壞壞易得失貴富之子疾之反是也未寒先衣未熱先涼未食先飽未至食時餘食過膈未眠先睡睡之恣晏食之過滿寒之重衾熱之就濕故易得𭼊𭼊之未虛強食令之虛脈氣未壞強藥為之壞學不究則不精甲不專則不妙矣若執之得法妄之為要殢乎丸散不良智者籲哉議料理議曰大凡人復處性愚魯用心狠戾者不可以學醫師不擇善禍難逃跡其或秉志怯率為性懦弱者亦不可以言藥素問有云人如舟也藥如水也水能濟舟亦能覆舟一丸一散對症盡善起活危困未足為奇一有共利壞症傷候且過在爾其智拙鈍非殢藥也學者讀預究其純粹施其精研克效斯時以副規矩不可得而述者醫之良工也夫醫之用藥將之用兵古人亦有言矣且如善醫明症良將得策藥能勝病卒能守城若也將無計策醫共證候病何以瘳城何以固今人皆知發藥殊不究竟表裡臟腑虛實冷熱經絡榮衛投之不當反為它害亦不可執用一方一藥且大𤜂局四味理中丸小柴胡湯之類皆大人藥劑所謂意到症見藥無不驗能者此理症候方藥諸家所載無不應效但究竟不到有乎得共盡由攻乎異端涉獵繁雜智性不專事在狂簡確實與言更請思之
