body:
  text: 卷之三議調理議曰醫與調理其意等差參詳虛實之宜究竟緩遠之理若明疾之輕重當察病之遠邇為其所患得變稍重症候稍逆直取其功而全其效者醫之良工可以扶持循症解利寬緩服藥次第瘳愈毋令加進剋日安蘇此乃善能調治譬如水流就下迸溜遲疾澄則自清深則自潤狹則自湍岸則自瀉洄渦漩伏灘瀨奔流者乃自然而然不可得使之然也脈氣之流行遇冷熱寒涼風溫燥濕亦由水之就坎也調理謂疾作尚未傳變氣行在乎怯弱膊變即循其法度怯弱即緩與扶持是以調謂守節理謂有序節者無太過不及序者已得其所宜然後謂之理無太過不及可以謂之調調者而有度知度而在於形容理者須可法正法而全於規矩譬之絲不及絡頭不得梳斯皆亂也絡之取其條直梳之析其通解無毫髮之遺有純復之慶者誠謂調理之工也夫苟以危而用急見愈而用緩者乃共度也斟酌權衡勿隘偏墜先約其輕重察其進退藥與病勢相參病與丸散相及醫自意設智與醫同藥與疾諧疾用藥等用之無忽何慮疾不瘳病不愈哉嗚呼學者理幼勿恃其自能執其偏見事有優長鬚預學問盡心而後已議傷憐議曰老矣見孫長大方子不惟驕恣之甚復加愛惜傷天不任用也睡思既濃猶令咀嚼火閣既暖猶令欲酌臥蓋重衾猶令衣著撫拍顧愛常衣裹作以手掌就衣服裹拍背引風疾指物言蟲驚因戲謔莫覷廟識心情閃爍危坐放手我笑渠惡欲令喜笑脅肋指鑿門非仕宦莫與扎腳年不及時莫常梳掠表裡無恙莫頻服藥戲謔之物不可恣樂刀劍凶具勿可與捉莫近猿猴傷志也莫抱鴉雀損眼也抱男觀書抱女觀作女工作也男方學行勿令綽略兒方學語勿令揮霍會坐莫久腰背卸卻行莫令早筋骨柔弱惡莫與顧善可與學順時調攝自然安樂雷鳴擊鼓莫與掩耳眠臥過時須令早起飲食飽飫須當戒止非時莫衣常食莫美羹蔬宜淡滋味膿屎夜莫停燈晝莫説鬼睡莫當風坐莫近水笑極與和哭極與喜智者當知撫育至理議食忌議曰溥天之下産育既同將護之因有所不同者貧富之謂歟然富與貴飲食臥具有益於兒母貧賤又何以言之古人有云病不服藥謂之中醫正如此説外護寒邪內節飲食審物順時何疾之有前云富與貴傷其大過貧與賤用所不及然不及之意乃與中醫之言得其所哉旦如變蒸之候數至其時溫熱有作令兒漸固舒展筋骨生長百脈和順經絡自然之理何必加藥凡兒漸長必漸飲食東西南北地産果瓜田種粳稻山有粟麥野有蕨筍魚有溪池木有清濁人之所生隨土地之所宜飲食亦隨其所有南人不堪食北物以面為膳以棗為蔬北人何可食南物以魚為菜以詹為飯詹城米近海啖之咸鹺居山食之野味北果多涼南果多熱東果多酸西果多澀豈宜多食五臟六腑強納疾病生焉凡小兒心之有病不可食鹹滷肺之有病不宜食焦若肝之有病不宜食辛辣脾之有病不宜食餿酸腎之有病不宜食甘甜蓋由助其它氣而害於我也蓮子雞頭能通心氣石榴余甘大澀腸胃乾柿煮蔗猶能益肺蒸藕炊豆於肝宜利五味唯棗五味子足脾家可意肺病忌食肥膩鵝鴨魚蝦漁鹽膻腥咸鹺之類脾病忌食生冷甘甜包氣之物謂饅頭包子餛飩鴨卵肚臟夾餅皆包氣之物心病忌食心血髓腎雞羊炙膊燴炒煎炸木肝病忌食肺頭肚豬雀油膩濕面應小兒不問有病無病並不可與食腰子及肚髓心血令患走馬疳候蔥韭薤蒜荽蕌亦不可與食令兒心氣壅結水竇不通三焦虛神情昏昧飛禽瓦雀不可與食令兒生瘡癬瘑疥煩躁遁悶鮭鯗蝦蟹鰻鱔螺螄螃蜆之類不可與食令兒腸胃不禁或泄或痢或通或閉食甜成疳食飽傷氣食冷成積食酸損智食苦耗神食鹹閉氣食肥生痰食辣傷肺食味淡薄臟腑清氣乃是愛其子惜其兒故與禁忌若也恣與飽飫重與滋味乃是惜而不愛憐之有傷以至丁奚餔露疾作無辜救療無門悔之不及育子之家當宜知之理宜戒之議責善議曰信夫執術為醫荷術至重其或輕舉有乎得共稍共其理如盲索途事致疏虞嗚呼斷不復續死不復生哀哀之誠誰為罹嘆當知醫家一門上古聖賢測天徵道詳氣四時逆順陰陽痞通表裡然後察之五臟六腑三焦百脈究竟標本盈虧參審絶生變動代謝榮枯流行注厥如此知義少契古風然有僥幸侮玩狂暴輕欺者衆矣僥幸者恃其時運以誇䙅侮玩者以道之亨通而慢易狂暴者不能務本以從師輕欺者肆意妄執以為是四者人事何掌博古窮經明心儘性者邪醫之務業其道有四不可遺其一焉行之惻憫施之喬惠存之周至受之平等惻憫者每務仁慈消惠者常加愛護周至者運用無虧平等者勿論高下如此推誠稍入醫學之道若也縱恣身心嬉遊妄作及其訪問臨時檢來以齊規矩斯乃自敗之端殃積於後野老數年江湖抱街活人親見同道谷有耽僻終不為良或好籠浪或貪傳奕或綱或釣或射或獵或謳或飲或歌或舞佞遊花衢狂穿抑陌或習弓弩或縱鞚韁或樂煙粉怪詞或悅風情可意此未用心不常僻性詭異濫禰醫士得無訴乎其實非詐其用以證凡百枉究總涉狂佞須知醫家者流遵九道聊伸鑑誡犯者貴已為幸志在前賢聖哲無時不習者方可謂良醫受道之職也杲能守之以道分之以安天地副焉神明欽焉議錢氏方議曰晉朝有醫工錢氏諱乙設方用藥明症識候直究竟嬰孩臟腑令熱表裡虛實傳變頓取其效正所謂醫孩童之意準繩法則之道如此後世欲以及其議者蓋闕如也往往誦錢君之書記錢君之藥錢君之意旨未之聞也愚詳其意徑且直其説徑旦鋭其方截而良其用功而速深違其要廣操其言萬世不可掩其妙四方皆可遵其説九八十一家者谷述精通莫若錢君智意克效究竟不勞再三亦無中道而廢門人閻公編集未具錢君心服想計恢洪純粹妙理希奇紙筆不可得而録者耶時有高見之士一悟錢君意旨𤜂之與藥規矩法度無以異錢君運乎中顯乎機而自然造化者莫之能語也良工妙用信乎野老之言毋曰管見後之學者盡心討論必有深著於胸次且德義於人揚名於後世之道不亦宜乎議王氏方議曰小兒方書世傳有三王氏東漢作方論二十篇今家寶是其或大同小異往往好事作德君子刊施濟衆就平增損者有之大抵其言有序自徵至著其旨有皈自隱至顯話括周遍事無繁述參以數十名家比較優劣始知先生藥用淳和方排繼續考之而取其切究之而效其疾斟酌升降以和為用其意在調理盡善之最也雖然後學之士治家之子檢閲投餌或有不當毋至差或致害其書故得家寶之稱夫良士用心妙理活人𤜂之與藥猶若權衡權衡者法之一端也參究均平考較實論循方以應脈有條而不紊王氏之書乃幼幼方脈之規模習小丸散豈可遁此如大人疾患有叔和脈訣考五行有珞緑子命書學六文有火珠卦文知貴賤有人倫風鑑相法如斯木術皆名家所集詳辨以為上首冠諸妙義得毋枉究雖然各有廣要篇章終不遠越而在總歸非曰訓童發蒙之謂垂老足欽至妙之道也已議張氏方議曰宋朝徽宗太子壽王聰慧幼時常發癇疾諸大名醫莫之安愈時有草澤醫士張渙挾盝貨藥于都下召之入內用藥即效官至翰林醫正張氏北人也留方五百有餘逐病敘説深參其要近傳於世目曰張氏妙選四方士夫樂而用之殊不知南人得病以北人處方自是道地相反意議不同所謂北人水氣多南人瘟疫盛地氣天時使之然也北人水氣盛盛則就濕濕即與燥之南人瘟疫盛盛即作熱熱宜發散更加燥熱之藥病熱傳作它症藥既不宜疾何能愈夫幼童陰陽稍偏表裡固同臟腑怯弱豈可以熱製冷以涼止燥其説症候可以循簡述論頗有優長然其方藥初使人疑之次復惑之或有不當必與悔之曰南人用北人方藥曷不知之學者參究盡善不必殢方如前有云意與醫同藥與疾諧方可投之若也據乎云云而用之者斯謂愚醫不無妄投其餌在乎得失須當審之宜其察之議幼幼新書議曰調理嬰孩小兒上古黃帝未有言著鬼史區云謂小兒受疾令是一門故不載入素問始自巫人顱囟經篇章三舉自後智者繼述本末世傳諸家之善經進詳要旨症準繩之者凡八十一家近世湖南潭州周宅廣收其文專入編集目曰幼幼新書四十册僅數十萬字排列名方似涉繁碎猶如元帥要退伏兵欲以一箭敗陳乃定太平彼時求選一夫善射急於百萬軍衆皆張弧矢以待比較優劣臨機對壘就敵之勢不可得而用之奇正退其潛伏猶豫再三乃非良將者耶臨時檢閲審較可否考其效驗正由渴而掘井鬥而鑄兵不亦晚乎學醫之士若不究竟胸次了了肘後簡往直截扶危之功若也取次緩慢智意不逮倣徨之久出不得已肆意而設自不知慚而且愧有如馬服子強戰無不孫子曰上兵伐謀可以比喻良醫用藥何異良將用兵醫無智則不可行將無謀則不道者猶犬馬之夫難與言其至理曷能以知其道若夫文武醫卜農工商貿行之以禮務之以本議其道者無不貫之矣執醫之士不明是道妄恣苟簡必有利害於其間斯乃何未之流溫恭無佞直節有規方乃謂醫流之士明道而見之違理聰而門之良由務學則開聰開須知議議知則專誠誠專乃通往往通則明道道明則任用以副自然所謂常山之蛇擊其中則首尾俱應醫之亦已處用得中無不應節斯乃謂明道之理如此宜乎究竟而已矣
