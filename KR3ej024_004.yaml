body:
  text: 卷之四議初生牙兒症候序觀夫男女以正夫婦遵乎德義合乎陰陽以運生成之理者順乎天地之性應乎四時之令榮衛流通潛虛得數是故胞胎含蓄血脈造化豈能遜乎玄元綱紀哉所以得其正數者愚魯之為能失其正數者富貴以為𠫗皆涵養各由本質故賦之有利鈍稟之有虛實賢哲明智庸野鄙陋皆共由之斯可知矣今之孕婦懷胎保以為常飲食不節起居不宜未誕之間勞役衆若男子視胎以為常恣其所欲任其所施頻授觸穢所以兒生之後百脈致虛三焦不順關竅不通榮衛不和者初生之間便作疾患怪異多端不可得而詳述今舉二十有六症候概而言之智者察之審其可否比附與之療理助其榮衛調順經絡得宜而已議初生牙兒症候二十六篇議呵缺議曰呵者即張口而又合之缺者謂神不足故名呵缺非是疾病初生牙兒多有此作不足怪訝錢氏有謂呵缺遁悶良由胎氣怯弱榮血不壯衛氣少順即不蔭心血不蔭心則神不守神不守則呵缺遁悶無他愧也古方有硃砂蜜法用煎人參湯調和飲之者不若定志丸五七粒麥門冬湯化開與服至妙也議伸舒議曰伸者突其胸堂展其氣脈舒者引其頭頸直其手足努而作之良久復作初生牙兒多有如此亦非病也良由母懷胎胞起坐不得寬展或將絹帛兜束肚皮或系襠褲勒縛大緊或臥已盤旋或睡不轉側是故偃傴胎囊氣失舒暢降生之後自然如此老傴知與𥳇揉未知調之百脈宜將五木湯浴之功效謂用桃李槐椰皂莢各取枝煎湯候溫與浴仍與觀音散少少與服效且妙矣議噴嚏議曰肺之氣壅腠理不通外感寒邪或已傷風關竅閉塞鬱郁於中及至噴嚏方有少解不能發散漸入胸堂逐生痰熱痰熱既有即加之咳嗽輕則氣促短急重則驚風搐搦搐搦之利若在初生尚云不可宜與消風散服之咳嗽宜與金沸草散人參羌活散二藥皆和且順雖則嫩弱服之無恙其劑溫純化痰利膈效之至矣議臍突議曰胎乃育形臍乃根本胎氣固則形體壯肚臍深則根命長受氣卒遺形萎臍突凡兒斷臍利益漸長漸深吻乳調和愈固愈實是血脈之相順致形體之相資初生之兒有熱在胸堂則頻頻伸引厄厄作聲努脹其氣抑入根本之中所以臍突腫赤虛大可畏無識之夫將謂斷臍不利而使之然者非也臍斷不盈尺一臘之內隨其根蒂自腐實者深之弱者淺之深淺之理以其稟賦得之此乃良由胎中母多驚悸或因食熱毒之物有作宜與大連翹飲子其熱自散其臍歸本不必以藥敷之恐毒傷入為害醫工當知之矣議夜啼議曰王氏舉水鏡先生雲天蒼蒼地王王小見夜啼疏客堂又云啼而不哭是煩哭而不啼是躁無辜賦云夜多啼而似祟凡初生兒日夜煩啼真如有祟或謂熱在心經藥與疏利或謂寒停臟腑與服溫暖醫者察而治之乃善也苦兒啼哭胸堂仰突首反張嘉燈者心經有熱宜疏利服三黃丸或洗心散加燈心麥門冬子良若兒啼哭頭低身曲眼閉肚緊者臟腑留寒宜與溫之胃風湯加黃耆煎效若不識燈候但以蟬蛻二七枚全者去大腳為末加硃砂一字蜜調吻立效議口生瘡議曰嬰孩口古生瘡乃心脾受熱流沫煩啼盛則不乳妙藥良方已載於後然牙兒吻乳之初口內生白煩躁駭人者莫知其由將謂神祟使之究竟其理母於未誕之月恣飲酣酗貪食肥膩熱毒胎氣所受其兒脫胎之後所襲熱毒之氣悉皆散出於表舌繫於心唇于于脾所言心脾熱是也欲以下其氣未可利臟腑但以吳茱萸末米醋調敷腳心移夜即愈藥性雖熱能引熱就下其功至良又有心肺熱者瘡潰頤顙初作數點胭脂紅漸散斑駁如丹加之身體有熱連翹飲主之但禁火氣余無恙矣議身體熱議曰嬰孩變蒸作熱按法應期三十二日方初變又三十二日乃作蒸所受相參有造化之令者脈氣得之煩助也其或大過不及所發變不應脈蒸不順時榮衛逆之流行臟腑失之安益胎氣蘊伏誕降傷和兒與母俱勞其神脈洪身總受其熱善調理者循其法度調而理之法以度之七日之內初生胃弱不必加餌少頃即愈法以父母各呵兒囟七遍父先咒之曰爾為吾兒順適其宜我精我氣受夭弗迷陰陽綱紀聖力扶持薄有違令隨呵愈之急急如律令母復呵咒之曰爾為吾子胎氣充汝我血我脈母艱母阻萬神唱生有福為主稍失調度隨呵而愈急急如律令次煎蔥白玄參湯或五木湯候溫浴立效議血眼議曰胎氣充足兒將分降胞囊已破先行清水其兒既誕血即送下緣由胞氣頗澀轉側差緩其血壓瘀眶皆遂致濺滲盛則灌注其睛不見瞳人輕則外胞赤腫上下爛眩若投涼藥必寒臟腑宜與服生熟地黃湯流行氣血或用杏仁二枚細嚼乳汁三五匙膩粉少許蒸熟以絹片包蘸頻點功效重盛者加黃連朴消最良議卵腫議曰外名膀胱內通腎臟一處承受三經所傳其外腎冷熱皆由心氣主之心經有熱熱入小腸或赤或白或淋或澀心經有寒寒流膀胱或祕或疝或腫或光凡兒初生兩個石子俱大光浮名曰卵腫一邊差大名曰偏墜蓋由驚氣所行傳受於中或母懷孕驚憂之氣不散胞胎之間兒亦受之所以生下便有卵腫外宜黑散敷之內用清心順之黑散者用黃連黃芩大黃黃柏等分燒留性為末豬膽汁同蜜調敷之立效清心以犀角地黃膏與服若有熱大連翹飲宿夜安定晨朝慶之議蛆瘡議曰初生牙兒至於長大三焦四體五臟九竅皆持全功不作瘡疾晉元因良婦善護胞胎不貪淫欲從已受胎至於降生更不交侵男女實幸其兒氣血相參榮衛相順臟腑自和皮膚自滑一見兒孩肌膚頭面斯可知之矣嗚呼為人起根成自一點不淨之物處母胎中漸敷形狀臨産之時真智相投以隨業力而生其有匹夫匹婦何以知其至理恣心合意即於臨産之月尚行房事以亂其氣以傷其脈以耗其神以敗其血兒生之後遍身痍潰滿頭瘡瘍精神不爽啼哭煩躁並是胎內所受以穢觸淨以邪於正賢士明公不言而唯愚魯鄙野豈可告哉謹書請鑑切幸聽之議鼻塞議曰凡兒稟賦胎氣充實三關九竅五臟六腑內外呼吸上下貫通流行百脈正順三焦者皆由所協無命自然之氣也凡産牙兒三朝五日六晨一臘忽然鼻塞吻乳不能開口呼吸者多是乳母安睡之時不知持上兒子鼻中出息吹著兒囟或以水浴洗用水溫冷不避風邪所以致兒鼻塞宜與通關膏敷之消風散服之或有驚悸作熱杜薄荷散與服通關膏用白殭蠶豬牙皂角荊芥香附子川芎細辛等分為末議耳聤耳議曰凡兒胎氣不充實關竅不通利蓋由稟賦不足胞養有虧臟傷腎經腎為根本水之一數也外應耳孔或云水入耳或曰乳汁入耳較之即非兒生氣脈根壯臟腑固實雖水及乳入耳必不此作自是氣不充脈不實使之然也兒無補腎之方但清心肺而已初生之兒而有作尤甚重也卒難療理用藥敷糝少愈愈而復發至於過周與服黃耆白茯苓人參白芍藥川當歸熟地黃甘草等分作湯劑以固其內內若固實不必摻傳亦自瘥愈摻方用壁上蜘蛛一枚瓦上火干坯子白礬腦子麝香各少許同研令勻雞羽引入自愈議便血議曰兒生七日之內大小便有血出者此由胎氣熱盛之所致也母食濃酒細面炙爆醃咸等流入心肺兒在胎內受之熱毒亦傳心肺且女子之臟其熱即入於心故小便有之男子之臟其熱即入於肺故大便有之血出淡淡有似坯水盛則其血加鮮凡遇有此不可它藥盡以生地黃根研取自然汁五七匙一二匙蜜半匙和勻溫溫與服移時安愈男皆效不請醫甘露飲宜莫與服不必地黃黃一無恙勿自忘投丸散徒咎矣
