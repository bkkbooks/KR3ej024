body:
  text: 卷之五議發癰議曰母患血熱兒在胎中受之其血亦熱母氣壅兒在胎中受之亦壅幼氣壅聚在經絡臟腑之間積滯不散毒氣相交內不通利即從外消外無能消其血與氣壅在一處多是生皆膂或脊督脈腫大如拳紅赤似血其兒本體是一塊腐血又加生塊壅毒卒未能消醫有何法若述之士全不勞苦以針矢尉柄取次攻之十不得一處敷用朴硝天南星川當歸秋芙蓉葉黃蜀葵花乳香木鱉無名異其壅已熟即研白丁香少許津唾調敷緑豆大良久破潰膿血送出宜先與服手亡里排膿消毒散熱藥宜用生甘草栝萎根苦梗桔梗北枳櫝川當歸綿頭漏蘆錦紋大黃等分為末服一錢七煎熱與服以利為度克效萬一不可荒亂意欲速消以惡毒草藥致咎難保苦哉議撮口議曰兒患諸風疾傳入惡候至於撮口病致危急凡有腑風撮口胎風撮口鎖肚撮口吊腸撮口卵疝撮口應病悉入成風風入心脾俱能發作夫患在撮口者皆由結滯於中於及腸胃閉不得通氣不能化腹中滿脹肚上清筋撮口不乳證狀不急若不速與利不無因救療醫工若將撮口以為常則候傳入豈可投藥應患用以真珠天魔利之才通疾去氣和兒活用者敬信而已議合殼議曰胎受已滿産降必全盡一氣而包養開元竅以通連在乎十月之中形骸已具分免片時之內穀道無穿所緣兒在胎中七孔九竅若不通利如何四體百骸而能生長期由熱壅所致肺經之極結於肚口閉兒不通降生之後無腹滋潤乾燥之合若投寒涼之藥愈閉不通若不溫平之藥而又不通即是兒氣不順腸日月虛澀谷道乾燥閉合可畏方不詳載藥無驗速至於此等受須當以物透而通之金叉為上玉簪次之蘇合香丸內入孔中丸凡刺三寸許屎出為快也曾見肚門肉合小便通利大便至死無能通者愚鄙燒火筋刺之事出不得已既然肉合決無奇方試以金玉重力剌之尤勝火筋智者別有妙法請著其後以濟哀若宜哉又有初生胎熱一二日不通者與服洗心散以通為度四順飲加荊芥煎亦良議閉小便議曰小腸乃心之府也水竇流行隨其氣而利之心氣若壅小便不通心氣若冷小便多灑音謂灑斟稱也心氣若寒小便多旋心氣若熱小便艱澀心氣積熱小便白赤先赤而後白者是所言閉小便者依謂下結腹肚脹緊膨滿不通其結熱盛用力努旋點滴而出乃是閉不通利於心疼痛精神昏悸速用生大地龍數條蜜少許研敷莖卵仍燒蠶蛻紙灰留性硃砂腦子麝香同研煎麥門冬燈心湯調與胙移時見效議盤腸議曰氣和乃升降安樂之由也氣逆則壅結疾病之致也幼幼有患盤腸非暴所得元由氣鬱積久不散榮壅衛結五臟六腑無一舒暢其氣乘虛發作袞流上下築隘子腸胃之間有聲汩䈏連連而設如貓𥭕惡視之不忍何以所堪差乎一身四大無主又有吊腸一症寒氣壅結內不伸舒雖不引氣鼓動臟腑胸堂與臍上上吊促躬曲傴僂就忍疼痛二候既作駭醫驚衆然俱氣所患受發不同盤腸宜以勻氣散加沉香煎服之無不愈吊腸當用真珠丸加以沉香乳香煎釣滕湯送下微通即瘥然後更與調氣順助根本方佳勝也議咳嗽議曰咳嗽屬肺經所主肺主氣外屬皮毛腠理凡諸牙兒嬰兒日夜切與保持母令風吹腦囟背腠致使肺受寒邪咳嗽不已作熱多痰若被風吹即曰感受次弟傳之五臟虛處即任所入蓋初生兒氣微易得傳變良由頓動五臟有傷和氣五臟不和三焦不順故有傳變是以我生於一腎水也腎主虛邪生我在五脾土也脾主食吐逆虛痰四肢唇口我生於三肝木也肝主風癲癇眼目克我即二心火也心主驚恐悸頑涎血脈萑臉甚嗽傳受或吐逆或痰涎或厥冷或恐悸至眼目兩睢黑紫如被物傷成重發癇古人云久嗽成癇謂藥力不及候已傳過難可調理預當告之議哯乳議曰産婦血敗者當下榮者化乳血下不盡母致其疾乳有不調兒招其病凡兒吻其乳有不到於胸堂氣滯積隘或冷或餿故以哯出或問之無恙否曰不宜也久哯令兒神困力乏氣怯肌羸脾家若虛逐作癇疾及至成疾脾風定矣初生與周晬之兒胃氣未備穀食未登全藉吻乳怏如無恙自然臟腑充百脈順肌體壯神氣清幼幼失乳如人絶食食為根本資養性命豈可絶乎乳幼本只柔弱血氣輕微臟腑淺薄根基危脆豈可失乎乳之若失乖繆甚多乳之若絶性命難保其或母用性不順則氣血亂氣血亂則乳汁不和乳汁不和令兒哯逆宜其速與尞理若作尋常必致害生小沉香煎及鹽豉丸兼與服之當欽其驗乳母宜服藿香正氣散加枳朮至良議自汗議曰血不榮則神不備氣不衛則脈不充理其血用和其氣安其神用調其脈陰陽均平氣血相參百脈順流三焦五臟自然以益其體丸生至周晬之兒不可自汗自汗即亡陽亡陽即氣怯氣怯即脈虛脈虛即神散神散即驚風作驚風已作搐搦施為醫者失之究竟血不氣不衛作疾不輕為害必大禍生起於微人事何不察庸夫反笑之曰自汗豈能成風癇耶愚曰渠莫知其所以然者非我交也舉此一端虛以類之智者應有誚云觀其瀾而手肙犬其海知其未須明其本通變之士審乎得失是非不離乎中栽度疏謹而後已察禮幼自汗切勿止之方用白朮一分小麥一撮水煮令乾去麥為末煎黃耆湯調與服以愈為良若以止汗反為閉氣作熱煩躁所謂氣血相參則汗自止矣議自利議曰自汗不利者由血不榮虛於表也自利無汗者由氣不衛虛於裡也其或有自利亦自汗者榮衛俱虛也凡為其人止籍血榮氣衛扶育身體血既不榮又氣不衛裡外不相參上下不升降關竅不開通經絡不調適榮衛不循環臟腑不充求且醫工何以良餌則性命何以保持究竟在始醇全幸之良由水穀不分自利腸胸怯弱自利臟腑不和自利冷熱相制自利陰陽不調自利榮衛不順自利前件自利皆由氣虛得之初生幼幼忽爾自利者與順榮衛平調陰陽制其冷熱和其臟腑分其水穀生其胃氣則內外充實何泄利有作宜以參苓白朮散加以車前瞿麥薑棗同煎更量虛實加減議哭無聲議曰鍾鴻聲大闊遠流長形處胞胎之中受氣充足水火兼濟心腎不虧耳目兩竅相通大小二腸相佐所以發聲清響洪亮者根固本壯稟賦充實而自然之理也初生啼哭發聲不出厄厄而作鬱郁而為其或短靸上下氣不相乘醫與果訣云此由胎氣不足何更投藥假使成人父母不悅籲哉根本不壯何須藥餌如果木之萎水奚宜也古意速用父母呼呵及以蔥尉令聲發越雖然妙理奈緣目無根本産子育兒當知其義理哉議視無情議曰天地清朗萬物咸明一氣盈通三元克備人之受胎應數降生之後不以貧富其子皆致精神全氣脈壯視聽欣嬉取與喜怒周晬之間於人事情懷意旨憮叱以知其逆須方可謂兒孩性識之本也其或周晬已過不認名不猥親常常煞顏蹙容喎臉含啼東喚西向南呼北面其坐若木其臥若尸其行即蹶其立用棳筋骨氣脈柔怯虛弱食不辭飽渴不知飲若也長成慵蠢必有如此胎氣於數不足者難保千日良方妙劑不謂此設醫宜察之學宜究之議反身張目上竄議曰此等症候系驚風惡逆所發初生三五日之間便有舉目上竄將身反張然其非疾所作情實駭人凡醫工必作驚風療之其候非也萬一所由兒在胎中受母飲食熱毒之氣蘊在胸堂誕下三日之前宜與黃連去熱膩粉散毒古人預計利害其又與人參朱蜜湯皆清心肺積毒既化兒腹無恙若不如此所生個個反張上竄或有無作之者鄙婦不因食啖熱毒之物何可怪哉或投驚風涼藥亦愈但項明其所以用藥智者裁之萬一不由驚風所傳幸與詳悉議乳失時哺不節議曰物萌失之灌溉長必萎焦兒誕違之乳哺壯必怯弱大凡生成之理合乎中道者以應運化之宜也夫人失乎正禮者乃違玄元之數也凡兒在胎則和氣養之食不及乳乳飽即不食無致劑也雖食無乳禍害生焉是故乳不可失時食不可不節乳失時兒不病自衰食失節兒無疾自怯乳者壯其肌膚食者厚其腸胃所謂乳哺二周三歲則益其體今人未用奪其乳入月恣肥甘豈不致疾傷害熟為吁嗟
