body:
  text: 卷之六小兒形症訣歌初生牙兒一塊血也無形症也無脈有驚當知是胎驚有熱當知是胎熱三朝繃袍未知安七日一臘古來説臍風撮口老娘沙羊鎖肚清筋唇口撮又有因邪客忤兒不乳一宵神自脫只將妙藥保安康良久牙兒命得活若知難救命須臾嫌兒指甲兼唇黑女子初生小便血正是胎中受熱得男兒兩目閉不開或患丹瘡俱熱極目閉丹瘡消毒良血出須用生地黃又有初生便發延或將向火或加綿神情不穩目斜視強直反張深可憐醫人若作驚風錯但只涼心便安樂須宜以許地黃多更加些蜜神仙藥牙兒未周不識驚忌他聲響不安寧目內半周名襁褓驚熱須當順變蒸三十二日為一變六十四日為一蒸一十八次變蒸足方有脈自寸口生變蒸木足在面部左眼大陽陰右處眉稜上下俱是木準是中宮鎮星土耳間屬腎常土虛唇口兩笑脾所居面中萑臉屬心火惟有人中是肺都五行相生重卻輕若還相剋著工夫順候易理逆難療智不通兮性莫粗心主驚兮肺主氣肺主風兮脾主味胃家不得冷無虛吐瀉下止驚風至自古皆言心主驚五臟六腑有驚名心驚血散氣不復流入虛堂百病生肺驚吃水肺喘細乾嘔無時脾胃因腎候咬牙盰搐眼夜啼腸恐臉紅心五心熱是脾招悸面青下白膽生驚若在三焦終作渴或入膀胱卵痛聲脈指訣歌小兒食指辨三關男左女右一般看皆知初氣中風候末是命門易亦難要知虎口氣絞脈倒指看形分五色黃紅安樂五臟和紅紫依稀有損益紫青傷食氣虛煩青黑之時症候逆忽然紽黑在其間好手醫人心膽寒若也直上到風關粒米短長分兩端如槍沖射驚風至分作枝又有數般面反里順外為逆順逆交連病已難又頭長短猶可救如此醫人子細看男兒兩歲尚為嬰三歲四歲幼為名五六次第年少長七𪗦八齓漸論情九歲為黃十稚子有病開隔辨其因十一癇疾號癲風疳病還同勞病攻痞癖定為沉積候退他潮熱不相同初看掌心中有熱便知身體熱相從肚熱腳冷傷積實腳熱額熱是感風額冷腳熱驚所得瘡疹發來耳後紅小兒有積宜與塌傷寒三種解為宜食瀉之時須有積冷瀉須用與溫脾水瀉且與澀臟腑先將殢腸散與之孩兒無事忽大叫不是驚風是天吊大叫氣促長聲粗誤吃熱毒悶心竅急須吐下卻和脾若將驚藥真堪笑痢疾努氣眉頭皺不努不皺腸有風冷熱不調分赤白脫肚因毒熱相攻十二種痢何為惡禁口刮一作滑腸大不同孩兒有病不可下不熱自汗兼自瀉神困囟陷四肢冷乾嘔氣虛神怯怕吐蟲面白毛焦穗疳氣潮熱食不化鼻塞咳嗽及虛痰脈細腸鳴煩躁訝若將有積與疏通下了之時必生詫孩兒實熱下無妨面赤晴紅氣壯強脈大弦洪肚上熱胙腮喉痛尿如湯屎硬腹脹脅肋滿四肢浮腫夜啼長通體生瘡肚隱痛下之必愈世為良指下脈訣歌二三歲時看虎口更加中指按高骨浮即風生數主驚系是癩癇洪作熱沉細腹痛緩沉虛瀉痢多由此脈初微遲有積兼蟲盛遲牆元來胃脘迂四歲脈不在指端一指高骨按虛實五六袞轉尋三部平正關上為準則七八稍移指少許九十次第分位取十一十二也同看十四十五三指睹小兒有病脈不多先定浮沉遲數音朔數音所沉遲為陰浮數陽更看面部屬何方青色驚風白虛瀉赤生痰熱黑難當黃是脾家疳積作醫人審度療何方三脈五脈宜説凡看小兒初生至半晬之間有病即與看額前眉上髮際下以名中食三指輕手滿曲按之兒頭在左舉右手在右舉左手食指為上名指為下若三指俱熱感受寒邪鼻塞氣粗三指俱冷臟寒吐瀉若食中熱上熱下冷若名中指熱夾驚之候若食指熱胸堂不寬若名指熱乳食不和議曰半晬以上方可看虎口周晬以上看虎口兼一指脈若五百七十四日變蒸滿足只與看一指脈以食指袞轉分取三部凡言三部者非寸關赤系小兒三部面看氣色為一部虎口紋脈二部寸口一指脈三部五脈者上按額前下診大沖並前三部謂之五脈凡兒有患不屬惡候即不可與診大沖之脈其脈定生死之要會也其症候危惡故當診之不可看恐汙人情傷於不任用矣三關指紋要訣未關命門中關風候初關氣候流珠形主鬲熱三焦不和氣不調順飲食欲吐或瀉作熱或腸鳴自利煩躁啼哭環珠形主氣不和脾胃虛弱飲食傷滯心腹膨滿作熱夾食虛煩頓悶長珠形主夾積傷滯腹肚疼痛或有寒熱脅肋膨緊食不克化或蟲動不安來蛇形主中脘不和積氣攻刺飲食不下疳氣欲傳臟腑不寧膨滿乾噦去蛇卷形主脾虛冷積泄瀉或吐或渴煩躁氣粗喘息飲食不化神困多睡弓反里形脈內感受寒邪頭目昏重心神驚悸沉沉點點倦怠昏間四肢稍冷咳嗽多痰小便赤色弓反外形主痰熱心神不寧睡臥不穩作熱夾驚夾食風癇症候槍形主邪熱痰盛生風神情恍惚睡下安穩欲發搐搦驚風傳授魚骨形主驚風痰熱症候已定可以截風化痰利驚退熱不作諸惡候若已傳過必作它症水字形主驚積食積膈熱煩躁心神迷悶夜啼三焦不順痰延壅盛涎潮口噤潮加搐搦針形主心肺受熱熱極主風驚悸煩悶沉沉默默不食神困四肢垂嚲及驚風暴發痰延壅盛搐搦等候透關射指面主驚風痰熱四症皆聚停在胸膈不能散其候所受雖重症順則可療透關射甲主驚風惡候受驚傳入經絡風熱發生併入八候虛痰不下危急惡症難可療治指紋脈訣説脈有黃紅青紫黑色議曰黃色無形者即安樂脈也紅若無形亦安寧脈有前件形者即病之脈次第而變初作一點子氣關多紅脈至於風關其色方變紫色病已傳過青色已受之極黑色其病危急純黑分明不可療治三歲以上病重危急指甲口鼻多作黑色蓋兒脈絶神困症候惡逆雖有妙藥良方亦用孩童有命議指紋脈總要議曰消息指紋脈訣考詳諸家所載參較至理其説不同所以錢氏王氏二家文意並不該載但只言論其症候而已然而症候且幼幼之疾若不定其指端説病是何用意僕留心頗又其紋脈述之不繁猶參諸家之善前後所斷龜鑑較其正理醇孚醇故不勞再三乃訣定如此者挺然微妙曲全一家直指明智之士試更考之必有益諸形容毋曰管見可也詳解紋脈議曰流珠只一點子紅色環珠其形差火長珠其形圓長以上非謂圈子總皆紅脈貫氣之如此來蛇即是長珠散一頭大一頭尖去蛇亦如此乃分其上下故曰來去角弓反張其裡外向里為順向外為逆槍形直上魚骨分開水字即三脈並行針形即過關一二粒米許射甲命脈射外透指命脈曲里一十三位悉有輕重元由一氣自微至著從漸至總輕重參詳前云五色者曰黃紅紫青黑由其病盛色能加變又博加進即越黃紅之色紅盛作紫又有紅紫之色紫盛作青又有紫青之色青盛作黑又有青黑之色至於純黑之色者不可得而療治之也
