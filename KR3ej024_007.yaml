body:
  text: 卷之七小兒面部氣色並序夫天地有儀故稟賦生成相貌男女方質猶陰陽假合形軀五體之中面目彰乎氣色五臟之內神魂布以災祥形究真邪潛一氣而分部位脈推隱顯洞諸經以測源流克伏侵臨剛柔升降生我我生即凶中獲吉克他他克應順里招殃肝家無氣常宜腎水澄清謂有精神氣全肺准多光必懼臉萑火焰凡人有火色主災何況小兒唇紅作渴頰赤饒驚眉頭靄靄父母寧憂額上昏昏醫工少樂凡理嬰孩先看面部定氣察色最為要也良由內有疾而形於外是以本位與地位一體和悅易安氣色其神色交參病傳難療先求逆順次較盈虧交侵臨入不逃乎源危篤死生必知乎本輒述於上諸更推詳舉一隅以類衆隅請三索而還再索妙在智遠良用心通醫工善理所謂多智多謨藥效方書宜其廣知廣見深求決定取捨專誠良師致力不昧乎方學者行醫須盡其理至誠一一難以述之務學惟精得中為妙五臟五色本立心主紅脾主黃肺主白肝主青腎主黑五行相生金生水水生木木生火火生土土生金五行相剋金剋木木剋土土剋水水剋火火剋金五行本生相侵心氣侵黃脾氣侵白肺氣侵黑腎氣侵青肝氣侵紅五臟生本相臨心氣臨青脾氣臨紅肺氣臨黃腎氣臨白肝氣臨黑五臟勝伏相交白色交心黑色交脾青色交肺紅色交腎黃色交肝五臟受敵克入黑色入心青色入脾紅色入肺黃色入腎白色入肝五臟畏愛肺本辛金畏丁火愛己土腎本癸水畏己土愛辛金肝本乙木畏辛金愛癸水心本丁火畏癸水愛乙木脾本己土畏己木愛丁火五臟子母生成肺脾是母腎是子腎肺是母肝是子肝腎是母心是子心肝是母脾是子分定五位所屬顴面臉頰心火所屬氣池之下法令之傍食倉之上高骨取之一寸二分皆屬心之部位承漿之上人中之下法令之內食倉之傍其合即唇其開即口合即屬脾開即屬心四方二寸四分撮動之所皆脾之部位準頭至山根兩孔並中梁皆頭直下年上壽上裡外通息皆屬肺之部位耳花及輪廊文一山林頤髮際兼地名四維如海岸皆屬腎之部位風池與正眉氣池泡眥頭上下眨動處太陽及太陰連及山根所皆屬肝之部位天中與天庭司空及印堂額角方廣處有病定存亡青黑驚風惡體和滑澤光不可陷兼損純黑病難當青則甚憂急昏黯亦堪傷此是命門地醫人鮮較量五臟伏敵喜傷肺所伏者心所敵者肝所喜者辣所傷者焦苦二變七蒸之臟和則喜懼氣爽神清魄強疾主喘滿咳嗽傷風作熱虛痰壅盛腎所伏者脾所敵者心所喜者咸所傷者甘甜五變十蒸之臟和主行坐嬉戲笑語疾主崩砂黑齒截齒咬牙停耳膿汁肝所伏者肺所敵者脾所喜者酸所傷者辛辣初變六蒸之臟和則魂神壯意智生疾主風孿搐搦眼目腫赤疼痛心所伏者腎所敵者肺所喜者苦所傷者鹹鹵三變八蒸之臟和則情性悅樂疾主驚癇恐悸虛躁啼叫譫語狂煩涎流口角脾所伏者肝所敵者腎所喜者甜所傷者酸釅四變九蒸之臟和則消穀氣美飲食疾主嘔噦疳積虛痢痞癖潮熱不思乳食面部氣色總現五位總作流波泛澱隔窗照藍青色者驚積不散欲發風候其神彩觀覷不穩上上下下症變風生此首一字闕字五位總作閃爍焰射丹爐映火紅色者痰積壅盛驚悸增進其神彩視物不定恍恍惚惚候變驚速五位總作混袞泥漿衣傳土牆黃色者食積症傷欲作疳候或痞癖有之其神看顧散漫昏昏沉沉其候寒熱潮發飲食不掀氣粗短滿困倦喜睡嘔噦有之瀉痢有之五位總作濈濈浮虛野露入谷白色者肺氣不利大腸滑泄水穀不分欲作吐利其眸疑濁失其精神朦朦朧朧性情不有光滑全無五臟少實百脈多虛或吐利之後有類調補五位總作漫漫黯黯塵灰彌覆黑色者傳不順症變即逆候表裡有虧臟腑欲絶其血不榮其氣不衛榮衛失序經絡流注凝滯於脈為疾危惡其神昏冒沉沉默默者為人不久也五位分部定位肺部所主鼻孔名並灶尖處名準頭眼尾名大小眥中央坎𥲊名山根若鼻孔黑如煤即肺經焦或作黑燥如墨者即肺家絶其候難治鼻中赤癢疳盛蛔長或瀉白涕腦寒困寐或流清涕傷風喜睡肺熱鼻塞因息吹得有妨吻乳關竅閉阻感風寒邪熱亦如此鼻下生瘡潰爛即疳鼻中常臭積熱為咎腎部所主耳穴之前名曰耳花耳墜各輪輪里名廊輪廊焦黑腎家虛熱其黑如炭腎絶死旦耳門生瘡衛積非常耳中膿出腎熱疳極臭名聤耳膿汁不止瘡癢如烈其候虛熱忽聽不聰心腎氣壅常作關關熱氣上攻或如蟲刮榮虛衛熱耳輪如冰麻豆相侵耳輪紅熱傷寒是則熱極內痛腫氣相攻清心涼膈關竅通塞兒孩兩腎常虛無病若有攻擊使令無益肝部所主眼睛有穴內藏其神外究五輪𥲑眩屬脾熱即生眵兩眥屬心熱痛如針勾屬肺家熱赤生砂黃屬肝臟昏瞀翳障中心瞳人腎熱不明兒孩眼目痛即便哭良方對治更與忌毒或患丹瘡從里為殃經效良藥速療無妨眼本屬肝怕熱怯寒令有治法拯理何難眼忽連眨驚風交雜忽然竄視驚風已至肝絶定睛或翻無神瞳去中陷十無一生脾部所主唇即口門語言之尊舌居其中飲食之宗齒牙咀嚼咽喉相約牙質既剛角宮羽商嬰孩未定唇口見病上即人中下乃承漿上下四方皆屬脾鄉口內屬心心脾有熱舌瘡唇裂三焦蘊熱唇紅如血淶紅重渴輕即流沫鵝口慕口木舌色可以布設未兆之功可以預防也
