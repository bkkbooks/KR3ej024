body:
  text: 卷之八病症疑難序觀夫泰岱奚曲纍工混沌名山川源取次湍流盤旋到海天地有自然之理至哲無造化之功醫究一門道通千聖小方脈者乃衆科出倫議論之要也凡為調理先裁可否之宜學習篇章首察艱難之屬誰知活人作德我敬醫道通仙陰陽昭然行功獲矣於戲得師奧旨未契全真識性悟機方為至妙前賢著護後學推誠已述淵源須窮確實持燈晦夜咨嗟擲植索途捧寶暉晨勇躍良工與鑑漢輒剖疑難事目聊陳管見因由一十八章幸希同志詎堪品藻非涉狂誣試詳淺陋之言必展恢洪之臆一隅再舉三復方欽病症疑難一十八篇一逆症似順議曰順逆有別陰陽不均症候相加色脈致亂惟是驚風發作按脈察症以較之陽候症脈俱得其陽陽者順也陰候症候俱得其陰陰者逆也陽候有陰脈者其症欲傳陰候得陽脈者其症反是也謂如急驚風乃是陽癇得脈浮數洪弦陽中之陽又有得脈沉緩陽中有陰慢驚風乃是陰癇得脈沉細遲弱陰中之陰又有得脈浮大陰中有陽所言逆症似順乃謂陰中有陽助陽不醒回陽不生其候偏虧雖則陰中有陽其陽非真脈使疑二不可攻理詳而知之察其可否而後已二陰症反陽議曰小兒傷寒惟察表裡而理之不以陰陽症候究竟者蓋無關前關後之脈所謂純陽之孩合而言之此說陰候者慢驚是也凡兒吐瀉疾作慢驚其候無反症良由急驚傳來已成陰癇藥用寒涼症入慢脾藥用燥熱其候反陽者反從陽也其脈愈盛其症愈逆故云反也陰陽俱壞實謂難治醫工不知其所以但見其搐搦肆意退熱截風良久卻不引搐但只合眼聚痰冥冥如播症候有如此何藥理之請試較之三陰盛強上聲陽議曰慢驚風候謂之陰盛又其欲絶之時虛痰上攻咽喉引氣呼吸粗大其脈浮數其症強湯得之醫工將謂陽回以得其所宜與下痰藥用太迅痰涎即時隨藥而下兒命即時隨藥而化衆言醫殺之愚曰非也謂渠無智不識症絶而用之雖不下藥亦死之矣四虛極生熱議曰疳候有作斯症初發即謂疳氣次第傳至疳極是謂虛極之候陰陽二氣不勻上下氣不升降榮衛兩虛臟腑滑泄豈可攻療善醫疳者隨順藥餌以助之淡薄飲食以扶之榮衛漸得均勻氣脈方得升降既而陰陽二氣已得調和臟腑已勻充實肌膚已自肥壯醫工已知疳傳在虛候名作疳極遂與補氣藥服之稍多反生大熱所謂虛極勿補熱盛煩渴疾作疳勞名曰丁奚皆由藥助虛極生熱而致之也五冷久必寒議曰症積已作症候所傳自是孩童飲食不化氣滯中脘再食停氣復傷前積積之為病皆致其冷冷之既久脾胃虛怯虛怯既存陰陽相勝寒熱間發痞癖有加脈氣無定醫工不理陰陽令其均平但作痎瘧治之或投砒或投粉膩粉也利下太速疾不去根為患反重難施和劑良由利動臟腑虛必入腹發作煩躁腹肚脹緊氣喘短促難以調治療理此等症候究心毋忽保全是幸六熱多作燥議曰熱分內外身藉陰陽一氣受邪三焦致熱三焦者本質無狀隱伏得名所通五臟六腑相干血脈皮毛溫平由實燥熱由虛靜則為之一名動則分之三所上焦喉管至臆中焦至於中脘下焦至於丹田以大拇指展中指作一握自咽喉坎處分作三停則知上中下三焦所寓也溫極即熱熱盛即燥燥盛即焦寄於其中矣大人患此猶尚不可況小兒三焦隱伏熱多作熱寒涼之藥所投不堪畢竟從長何劑調理若不早療疾作無辜七理實致虛議曰虛則作疾實亦是病按實理虛遣病去疾內知其冷熱外審其症候三實兩虛神不安居三虛兩實人有得夫虛之為病其候則速實之為病其候則緩實未致害虛即作禍迅矣肝心脾肺腎子母相生肺肝脾腎心五臟相剋且如脾胃經虛嘔噦不食又心氣不足驚悸有作所療子母俱虛小便閉澀利之可乎所以知其內者母虛靠子實子虛籍母榮其又肺家有熱宜瀉之否大腸滑利宜溫之可醫工但究母虛理其子實若攻其子則母亦虛所謂母能令子實子能令母虛脾病瀉心理實致虛矣八利表傷里議曰傷寒豆疹皆論表裡二義不同所受反是傷寒所傳從表入里豆疹所發自里出表作熱形症與傷寒頗似病家不究輕重所受相尚與服升麻葛根湯或過劑飲餌其表已解其汗不止汗出稍多里虛作渴且熱乘熱悉化疹豆自然回出所緣逐其熱利其表遍出雖多疹亦不成豆亦不是比此小赤自其熱力有限裡外不相續榮衛不加助即於中道而廢漸作黑陷非食毒感風之咎自是助發大過失其自然之理至死莫知其由是謂利表傷里故也使良方妙劑難以助平哀哉九退熱作渴議曰小兒發熱一症與大人同熱在三焦方渴肺驚下利虛煩方渴上盛下虛方渴水火不相濟方渴伏暑蘊熱方渴津液燥竭方渴渴症本無但有其熱熱在乎表攻動其裡裡自無熱受之以虛表熱傳裡反致其渴表裡俱虛引飲入脾頭面手足受濕虛浮作腫醫工下之從增其病宜與扶表救里庶幾有命方得獲幸疾症於此死者多矣十療驚發風議曰有痰者必有熱隨之有驚者必有風繼之利其驚其風豈有散其熱即痰不生此醫家者流所得其宜調理症候截風定搐以明其要也如此常見豪貴家才見孩童有熱不問原因便投驚藥日輒數粒月既積多雖則驚悸不作忪恐無妨其兒所服寒涼藥多脾胃虛弱不吐即瀉遂成慢風更與驚藥愈加其疾調理醫工當究其後免負其重禍害生焉十一風痰隱久議曰風者肝主之肝稍不和則風所由縱痰者脾受之脾若不壯則痰所曰盛痰之與風驚之與熱四症互馳則流行於經結之由傳變它疾所有風痰相襲久而不化隱在肝脾所由飲食冷熱相干故不自散雖則療理愈而復作以至長成且風痰常常在牙頰之間吐茹無盡生髮有因其風痰致病或作齁䶎或作喘息或硬牙關或腫頤頰臨於肺則咳嗽於乎心則恍惚善術醫士未能速與下其痰恐風猖狂若逐其風又疑痰作梗須是風痰並化炒藥奇方以徐以漸減瘥可也食不禁戒服藥無功若療風痰深意究竟不可致緩久則害發於疾當宜察之十二驚熱無時議曰因驚而得熱其熱常發不繫平心而屬乎血更加氣血榮衛毋得循環驚熱時常發作或生疥癬或發瘡痍熱來神困心虛熱去唇焦口苦呻吟求飲恍惚患飢兒孩受此艱辛藥餌如何救療人參羌活總不相關蠍尾當歸有些巴鼻更尋炒餌病不於心說道難醫請誠著意十三恐悸喘息議曰驚悸心屬喘息得同而言否愚曰非心旺之若心所受其疾不作喘發是知肝臟魂肺臟鼻魂魄不安恐悸傷乎肝肺肺受其驚而受其喘須求水飲肝受其驚發喘細細若張口大喘者肝肺倛不利鎮心安神調氣定喘必未盡善當於損益魂魄丸散瀉心補肝立見功效所述疑難更請探頤毋蹶高安十四食噎咳逆議曰兒孩睡息魂魄恬遊擊響高聲傷乎其神睡中不穩乃心不寧乳幼飢渴飲食宜細掇物觸志傷乎其氣令肺作噎乾脾發噫其氣逆不升降其志分不伸舒陰陽差忒胸襟鬱悶良久取氣發聲含飯面黑啼哭聲焦輕則咳逆致躁盛則咽塞不通所受之後常作咳逆者良由食噎觸擊悶挫關竅宣通臟腑即不宜升降榮衛乃利益若不早治咳逆於腸終身致疾而難療矣十五令子無辜議曰夫人所藉者陰陽而生所宜者氣血而長血氣不順則五臟以違其和陰陽不均則百脈以亂其體流之於表裡相參注之於經絡致急凡周晬乳兒等閒捉舉又更齊齒身體檢束頭目搖動此乃陰陽有虧榮衛失正疾名猢猻禁十二種無辜疾之一也丹情不識見之喜笑復作體態以教令如其然也久而不已愈加其遍次非風痰之所攻無驚熱之致作當為舒其氣調其脈均其陰陽適其灑淅止解下息裡寒有作休言乳幼無妨曾見父母慟哭十六受氣不足議曰三才降氣數成方謂為人萬象論功道合始知得志胞胎既備心定神全血脈未充骨萎髓薄筋力藉乎骨髓智謀出乎心神為人恍惚者斯可知多志者應由是傴僂者乃如然侏儒者必若此不及數之重者候存五軟大過受之深者身負五硬由其肺心脾肝腎所屬者氣血脈筋骨所受者體舌臂項膝其或有疾於症候不及議者往往無辜無辜形骸必定受氣不足謂如五硬五軟只許聞名稍有求醫難著方藥後進執謂堪與療理者野老付之一笑十七飯多傷氣議曰幼幼未降形處胞胎藉母氣血滋蔭由如養素已誕之後繼時吻之以乳乳者化其氣血敷養肌膚百脈流和三焦頤順身肢漸舒骨力漸壯三周所芘一生為幸其或母因産得疾血竭氣耗乳不成汁當召奶子看顧貧乏之家食不繼口奚能謀比其乳少其食多不益兒體其有不産之婦抱幼繼宗終夜號啼惟飼飯食初傷其氣次傷其形久傷其神重傷其命萎羸聲鞁躁哭皮皺項軟足垂唇焦骨露但見眼有晴先將久氣散神敗凡人生子究乳為上獨以穀食扶持十士未保一二抑服丸散堪笑強為勉之急假乳蔭庶傳為人死中半活矣十八臍中受熱議曰初生未及蔭乳洗罷便用斷臍帶留一握綿裹三重受氣根全者其臍自深成胎數關者其臍自突臍者受質之根也為人之本也形體之基也元命之壽也迭月之前一臘之後其兒臍紅高腫不作水濕亦無風候但將胸堂仰起厄厄作聲闔家無見責之皂嫗有傷臍帶致之非也召愚一觀察知心氣受之胎熱與利丁火少項不展胸堂厄聲遂止越宿視之臍根後本醫工與傳及洗總施謬妄故書於楮果其宜哉謾舉頤以誚之云耳
