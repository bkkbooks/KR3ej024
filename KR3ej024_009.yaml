body:
  text: 卷之九議胎中受病諸症序原夫胚胎血氣本自調順既成胎孕有失將護致使胎氣不安轉動不常冒觸根本初生幼幼邪正相干易得其病今述一十五篇概而舉之欲使智者察其已身所受輕重所發逆順調治可否鞠育持令産婦以正其神養其血和其氣使乳汁溫平兒得調順雖有疾作而自安平過半矣重則減之為輕輕則去疾之容易勿謂輕之為重重則候變而作禍矣於戲萬物之中所尊貴者惟人肖天地生成之道故難值其安靜猶體頤淳和之脈把純素渾朴之懷合清湛之淵源納運成之臟腑嗟乎受胎無益於形有傷加之以藥誠在出不得已而致之若在胎內失調初生宜其和益若在初生失理則於襁褓之間而療之順平而愈若也受之變蒸數足其所患猶未除散遂成宿疾終身之咎也其兒所受胎氣不足為患非傷肢害體者並可與整使其平復獲幸之甚良工盡心斯為妙矣議胎中受病諸症一十五篇一鬼胎議曰婦人産育有患鬼胎者庸鄙謂婦人納鬼之氣而受之實非也鬼胎者乃父精不足母氣衰羸滋育涵沫之不及護愛安存之失調方及七八個月以降生又有過及十個月而生者初産氣血虛羸降誕艱難所言鬼者即胎氣怯弱榮衛不充致子萎削語猶如果子結實之時有所蔭藉不到灌溉為物褊小其形猥衰無有可愛如此之謂胎氣陰萎常與丸散扶挾乳哺勻調氣血充蔭腸胃固壯即保其靜善蓋由受氣不足稟賦不全忽爾橫殤非可惜耶二魃病議曰小兒有患魃病者非五臟傳變亦非六腑所主也緣兒生後方且周晬母復有孕血氣所蔭分之兩端是故胚胎漸傷乳汁成毒虛邪相攻兒吻致疾斂率其氣鬱傷其神魂令兒疳虛尫羸枯瘁煩躁朝昏嘔噦日夜不可得療理但速與斷其乳溫平胃氣和順血脈自然而愈其有萎怯致痰乃成無辜症候何足怪訝者耶三胎氣議曰初生牙兒三朝之後滿月之前所受諸症作疾輕重不同者蓋由胎氣稟賦有壯有弱其母飲食恣全飢飽起止無忌坐臥不擇令兒得疾不寒即熱不虛即怯熱乃作壅寒乃作泄虛則作驚怯則作結寒則溫之熱則涼之虛則壯榮怯則益衛驚用安神結用微利審詳用之不必過劑四胎病議曰牙兒胎病謂月數將滿母失護愛或勞動氣血相干或坐臥飢飽相役或飲食冷熱相制或恐怖血脈相亂胎氣有傷兒形無補或因動土與工或由營葺房臥或移安居或更薦席雖不犯凶神惡殺終干礙子體兒身有因如此得疾者乃成終身之患重則損根廢枝輕則拳攣跛躃若也胎病由氣之致患者乃尚可療或傳成風為疾者斷不可醫初生幼幼有被於邪者即時和順調理大凡生長嬰孩有如長江行舟一向不值風濤波浪方為穩當何向胎氣不固或生下作疾所謂萌芽既傷將來曷能榮茂矣五胎病作熱議曰兒在胎中母多驚悸或因食熱毒之物降生之後兒多虛痰氣急短滿眼目眵淚神困呵欠不發神舒厄厄作聲大小便不利或通利即有血水盛則手常拳緊腳常搐縮眼常斜視身常掣跳皆由胎中受熱宜速與服大連翹飲子解散諸熱次與服消風散數服無恙六胎氣蘊熱議曰兒在胎中母多恙怒鬱悶之情不散又因胎氣燥濕兒作艱難母生驚悸是致乳汁不和兒吻成毒故能作熱令兒食即嘔吐眼不定席神不安穩聞響即掣苦不解蘊毒熱和干久作無辜成疾害生先宜順氣次服四順若不安愈蔥根必效七胎病風熱議曰兒在胎中母常喜食動風之物熱毒流傳致兒受之隱在經絡則手足拳攣注入血脈則肌體枯稿其兒眼常喜羸血不蔭心神不守含怯人怐物視作定目苦不早療恍恍惚惚形體雖長情性垂拙為人多荒朝記久忘雖久受病不無生蓋父母但知惜昔嬌姿安養其無用之兒如此者凡胎風服藥至用貴細若以常方難言功效八胎病驚熱議曰兒在胎中母因驚悸驚氣入胎兒當受之降生之後其兒精神不爽顏色虛白初則溫溫有熱其後頰赤饒驚物動即恐聲響即悸若不繃抱安床取次難為調適既有胎驚將傳胎風之候産母謹謹忌食一切熱毒之物若作尋常畢竟難極蓋是血脈柔弱臟腑虛怯不堪重劑何可攻系是使智省怯懼有之苦也輕受熱已自散即於項上生癤其大如拳名曰驚氣須當破之而後合之勿傳毒藥恐壞肌傷體不惟傷壞深恐有害及為無益禍莫大焉九胎病風痰議曰兒在胎中母喜食熱毒之物熱即生風脾肺不利遂有風痰雖不能損肢傷體其痰與風相襲痰多風不散熱盛痰復生且風與痰皆能令兒作熱那堪更加暖被紅爐母炙炙爆醃藏動風之物即時害生藥非不驗乳汁之咎也如兒或患風痰不必下截風化痰藥但清心肺涼膈順利三焦則自然安愈亦忽可投大涼恐寒臟腑所宜者以消風散吞下白丸子至良令小作丸十胎病結熱議曰兒在胎中母失調理恣縱飲食不加將護蘊熱頗久及至降生熱氣隱蔽傳入於裡遂作閉結其結由熱極得之大便不通利衝心腹脹臍突撮口努氣停郁急以三黃丸或四順七寶以通為度不必過劑切不可下積丸子藥不惟無益恐反為害十一胎病寒邪議曰兒在胎中母因感受寒邪熱氣煩蒸傳入胎臟兒當受之及至降生令兒關竅不通精神昏濁作熱加蒸啼聲不響號叫駭人未知之者將謂驚風妄動臟腑或妄鎮心良由所受寒邪之氣初只在表久則傳裡所謂邪氣以亂其真故血脈皮毛皆不得其便腠理所拘邪不得解變蒸有違氣血致傷煩躁益增無能自暢但與小柴胡湯服之稍輕次以人參羌活散然胎中所受未分表裡既生蔭庇當議和解為之良也十二胎病榮熱議曰兒在胎中母於食物充喜啖薑瓜古人有曰修灶鐵唇食薑余指蓋薑性至熱又是醃藏攻及血脈傳入經絡輕則令兒偏體生蛆瘡延熱毒瘡丹瘡之類經年發作或於頭額生核重則發大癰癤潰即爛壞皮膚十死一生何堪忍見初生幼幼毒氣加盛肌內柔弱參朮托裡枸柏扶肌抱即地骨皮是柏即黃柏常與清心平調血脈母慎其口父抱令餒醫工順理與扶其危十三胎病衛熱議曰兒在胎中母傷和氣飢飽勞役神疲力倦多矣其有不勞役者即有憂愁思慮役乎其中動之真氣攻之虛邪於亂神魄流入胎臟兒乃受之既生之後兒常昏困腹急氣粗重則喘急睡思不穩狂啼煩哭肌肉不滋亦生瘡痍熱發早晚精神少具良工正醫平調臟腑臟腑既正熱目散止十四胎病臟寒議曰兒在胎時將順其月母喜食諸生冷物過度冷盛既寒腸鳴泄利時時有作降人之後其兒肚上青脈膨脹虛緊之者乃是虛氣入腹厄厄作聲日夜不禁雖則漸長終是臟腑陰陽二氣受不勻調若不溫平分氣長成痞結陽結易治冷結難醫仍宜抑母服藥庶得乳溫令子調和不至延病成害為之嘆也十五胎病潮熱議曰兒在胎中母曾發作子瘧或是因患瘴氣母或飲酒無厭或是冒風傷暑熱入經絡有傷榮衛母雖分免以脫其難兒襲其氣陰陽不解初生嫩弱血氣不和作熱潮來先寒關緊身體作顫庸工未諳其理即以艾炷灸之經絡未全用之枉究醫士但與調中均其陰陽二氣若是肚緊宜以全條蛇蛻末醋炒令熱手帕盛系肚臍上即漸安樂
