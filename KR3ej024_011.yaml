body:
  text: 卷之十一小兒傷寒正受夾驚夾食議曰正受傷寒所由感受邪冒冷脫著傷於腠理輕即傷風重即壯熱頭痛鼻塞流涕斯乃正傷寒候又有傷風傷著傷冷傷濕皆能作熱困乏但不咳嗽又有夾驚因驚之時而又傷寒故云夾驚傷寒又有因食之時而感受寒邪故曰夾食大抵傷寒或有他症似積之類切不可妄下若下之太早表裡俱虛雖以調理謂之壞症大人壞症由尚可藥小兒壞症救療無門哀哉凡傷寒有驚候亦不可下驚藥餌是夾驚症亦不可用驚藥幼幼傷寒只可表解雖曰用表不可令兒汗出如王氏杜薄荷散和劑方人參羌活散之類名熱在裡譫語鄭聲於症當下者只用散末藥七寶洗心散四順飲之類不可用以丸子或以取積藥下之其熱不去反成無辜夾食者於理用下宜紫霜凡下之量其虛實而用須究門先傷寒後夾食或先夾食後傷寒然傷寒夾食乃在於食時之間惟母覺知其先後多是不覺若知其理以後受者而先調理既不明其先後即可表解以候里症有者方可與下尤為善也且下與表二理不可並行有乎得失旦如家寶有云三日前在表三日後在裡斯乃大概約而言之恐後人傳之不當及為其害凡傷寒在表即解在裡即下不可以日限為拘其或有在表裡之間亦宜和解又不愈小柴胡湯治之又不愈候傳裡下為良大者譫語小即煩啼切不可意急取愈宜在用心明究表裡若也審察妄恣用藥不當籲哉小兒有患驚風痰熱四症如何用藥議曰小兒有熱熱盛生痰痰盛生驚驚盛作風風盛發搐又盛牙關緊急又盛反張上竄痰涎擁牙關緊風熱極閉經絡即作搐搦涎壅胃口悶亂不省才入中脘手足攣是諸關竅不通百脈凝滯有退熱而愈者有治驚而愈者有截風而愈者有化痰通關而愈者皆是依症用藥不可不究竟其所以受病凡病在熱不可妄治痰病在驚不可妄治風病在痰不可便治驚病在風不可便治搐凡治小兒病在驚驚由痰熱得只可退熱化痰其驚自止病在風風由驚作只可利驚化痰其風自散病在痰涎急須退熱化痰若也有搐須用截風散驚此乃謂醫工至妙之道若以意急雖治驚痰不化熱亦不退驚如何自止化其痰熱若不退風亦不散痰如何去是知不治之治所以治之之謂歟學者深可留心操志於此一端究竟無至得失乃謂之醇全通道而已矣小兒泄瀉除疳瀉為虛熱瀉余皆臟腑虛寒弱得之議曰小兒臟寒腑冷大腸不禁總謂之瀉分別輕重究竟緩速有溏有泄有滑有利有洞五者不同豈可一概而理之溏者糟粕不聚由其尚濃似瀉非瀉泄者無時而作或出不知利者直射濺溜氣從中脫滑者穀食直過腸胃不化洞者頓然下之如桶散潰余更不留即知其兒臟寒腑冷瀉之作疾其來緩速輕重可知凡兒瀉糞出青色者蓋脾受肝經所制肝屬乙木能克己土所勝之功故現本質由其臟之虛寒非謂驚也又瀉初黃良久變青色乃臟寒之微又瀉藥物直過尤為寒滑凡虛滑三五次即困乏若不急與溫其臟調其胃平順三焦和正榮衛不爾即慢驚症候傳變如此之急欲以止瀉藥次第理之往往不及惟務溫其臟腑臟腑既溫寒何能留於腸胃之間或以熱藥頓止則熱反為它疾須先投殢腸藥然後生胃正氣與服切不可意急過劑投之熱藥稍或臟腑至虛寒孩童困之四肢厥冷者是謂逆症當用黑附子白朮乾薑即量輕重而用凡投熱藥瀉止即痢作無疑理瀉良方已著在後請意度之為得即妙矣小兒痢疾醫云五疳八痢究其理種數多端輕重不一豈可定言議曰痢者利也痢之為疾無積不成及至積化成痢且脾胃亦虛即不可更下善痢者生其胃溫其脾厚其腸和其氣無不愈也若成痢疾故不可下下之反虛作渴浮腫痞滿脹急不食亦未可便補補則傷熱能令脫肚不收先與禁卻一切毒食之物頻與生胃調氣或赤或白即是冷熱不調或受暑致濕即與分陰陽氣利水穀道若裡急即與厚腸胃腹肚痛即與和順氣溫臟腑或純白者乃積冷毒加之即與挨去其毒卻與溫其脾胃其痢自止凡痢疾能飲食可以治之妙藥調理無不瘥愈稍夫胃氣不能飲食疾名禁口有不食至死又有毒氣侵胃口亦不飲食或患痢疾因食毒物不見腸頭鮮血頻滴肛門寬大深黑可畏腹肚㽲痛裡急後重名曰刮腸日夜頻並飲食直過者名曰滑腸此三種痢疾最為惡候乃是二十二種中皆能傳受而作此候凡言小兒美飲食者飲謂飲乳食謂食飯若病中能飲水漿喜食果子魚肉之類者亦助其虛不能令臟腑充實須是白棕子爛煮飯可矣若以糍粿𥬲黏膩不堪脾胃之物猶其增困幼者吻乳克化漸安五臟平和六腑調貼然後陰陽自均氣脈自壯丸散陽劑不必抑之或有餘毒宜以順調緩助不可攻擊又有時氣作痢熏習相染而成而由天氣睛雨不常陰濕之氣冷熱相干腸胃糟粕不聚遂成其疾腹肚㽲痛裡急後重他藥莫治者宜與服木香黃連地榆川當歸白芍藥治豆蔻為末蒸烏梅肉丸棗子湯下三五十丸如麻子大加減神小兒疳疾其症數端其候不同發作不常治療不一方論不等該載不盡輕重斟酌隨宜設方加減審量從長調治必有可理者良工順症而已議曰疳者甘也疳因脾家有積虛而所致其積不下後食黏膩甘甜生冷炙爆之物故得名曰疳初作為疾名曰疳氣皆由飲食不節生冷相投積傷久滯不化而得之久則疳氣傳於五臟傳是名疳極候又反傳名疳逆候雖食不生肌肉作渴煩躁名疳虛候時發潮熱盜汗常有名疳勞候腹大喉細手足無肉者名丁奚候自丁奚翻食吐蟲虛熱來去名曰哺露十歲以下名曰疳十歲以上名曰勞治勞之理悉不用疳藥蓋疾作傳足非常治疳之法理其氣虛其血弱調令脈壯消其蟲子散去疳熱和順三焦詳而後已無用急力攻治亦無勉強投柏只可循候而設不得過劑若冷藥易動臟腑燥藥易損三焦審察端的丸散隨其輕重故無得失之嘆矣小兒諸症悉皆著載方藥療理法度惟有咳嗽一症究莫能盡月內牙兒難醫百日嬰孩亦難調理前人既有此言豈不盡心究竟若也輕易有乎得失學者當知之議曰所言牙兒及嬰兒咳嗽難治之者蓋為初生血氣微弱五臟未充肌體未固應變蒸未周之兒所感寒邪攻及腠理表裡相干邪正相勝陰陽未和不可強生攻治妄吐妄下妄汗妄補皆令兒疾轉盛不惟無益甚有傷害幼幼咳嗽乳母之過丸散狼虎醫人之罪豈特牙兒及嬰兒難為調理隱小兒有患咳嗽未敢輕許一二服藥便見安樂雖傷寒傷風症候已歸平復且咳嗽尚作大抵究竟小兒咳嗽先有有無熱與痰有熱在表無熱傳過或是未傳近則未傳遠則傳過痰桐熱盛痰壅即吐宜服補肺散人參茯苓麻黃白朮杏仁甘草阿膠蚵子地骨皮桑白皮桔梗有痰加半夏風熱加防風天麻服之自然痰化熱散咳嗽漸愈未可直用粗澀藥白礬南星石膏雄朱砒粉之類宜先滋潤脾肺次用王氏金華散少少時時與服或以白丸子如雄朱腦子隨大小作丸凡兒患嗽須究表裡未可一向攻嗽若用金石藥直入胃脘乃成提脾風候手足勾曲又何所益巴豆輕粉砒霜藥下之腸胃不禁須更成風亦何所宜只用溫平與表順助其氣滋潤肺經和順三焦其痰漸化其熱自退不必攻擊所謂理嗽宜且補氣化痰益肺生胃胃開氣壯即嗽漸減胃正即痰不生肺滋即嗽不有在乳毋當忌食稍長父用安存避風回滋忌毒慎冷然小兒氣弱其嗽作熱與夫大人一同且用藥調理實不同耳又有時氣咳嗽謂其天時冷熱不調幼幼虛怯受患者眾其嗽日夜不輟或吐或喘痰熱壅盛至重者利之即愈謂用大黃朴硝枳實陳皮半夏人參厚朴柴胡心神煩悶胸膈不快方宜與服無熱與痰亦不可下伏請鑑辨毋致得失
