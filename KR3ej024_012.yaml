body:
  text: 卷之十二議急慢驚風等症候總序驚者總名也嬰孩小兒心氣不足智志率伏恍惚無定神不守舍怯人怕物漸作怖畏怖畏之盛已作恐懼之多乃抱怔忪怔忪之久則自惕愕惕愕既有瘛瘲已為斯乃心氣不足而生之慚但分輕重耳又有心氣虛弱暴觸作驚更不由漸即便面青唇白視之定晴目無所睹聽之哄𣓉耳無所聞精神頓七心智全失及至良久收斂且五臟六腑虛處所受驚風而作疾已述前議然幼幼多因吻母不意之乳耗其心氣作驚以漸凡小兒因水火所加者悸也自跌模所致者恐也人物之所觸者愕也惕惕不散鬱郁悶於胸堂者怔忪也是知積驚難散由其不能自化如恐恐悸悸者蓋自能知之矣不為積聚且怖畏之誠常在其中無以自遣偶因觸悶心神其肝主風其薋生痰其肺作熱其心發驚四症相臨重者先發假如雷聲霹靂至響不為咎者何蓋聲相應情無所加矣惟有小兒在僻靜處或神廟中心存怖畏之時忽被無知小人戲叫鬼來鬼來且兒奔走無門驚氣入心若不速利其驚氣少頃則指甲黑唇口青所受重害不可得療理自古及今調理嬰孩最為難事悉皆憑藥取愈且驚風至難也慢驚又難也慢脾候危難也今摘述調理小兒至難者症候前後有所不堪療理或古人未備其意或己著於集後人未明者今與詳悉本末開陳利害指於迷塗直徑可進庶有益於學者胸次務家治産之夫及仕宦子弟易曉其理幼幼陰陽稍有偏側遵而扶之不至夭橫暇日熟研可補緩急良士一觀足知野老肺腑意不藏機亦無緣飾巧僞更無妄諂隱情直欲普濟使嬰孩初生自幼至長有患無疏受疾不害歡價鼓腹歌笑嬉娛又母即無顰眉蹙頞憂苦之嘆怡然順事不勞再三快哉至誠咸獲體焉議急驚風症候議急驚風症候上竄反張搐搦口流痰涎壯熱並有之其或有視左視右者有僵有僕僵仰也屬陽僕覆也屬陰舉握指有里有外醫分男女定陰陽順逆之理有左右引搐連及腳手身體顫動初則搐搦俱作久而搐住只搦有急有緩但只肩動口瘛瘲瘛瘲者候之輕也搐則盛也搦又重也反張牙關緊急喉中有涎即是驚風候如牙關不緊口無痰涎只反張搐搦上竄者未可便作驚風候蓋夾驚夾食傷寒疹豆或三焦蘊熱五臟不宣流入經絡熱在筋脈亦作搐搦錢氏云搐有真假不言病也前有云急驚量其分數者是約熱之輕重而與利之議急驚若是正候氣粗延潮其症候猛緊不只徐徐而來搐即急促唇口肩眼眨引連並俗諺云急驚驚爺娘慢驚驚樂王然雖是說治之有法輕重調理議急驚先當定搐搐由風也風由熱也搐既已作方可下熱退驚熱若不退驚亦不散不移其時搐搦又作所謂過街候乃是醫家不明才見搐定便言安樂僕謂急驚風難治有三隻有初驚時其風癇發作斟酌輕重云風定搐隨而愈之斯恐庸醫或常人熱見妄便下之既下了諸症猶存者一難治也又其兒正搐親人一向執捉不令渠搐且風癇不得縱恣逆入經絡藥力不及雖病減瘧根在血脈或注經絡二難治也又兒患候有順有逆順即易理逆即難療惟恐病延既久不得良餌症候傳變越去元由而作它症者三難治也議治急驚風候用藥非謂難也專至審察病候循其法度不荒不佞次第下藥無不愈之理多是病家倉皇不求善醫信乎山野庸鄙之言病候延久不無傳變傳即症重變即候惡凡經二三乎醫藥不效兒受困苦無能安樂士夫之家收方録症一日兒病症候危惡緊急臨時以何方對治告急無門衆口嗸嗸皆言有藥不明端的一向攻擊信乎見識淺陋擔負不起有乎得失用藥不及則無妨事可以療理若也大過即時害生議療嬰孩豈可以藥有懼技之大過或不及由尚不可況越症候乃為枉冤兒童雖分長幼有患臟腑昏令怯弱易冷易熱易虛易實若攻之相重其不任彼藥孰言疾不瘳反為它害曷不謹歟今者議急慢驚風及慢脾風方藥即是老漢指准應備緩急至要克效之者待更軼可否之理議患驚風痰熱癇痙痓癲此八種候惟痓與痓少有識者類同驚風發作之狀痓腳手冰冷痙舉身僵仆癇癲不殊目瞪流涎手足搐搦十歲以下常作驚風即謂之癇至十歲以上所發則曰癲議驚風痰熱已論在前且驚與風其痰與熱各自有本症候受病急風為疾四者並聚有驚有風有痰有熱或因驚而有風生痰作熱或有熱而作驚成風生痰或積痰而發熱熱盛生驚變風或久有風候痰涎常有因驚而發熱調理嬰孩童稚四者形症一不可有善明脈醫上於暴作者亦當知之理驚截風退熱化痰久盛二者醫風散熱療痰鎮驚四症相須藥宜並理古人處方亦合此意然學醫者不可不究其源遠若見候將作尋常用方輕忽病無少安症傳它候不逆且惡禍不旋踵議嬰孩急驚風候便須先審察四症四症之中而作八候八候者一搐二搦三掣四顫五反六引七竄八視一搐者臂肘搐縮二搦者十指開合搦之不已即成握拳男子看大拇指其指握在外為順在裡為逆女子反看之三掣者有膊搐掣或連身跳起四顫者或手或腳或頭或身四體顫動五反者身首反張六引者以手有如挽弓狀男左手直有曲為順右直左曲為逆女子反看之七竄者眼上竄覷高男子上竄為順下竄為逆女子反看之八視者男子斜目視左為順視右為逆女子反看之既有四症八候次第隨生若只去得驚風且痰熱不散未可言安痰與熱聚將來必致癇疾所治之治其痰與熱須察之可下即下痰熱既下驚風未盡消去則病依前又有發作所言四症相須不可留一若理得驚風已定隨便下了痰熱且驚風不復有作此理至為妙也議嬰孩有患在痰熱未有驚風者只可退熱化痰不宜妄投驚風藥何也驚風之藥其味多寒涼經絡本自無事稍有攻擊透其痰熱入於經絡卻成風痰之疾搐搦致之議嬰孩五臟經絡虛即生風既虛所受且驚自然而有作驚風有作八候次第而生所謂兒童無病不可與服攻擊所治之藥議嬰孩有小大有壯弱驚風發作有淺深但輕重大者加分劑重者多與服數乃合其理議嬰孩聞響即掣跳者乃肝肺不足魂魄不穩故神有不安即聞響掣跳者非謂驚也犀角地黃丸主之又兒心氣虛怯神不安定連並掣跳者宜與四君子湯加辰砂脾胃氣壯神魂俱清自然不恐議嬰孩欲發驚風候先神不定顧左復右覷上及下或已定其晴凝其神恍恍惚惚怕物懼人不若常日嬉戲者急當療之如有熱先退熱有驚散驚熱退不生痰驚散不作風良久自然安定神情和悅氣脈舒暢若待風變而理驚痰盛而退熱事由至緩不若四症俱全由可治療議嬰孩急驚風發搐手足不可熱捉及以手用力灸之即傷經絡經絡既傷亦無所益則廢肢害體議醫急驚風候有大有小有輕有重有順有逆有偏有正詳審久暴只第進藥且病家無不倉皇驚恐醫家須是正定無自昏惑議急驚即曰用醫其驚氣和平方可調理若以急驚之謂調理事致緩也慢醫准此消息議醫急驚初用藥在我則我醫症候遵法度參傳變審緩緊治之切不可信病家及左右人說其所欲稍順人情有乎得失主治在我豈可妄信致之荒繆罪纍誰耶議急驚初無痰而復痰盛初有搐而復不搐者此症所傳候之至盛人少知之蓋由初醫縱恣病家不謹經三五家用藥或庸士所見不同有太過不及之害如此曷不謹歟議醫急驚須量輕重下之得其中為良且驚風頓去痰熱已化不作復患所下之藥稍多巴霜膩粉為重即傳慢候無疑議嬰孩有患風痓風痓風中等症候皆上竄拳搐號曰天吊言載甚多初無痰復有痰初作搐復不搐不拳身直皆風之惡候已是傳過若作驚風更與下之為害必也議急驚欲下之理須在急驚上竄斜視反張所作之時可下若傳過或已搐定少緩之間未可直便緊下有乎得失議急驚用藥先與服截風定搐次與下熱熱去則無風風散敗不搐是知以藥之功在我意設不至恣妄為咎到此顯功方知難易議急驚有上竄者有搐有搦有引有反有區有僕有叫者有淚者有痰涎潮盛有溫壯發作各隨四症輕重而受之急驚截風定搐為要風搐既定諸症漸息定搐須用通關非搐鼻之謂通截風乃用調絡議凡定上竄左視乃於男女之順候忽反是則逆也人抵逆則難治順則易理不以逆症候為不可治古人言難治謂陰陽相反症候乖生須用審究其症詳察其候以意盡力致之取效而弗瘳者為之奈何議世方有云治急慢驚風候者言之失意急驚乃陽癇慢驚乃陰癇正恐治陽作陰治陰反陽豈一藥以全兩症又有云治陰陽二症傷寒之說能曉此理可謂通變議急驚候至為要急在於片時之間若或羌殊直有得失一時所見見其端的用藥無疑尚在疑情未須投藥藥發無疑其意靜善疑在未發藥之前良具妙矣議急驚頭額心背元被灸了者決定發癇不可常藥僕嘗謂風癇可灸驚熱不可灸蓋風與癇痰涎壅盛胃觸胸膛昏亂迷悶不能省知心如所失既灸著穴痰化心開即漸安愈驚之與熱心神常存聞知被灸忍痛不能驚悸轉盛其疾澀重所以用艾在先藥必未有益議驚風疾愈未嘗見因發而活每見老嫗鄙婦無術只投艾炷兒生三五日之間便以艾燒之不惟失穴因痛增悸經絡未全如何愈病智者消詳不可枉冤議初生尚為腐血三五七日有患吊腸鎖肚世言八帶鎖匙相沖愚曰非也容忤所致初生氣弱不任其邪肚緊青筋脅肋脹滿氣促禁口不乳斯症但用真珠天風丸下之才通即愈屢救初生無不獲安若經患服藥得痊長大皆肥壯重實未詳其意請較之答曰初生之兒方離淤結分降之後偶被邪氣干亂臟腑微怯不受其觸故作痰曰吊腸撮口鎖壯乃以天麻丸推下惡毒虛邪之氣悉去血脈順得流行臟腑和調充實自然朋長氣壯形神俱備體質醇厚誠為可愛議嬰孩又有臍風因斷臍不如法有傷臍帶受濕秉風由此成患皆能撮口乳食不下膨脹青筋腳直無力只依臍風治法議發急驚風吼叫兩三聲者難治心受驚觸痛絶於內乃傷其根本之謂議發急驚風未投藥四症俱全已服藥四肢腦嚲者難治議急驚噴藥者難治又藥不下者難治議急驚搐搦之後四體俱軟者難治議急驚發作之後腳作擺跳者難治議急驚搐後目睛翻轉者不可治議驚風搐搦已住神情緩慢手尋娘衣或尋自身體者亦不可治議驚風諸症候盡皆已住但神情昏慢氣促者未可保治議驚風症俟已住其兒拈物不捨情性緩緩於中非謂十全必有再發之理如或再發不可調治矣議急驚風鼻中出血者易治口中出血者難治鼻中出血者其熱已散故易治口中出血者心血妄行故難治議驚風尿尿已遺者難治大小便閉者易治
