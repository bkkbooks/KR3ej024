body:
  text: 卷之十三真珠天麻丸治急驚風請量用之以通為度此方仍治吊腸鎖肚撮口至為妙絶功效無比丸如麻子大初生患者三日三丸五日五丸七日七丸加青黛名青黛丸天南星炮天麻白附子炮各一分膩粉半分重巴霜一字蕪荑炒全蠍麵炒滑石各一分半上事治為末水煮細麵糊丸如大每服一歲五丸二歲十丸大小加減薄荷湯點茶清送下議曰此方乃下驚風又去痰熱須先服截風定搐次與下之切不可以多利之但通為度宜其詢問前人已未曾下惟恐病家不曉此理遂致疏失若初醫在我則當循症截風定搐或朱蠍散尚有痰熱宜與下之免作風候且小兒被驚發風胡不知先有熱在臟若知有熱在臟甚勿驚著蓋熱盛即心氣虛一驚觸心心氣迸散所以面青唇白良久驚氣卻收其或肝虛入肝肺虛入肺五臟六腑皆由虛處其驚氣自然投入因而作疾前歌亦載然急驚之急痰熱相觸觸亂神情氣脈互馳經絡乘熱熱即生風風熱不散筋吊脈縮或搐或搦或掣或引各於輕重所適而然善醫者截風定搐有熱與痰隨而下之其搐搦自定拳攣自舒吊縮自寬風熱自散何患氣不蘇省神不和暢直言至簡良士當和之矣卻風散治嬰孩小兒急驚風候方作搐搦熱盛涎潮宜下之天南星四枚炮去皮為末巴豆四枚出油如霜大半夏拾枚用甘草水蒸熱切焙為細末白殭蠶去絲炒一分金蠍炒二分去尾上件和勻每服一字許煎金銀薄荷湯調下揭風湯所治在前全蠍去毒麵炒一分天南星一兩為末水調作劑包裹蠍煨令赤色蠍不用炒亦得天麻一分硃砂一分令研輕粉半分重腦子一字麝一字上件為末和勻每服半分煎金銀薄荷湯調以通為度青金丸治嬰孩小兒急驚風痰涎壅盛欲下去痰退熱巴霜半兩已青黛一分天南星半兩炮輕粉一兩重滑石二兩重全蠍或外去毒炒上為末水煮麵糊為丸麻子大每一歲五丸二歲七丸三歲十丸大小加減用薄荷茶清送下以通為度議曰凡看小兒症候不問長幼目視指切心究意到醫權藥衡準鑑疾之輕重所謂斟酌對治已遵其法藥入腸胃猶合符節者上也按睹之後忖度方法思惟料理良久始達其源用醫投藥者次也不體全功何謂艱療非四病之異端乃謂究竟不若是今議驚風之疾有急有慢鄙夫以搐急謂急搐慢謂慢斯説未當古人言論陰陽癇者是也陽癇曰急驚陰癇曰慢驚陽癇頰赤體熱唇紅脈數牙關緊口流涎陰癇者吐利作熱生風不有陽症惟有搐搦畢竟脈來散緩乃是陰候無可疑惟是陽症傳陰陰盛陽虧陰症作疾速用扶里如急驚風候陽盛陰虧陰氣剛壯當用下之使陰陽二氣均平調榮衛二脈和順方乃可宜前件方藥輕則揭風盛則劫風重則青金或以真珠丸請詳而復已其切察之輕重審以湯劑得中勝妙莫令違也若或怠緩害加禍生醫者主察勿今致咎截風丹治嬰孩小兒四症已作八候未具者速宜與脈金蠍去毒炒白殭蠶去絲炒天麻白附子炮天南星炮各一分硃砂一兩赤腳蜈蚣一條酒炙酥麝一字上為末煉蜜為丸雞頭實大每服一二粒煎金銀薄荷湯化下定搐散治嬰孩小兒急驚四症八候俱並作者宜服天麻白附子炮天南星炮各半兩蠍稍炒一分硃砂一兩代赭石一兩煆米醋浸七次雄黃一兩乳香一兩白花蛇頭一分酒炙腦一字麝一字赤腳蜈蚣一條酒炙上為細末每服半錢煎金銀薄荷湯調下煉蜜如雞頭大亦佳議曰搐症未作痰熱壅盛故生其風風不自散流入筋脈又入經絡遂發搐搦定其搐搦先用截風風若不加則搐搦自息矣且搐搦已作痰熱有盛疾候傳極其風不可得而截搐不可得而定由如遺漏炎熾猛烈難以摸減如此患者理宜下之大抵陽癇用下乃良陰癇何以加之兒分長幼用藥惟有發風作搐大小皆然風之為疾猖獗衝突乃五臟虛處受之察之在證療之未前由驚而作或痰與熱而為察其源而定其疾者要也有其風即發搐有其搐即因風風定搐其議相續今述截風散不待搐搦才覺風痰驚熱有作便與服之令不搐搦故曰截風既已搐搦並作宜與定搐散御之御之不散與服暖金丹其勢加重即與下之且下之法醫家出不得已而為劫風揭風青金三方量其輕重今人直便擬下更不截風定搐之藥得失之議皆由忽遽昏惑智者良工幸宜考較暖金丹治嬰孩小兒急驚八候四症未全脫去尚存風熱痰涎其驚風症候欲再發作宜服暖金丹天麻一分白花蛇炙取肉二兩如無烏梢蛇代用全蠍二十一個麵炒蜈蚣赤腳者二條炙去了毒白附子炮一分白殭蠶二兩重去絲炒黑附子夾三枚牛黃一分如無以黃牛膽者代之加用天南星炮半兩辰砂令研半兩麝一兩上為末煉蜜為丸如皂子大煎金銀薄荷湯磨化下議曰所患驚風痰熱四症皆能搐竄斜視反張惟是驚風作搐名曰真搐為其病受不傳即作痰熱所發或因傷寒等疾發作總名假搐為其更有傳變其時親人倉皇那堪醫者昏感投藥不當發作致久
