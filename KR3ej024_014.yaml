body:
  text: 卷之十四慢驚風傳變治法截要凡慢驚風候若是急驚傳來而尚陽症其陽即虧不必回陽又不特治陽只可截風調胃均平陰陽可冷可熱可緩可急是也若直便與服附子硫黃之屬使陽歸陽又是急驚學者理宜知之既知陽症傳作陰症即與服保命丹三二服兼前牛黃清心丸子其有四症且八候稍緩疾成陰癇者即與服之若已傳過八候不作四症尚在只冥冥者與服定命飲子若腳手冰冷者乃四逆候方可回陽次第眼合者即傳作慢脾風候其兒驚風痰涎壅盛搐搦不止不可下者宜與靈脂丸其痰壅熱盛口角自壅者白羌丸功效驚風搐搦身體雖暖風痰不化宜服天南星丸議嬰孩所受此等症候別無化疑者只依下項用藥無不蘇省切不可延久其陽易化陰氣漸盈藥力不及使人難治又不可一向連並服藥每次一二服了須審察症候緩緊有無傳變稍覺寬定其藥放慢或勢漸緊宜以次第緊急藥與服不可執殢一藥又不可便換湯餌連並與之所謂察其輕重審其進止而後已今著妙方不勞檢閱修合如法對症投治克效萬一議慢驚若是急驚傳來是知前人不曾截風定搐陽脫而傳陰陰重陽虧其風與熱隨流縱入經絡又有曾服大寒涼之藥過多又有下積取瀉致作又有臟腑虛寒洞泄而為其所受多端已載前篇議理慢驚當知陰癇之說其症屬陰臟寒氣虛或尚泄瀉不止且驚正作多因無識之人一向治驚更不理瀉藥用寒涼投之令氣愈虛泄瀉不止陰症愈重驚搐愈增若用止瀉藥稍熱八候復加四症不退慢驚雖曰難活蓋醫亦不曾究竟病作加進深為重害議慢驚當察之所視為要眼睛昏定為重竄視為重四肢厥冷為重晴定不眨為重雖眨不左右顧亦重汗出如流亦重口面忽作黯黯色至重感風搐搦慢驚眼在半開半合之間乃知陰氣所盛傳入臟間陽氣已虧脾經屬陰次第入脾故言慢脾風候議醫慢驚與急驚風候自是不同未可一向下定搐藥急驚謂關竅不通故以腦子麝香等藥通利定其搐搦慢風陰重陽虧諸經已虛不宜通關又涼其臟易作慢脾風議醫慢驚不可爭攻急驚陽癇稍易理慢驚陰症最難治服藥已愈而尚虛之未省三五日之間者有之俗謂過街候發無定論不可輕易妄劑投之攻擊則前功俱喪議慢驚所治之理須究問原因所發若是急驚傳陰為慢驚者乃陽癇所作陰癇也當察陽症未純其陰症用藥斟酌如因泄瀉而作慢驚者男兒為重如因吐逆而作慢驚者女子為重即陽脫而陰盛小兒有長幼之別臟腑有虛實之分有瀉三五次便成風候乃由虛之盛也或有二三日泄方成風候或有五七日瀉不止而成候暴瀉成風由可速治蓋回陽調中補氣之為易若久瀉漸傳成風者為虛為之故難療理議嬰孩小兒洞泄成風以補藥治之宜用附子藥臟寒洞泄當脈取瀉成風因藥下積宜以溫脾壯氣藥調之宜服觀音全蠍散愈之有服寒涼藥成風下藥太涼致冷臟腑先寒過涼藥吐瀉即傳成風候以助氣醒脾藥溫之王氏大惺惺大喝起散與服之即效若手足冷回陽宜朮附湯效陽癇傳作陰癇者急驚傳作慢驚風候以截風藥治之眼前方截風定搐親若在前三者慢驚候便以截風性性末為當蓋由病自虛乏得之所以云調補之理議驚風症候所以用藥不一治療不等由發作不同故述在前雖則四者之議猶為大概智者得之開發詳其輕重可否之意而施設之議醫理慢驚之候其意在慢治急驚之候其意在急何也且急無過因熱生風作驚跌撲作驚他物觸之作驚驚熱傳極即變生風搐搦等候皆熱作來若也順症依法下之諸候自息然慢驚所作不常當宜省察用意子細所以故宜消息為之慢也不可倉皇恐懼有乎得失非失治躊躇疑二之為慢也又曰慢驚無爭攻蓋所療至為難事無妄當何議醫慢驚不可與語無妨疏脫有之無誠不謹亦有之無見不明亦有之又不可言難恐於人事但存妙理究竟深得法度者投藥必愈不曉於理截度未良者千萬無順人情投餌既無可否之說若或所見不到即與善術者調治庶不杜究若也壞症傷候必敗其德實有勉強倉皇者耶保命丹治嬰孩小兒急驚風候傳慢驚宜服保命丹良方白茯苓硃砂令研白附子炮牛黃如無以制者加用之天南星炮各一兩全蠍炒半兩天麻炒一兩半甘草炙一兩硼砂一兩腦麝各半字上為末和勻薄糊為丸雞頭大每服一丸金銀薄荷湯化下議曰此一方已述靈秘所治急傳慢候用之極良其藥純和卻驚安神化痰定搐功效非常然急驚傳來初入慢候須較陰陽虧盈乃為法則陰盛陽虧方謂陰癇榮虛衛弱方傳陰癇心驚神散方傳熱熱經桑絡弱方傳熱熱癇之為病四體不收精神失守百病於邪五臟受虛但隨四症而作八候醫工當察標本理之若也症傳候變即入慢脾十死一生至為難事請究所受療理越於古意或太過不及總為虛哉觀音全蠍散治嬰孩小兒因吐而傳慢驚風候宜服觀音全蠍散黃耆一兩人參一分木香一兩炙草石蓮肉炒扁豆炒白茯苓各一兩白芷全蠍防風羌活各一兩天麻二兩上為末每服半錢一錢棗子半個水一小盞煎至半與服不拘時候慢脾尤宜服之議曰觀音散東漢王氏所著調理嬰孩清神固氣補虛益脈開胃止吐醇乎醇善之善者耶所緣用藥截風者何正於危急之際卻作兩餌役之先與生其胃氣次服截風定癇如此療理不惟迃曲致緩又旦未能藥入脾胃之間悟其至理兩劑一行或加白丸子末以半和之乃盡其妙犀角散治嬰孩小兒因吐瀉神困力乏欲傳作慢驚風候犀角鎊二兩白朮二兩水煮過甘草半兩炙陳皮舊者良去白一分上為末每服一錢水小中盞金銀薄荷同煎三五沸通口無時議曰此方治小兒因吐瀉神困力乏欲發慢脾風候正謂救急不可令緩若已傳受即風即熱即痰即驚交相致作神散不定上竄搐搦悉由脾虛之所致也脾經既虛次第胃虛其藥白朮陳皮預理脾胃犀角退熱去風熱既不作痰無發生醒脾壯胃風何得有漸見蘇省兼與醒脾散及既濟丹相間服一向取愈為良其方全不用逐風化痰之藥者蓋是症候欲作慢驚所以未宜先投緊藥故用此方謂之和劑一正其脾氣得無傳變不勞療理簡徑微妙稽首智者作之施功利益而已醒脾散治嬰孩小兒吐瀉不止痰作驚風脾困昏沉默不食醒脾散方木香炮一兩全蠍炒半兩天麻炒一兩人參一分白茯苓一兩白朮炒一兩甘草炙一兩白殭蠶炒一兩白附子炮一兩上為末每服半錢大者加服水少許棗子同煎至五七沸通口無時服議曰此良方最為勝善小兒吐瀉脾虛作疾驚風神困氣弱沉沉默默皆脾經虛乏已成風痰並聚故爾不醒宜多與服仍加既濟丹及觀音全蠍散俱良其疾復有引掣搐搦無與驚風丸散及腦麝寒涼等藥其症愈惡其候愈盛不惟驚風未退且痰熱助之令兒疾作傳變傳即慢脾變即陰逆慢脾猶載方藥尚可理之陰逆之候何可醫治陰逆者陰謂陽氣欲絕逆謂受症不順不順欲絕但增吁嗟使人無所措手醒脾良方豈可隱匿真所謂活人飲子神保既濟丹治嬰孩小兒肚瀉或已作風候服之功效硫黃焰硝陳橘皮青橘皮並去白五靈脂川者良半夏曲炙炒皆可上以等分硫硝二味和研令勻一處用瓷器熔汁傾出候冷細研旋入諸藥和勻上為末秫米粉水煮糊為丸如大每二歲兒服二十丸大者加之並溫飯飲下空心食前此方均分陰陽二氣多脈有益議曰陰陽二氣不均冷熱相制驚風已作搐搦已定或陽虧陰盛或陰虧陽盛或驚風未散吐瀉不止或嘔逆或發喘或腳手漸冷或眼目欲合或服涼藥太多或虛煩不定或沉沉默默不省或恍恍惚惚生驚但胃氣未脫速與服之若是危急不待作丸子只以末溫飯飲調與服以愈為度若腳手冰冷者服之立溫未止者服之立止雖慢驚慢脾風候並宜與服仍加薄荷湯便尤良智者明理必加欽重愚者矇昧必懷猶預此方至良少有知用請敬而行之治嬰孩小兒吐瀉脾胃虛弱發作慢驚風候搐搦不已醫工截風不止取痰不下散熱不退即驚不去其症欲傳慢脾風候宜服定命飲子半夏口羊口者半分天麻一分甘草炙白茯苓白朮老生薑各二兩上件一處用水一盞於瓷器內煮令水乾將半復天麻白朮茯苓切焙為細末每服半錢或一盞生薑棗子湯調與服無時議曰此方建脾化痰去風散熱功效如神醫工少有知用初學之士只知有腦麝香爽者方用之俗夫便言好藥殊不知腦麝乃醫家出不得已用之其物通利關竅關閉塞疏湊理利骨節其藥屬陰能化於陽只有急驚宜用慢驚慢脾傷寒等患悉宜禁止其或疳痢藥用之虛者亦禁惟有痙痓癩癇宜用定命飲子屢經效驗野老處定此方其功造化深智高明往往欽誚痰搦連並脈息虛怯不敢頓下者宜與靈芝丸若手足差冷兼進回陽行醫用藥至於此等症候乃主治活傷之權也
