body:
  text: 卷之十五慢脾風候治法截要議曰慢脾風候即是慢驚風所傳元由吐瀉脾虛驚與風傳入故曰脾風謂其脾家受風者更逐風無風可逐若也逐驚無驚可療但有療涎虛熱來去兒病至此所以難醫蓋由症與候驚與風傳經已極總歸虛處惟脾所受何故不曰胃風胃屬陽其病即傳陰臟故無胃候兒既尚有胃氣可以一向生胃兼與回陽即漸蘇省若更一向攻擊驚風脾亦不受而又傳散諸經不可得而加藥若見眼合即是脾風宜服下項藥議治慢脾風乃是不得已而設其疾危如燈無油漸見昏滅錢氏所用全液丹又青州白丸子各半細研和勻飯飲薄荷湯下一兩半兩許此乃截風回陽又一方以四君子湯加黑附子末四分之二腳手冰冷者用和對半生薑棗子煎與服此萬古人用之豈不同常所較下項良方亦盡世之善也議治慢驚慢脾須禁腦麝膩粉水銀粉霜之項及寒涼動臟脂等或以燥熱俱不可用只宜回陽醒脾湯使與服議慢脾風候十個孩兒有個以艾灸之須當斟酌病候有已來脈絶之理若也一臟絶即不可用藥謂如眼無光指甲黑四肢垂嚲五體俱冷並不可勉強下藥議慢驚風候至於痰涎在膈之時諸臟皆虛喉中聲如拽鋸一二日之間不散但只閉目此乃虛之盛也只是虛痰飽養其氣未有所知之者直便下去痰涎其兒隨時化去宜用下項妙沙丹服之乃良議嬰孩所患急驚慢驚脾三者皆由風痰所作以漸傳及未有初得病而便慢脾或急驚傳來或即吐瀉而得久痢其氣虛脫而得傷寒表裡俱虛傳入陰症亦成慢候久嗽成癇亦傳慢候霍亂吐利亦傳慢候脾困久睡亦作慢候吐血亦傳慢候蟲積衝心亦傳慢候肝風筋憊亦傳慢候大小便閉亦作慢候心虛煩躁亦作慢候煩渴引飲亦傳慢候腹肚㽱痛亦傳慢候睡里咬牙亦傳慢候般日夜汗出亦傳慢候走馬疳急亦傳慢候諸丹毒亦傳慢候龍帶纏腰亦傳慢候膀胱吊疝卵腫莖曲亦傳慢候莖曲陰莖勾曲四體浮腫亦傳慢候以上小兒所患諸疾皆能傳作慢驚風候由慢驚乃傳作慢脾脾氣既絶胃氣已盡無可得而治療故也議嬰孩五臟易冷易熱易虛易實醫方並不治臍受病曰脾不病耳曰非也小兒在腑有疾自愈者有之在臟不可不治臟者陰屬腑者陽屬謂小兒先陰而後陽又曰小兒乃純陽之氣在腑則順在臟則逆故前賢皆理其臟未言治腑也又腎一臟常主虛不可攻療若有腎臟患但清心肺緑心與腎即既濟也肺與腎乃子母也無與腎藥及諸補藥若治腎臟即他病發生故戒上不可療議嬰孩慢候皆由臟虛陽虧陰盛應小兒所患臟病陽虛陰盛者無不入慢候而斃惟吐與瀉痢與積致入慢候其症速也虛又速也宜用良方治法循其次第無不獲安然其慢驚脾無令速愈頓瘳之理既和且平更用調脾養胃萬萬不可過劑用冷熱湯藥若失之即籲哉白殭蠶丸治嬰孩小兒慢脾風候痰涎潮盛不化宜用白殭蠶丸良方制牛膽五味者分白殭蠶去絲炒錢子地鱉五靈脂川者全蠍炒半夏末各一分用生薑汁浸上件為末水煮半夏末糊丸如麻子大每服三十丸煎金銀薄荷湯下議曰脾家有風乃虛所致驚搐所由生也疾涎是故作也陰癇不暴其實驗醫若也意急役之沖烈愈見害重誠為不可所以禁卻腦廣通利關竅之藥悉無利益治法所宜者今選用妙方頓以活人白殭蠶丸一味去痰丸能哉風既已傳八慢脾則風痰混致驚熱交臨醫工看候藥用當權未敢決之可否候未脫去陽者直宜與服之若陽虧陰盛至危至急候變非常精神色脈駭於人情者當服下項良方附硫丸治嬰孩小兒慢脾風候附硫丸散方四肢冷厥服之尤佳黑附子尖二個去皮生用蠍梢七個熟硫黃末一兩上件為細末生薑自然汁和丸如緑豆大每一歲二十丸米飲下黑附湯治慢脾痰盛四肢逆冷黑附湯方黑附子炮取末二兩重白朮一兩南星炮一兩甘草炙一兩半夏一兩湯洗七次上㕮咀每服二兩水小小盞生薑三小片棗一個煎至半去滓通口以匙挑與服所覺手足暖其候漸省藥即止之辰砂膏治嬰孩小兒慢驚風傳慢脾風候有冷痰在鬲潮作不散此疾虛久不可頓下其兒搐緩昏困至重者宜服此方大黑附子一個八九兩重者去皮臍項上刻一孔入給霜硼砂各半兩內在孔中用附術塞燒灰存性天南星炮半兩蠍稍羌活各一兩硃砂上為末以硃砂和勻煉蜜為丸雞頭子大每服一丸至兩丸煎金銀薄荷湯入酒三五滴點化與服議曰此三方皆用黑附子直不可執謂性熱兒在幼小礙與服之其兒患脾風腳手冷者有微有暴審其輕重輕即用湯盛即以丸重即以膏服之皆效須候手足暖陽氣四即為之快矣既已溫暖更以醒脾正胃藥兼服除是慢驚傳入慢脾候方可與服之硫黃其功甚速又且逐風化痰醒脾正胃溫暖臟腑補益腸胃奪命回陽省活危困至良至驗切不可倉皇妄投丸散或爾大過不及之特則致咎於後方宜學受不至誣誕故也七寶妙砂丹治嬰孩小兒慢驚風及慢脾候神情昏困鬲上有虛痰不能得化不可服巴豆輕粉恐動臟腑只將神仙所留妙方與服其痰須臾自下良久神情已定眼目微開漸與溫平藥調理胃氣兼順理驚風藥與服勿更攻擊其方乃一文開元通寶銅錢名七寶妙砂丹錢樣見後其錢背上下有兩月子只有一個月子者不用錢色淡黑頗小諸錢將錢頓𪋝匙頭於炭火內燒霎時四維上下各出黃白珠子遍舷都是捋出候冷傾放茶盞中入硃砂末少許只作一服煎金銀薄荷湯送下多枚此錢準備緩急或先燒成珠子收拾亦得此方墜下小兒虛痰別無它作症候者用之乃保十全功效無可疑訝議曰調治嬰孩小兒慢脾風候無過前件藥對症克效須審慢脾已傳未傳之理其兒眼開未合尚在慢驚腳手不冷之時未可便與回陽且與七寶妙砂丹一二服眼合沉困陰症極盛者方可與服回陽凡服回陽醒脾湯劑手足漸暖仍與觀音全蠍散及醒脾散兼服九慢脾風候最為惡證只可前方調治雖曰緊急不得並雜用之泛泛不惟無益任勞其功虛延其候間養其疾此疾傳陰陽重病盛如燈光油只見次第蛻去若不助陽生胃只知截風去驚兒痰轉見增長且兒陰症未至十分與藥加其寒涼攻得陰重陽虧難以救療若此共其陽氣隨陰而化所謂制之在始元在前藥醫慢脾風症候如其所述用藥由可救活若鄙夫意見不同難以省活噓哉癇疾症候上方具述多端王氏著載有三驚癇風癇食癇風癇之疾由於風熱而作驚癇之疾由於驚積而得食癇由於食時而得其驚三者發作大抵相類風癇有熱生痰驚癇神魄散亂恍惚無定食癇因食而致驚食未克化氣停關鬲之間生痰致風由風成癇議治風癇先用化痰寬利胸膈開通關竅安鎮心神定其搐掣然後與治風癇藥服之議治驚癇先涼三焦利驚去熱安神定志平調臟腑濕化痰涎然後與治驚癇服之議治食癇先用推下關鬲停積驚氣次和順中脘次安臟腑然後與治癇藥服之議曰驚之與癇風之與熱皆遍相襲有熱必恐有風有驚必懼成癇治風先退其熱治癇先用散驚此乃至要之識學者當明其理所言癇之為疾古述繁多或云六畜牛馬雞羊豬犬其聲音相類形體相尚有若六畜之狀故得其名寶鑑載云一百二十種其説大繁其傳乃執但是癇藥無越三症皆由所生總而言之不必煩求有誤初機枉究遂成艱學如此一病尚陳羅縷向其驚風者乎王氏蠲之得其詳要以合禮法今則著書特示良妙截治至簡庶幾所受頓漸瘳愈靡不快歟學者深詳必無枉冤治小兒食癇先用真珠天麻丸推下次服定癇妙藥治小兒風癇先用化風丹去其風熱次服定癇妙藥化風丹法制黃牛膽二兩羌活獨活各一兩天麻防風甘草荊芥穗人參川芎上為末煉蜜為丸如皂子大每服一丸薄荷湯化下服議曰風之為病其狀多端皆由腠理疏弱榮衛虛怯經絡不順關竅閉塞其氣霾痊爵勃音弗其脈凝注有同天地晦冥日月暈蝕颷暴發與精神俱漬者一身四體皆不我有是謂風癇之至也所謂化風化其所受之風不待久傳迅變凡該五臟蘊熱三焦作壅速與流利熱即風生壅即風長關竅不通其風何能自散若言化之即順助之其榮衛經絡順得流行若也便與截風定搐為已成癇其風不散若更攻擊即衝任百脈雖不發作畢竟隱伏久而再發無能去根此方得名化風不復加進矣比金丹方人參白茯苓遠志去心山藥辰砂天麻各一分石菖蒲川芎甘草炙各一分天南星炮二兩生薑汁製麝一上為細末煉蜜為丸皂子大每服一粒煎金銀薄荷湯化下議曰風行於四時和順於內外長養萬物能生能敗法令至周惟風之德夫人一身亦同天地順則和逆則害所發之風由其虛而作應其熱而生有其痰與熱而發其驚關竅不通氣脈流注遂有傳變於身為害當用逐之何向童稚幼雛嫩嬌危脆百病總歸於可豈可取次疏怠凡治風有法度不可極力施功若停待即須臾而更倉皇即拙謬而失深意審詳隨其逆順以療之襲逐在後預追不及聽載在前猶化不盡者正謂庸工醫之陋也善治驚癇也化其痰和其氣鎮心神安魂魄通關竅順經絡使其榮衛常順流行調其臟腑長和充實邪自和生風從何入雖有些小自然而散此癇由驚為疾豈可見留常令血脈充肌膚壯頭目清精神備飲食即睡臥穩寒暑知時臟腑常固其經絡自和榮衛自順比金之名決定不壞斯乃順調善攝而已奪魂散治定癇良方奪魂散白殭蠶去絲炒令黃色半兩蛇含石燒紅用米酣淬七八次碾碎白附子炮各一分生銀生金牛黃如無以膽制倍加用之鳥梢蛇頭七八寸許酒炙白茯苓天麻各二兩天南星稱末一分生薑汁浸一宿用半夏末二兩生薑汁浸一宿各焙赤腳蜈蚣一條酒浸炙令焦犀角鎊二兩腦子麝上為末蒸棗肉為丸如大每服十丸至十五丸二十丸煎金銀薄荷湯下硃砂為衣議曰癇之為疾又是一種症候若言驚風所傳古人有謂食風驚三癇若言不於驚風所傳古云驚風三發便為癇且癇為疾痰熱壅盛傳入經絡塞於心肺是致關竅不通故作癇疾發作有如驚風天吊或因驚而生痰多或因熱而作風盛大小便不利上下氣不通心神悶亂若因而復生生而復死沉沉默默無由蘇省忽爾氣透關竅漸得開通魂魄稍得安定向後心被觸腦氣不宣利發作如前是知癇之為疾乃由虛痰冷涎頑結子胸臆驚風並聚於關鬲常無精神心致不寧即存恍惚療理不專藥服不收必自致害何足怪者耶奪魂散方經效祕傳修合如法活神驗豈非至寶之謂也
