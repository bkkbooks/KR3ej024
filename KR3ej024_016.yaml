body:
  text: 卷之十六議十種熱症候醫云熱有十種驚熱疳熱風熱潮熱傷寒熱瘧熱積熱丹熱瘡疹熱餘毒熱議曰有驚熱即有風熱此言驚風熱又有風卻熱乃感風成病類同傷寒熱又傷寒熱類同瘡疹熱又瘡疹麻豆之後有餘毒作熱其傷寒後亦有餘毒作熱議積熱有同痞熱發來潮作又似瘧熱綜曰潮熱蓋發作有期議丹熱疳熱各自體之不類諸症今將得效所治諸熱良方有四主治分諸熱症悉有功效非特觸類而分之乃是所療治其根本而已無不應驗更不兼他藥只此四方克效萬不失一載列在下請宜審察投藥隨病瘳愈神莫能冠僕盡心討論以其簡要不憚煩勞去此就彼檢閱再三猶若良將用兵奇正敵冠難有凶惡必不能逃竄其病候或有同異其症候無過於折類為定必不疏遠綜錯矣自時退熱之理秘不可傳道由心悟得之可謂醇乎醇善之善者耶議類症諸熱議血熱即遍體生瘡痍瘑疥瘙癢及重發作丹毒龍帶之屬議骨熱即外冷內熱其病骨蒸候議實熱即氣脈壯實五臟六腑氣充大便硬少或閉不通議虛熱三焦不順五臟不和欲作疳候啼哭煩躁夜出虛汗或瀉痢後有熱議三焦熱即上鬲虛煩作渴頰赤驚悸夜後啼哭睡中譫語議五心熱虛煩多驚小便赤澀睡不安穩氣粗或作瘛瘲議肝經熱眼目赤腫疼痛眵淚羞明或筋脈拘急有夾風痰議肺經熱鼻塞生瘡不聞香臭或餘毒不散議胎熱兒在胎中受母飲食榮衛不順有餘毒之熱發作眾疾或從降生之後常作熱症議傷寒後餘毒熱雖曾解表餘熱傳脈或入經絡久而不散議瘡疹餘毒熱其兒所患瘡疹不甚快速有餘熱留滯在百脈之間議項上生核作熱軟大微紅者名驚氣核小三五連連長短相類雜者乃餘毒熱亦名驚癧初生乳幼者有患之議三焦蘊毒熱上攻咽喉之外名作腮熱氣血凝滯經終不行熱毒攻注故生癰癤議麻豆作熱類似疹候麻子乃腑受病屬陽故易調理雖不服藥亦能自愈只恐吃毒冒風為之逆也議溫氣熱即是時氣溫熱相襲而成小兒又令有時氣之溫未經患瘡疹者即重蒸大小相傳皆作是疾議小腸熱心經不利小便淋澀或筒管內疼痛議胃熱作氣口臭或發嘔逆不思飲食亦由胃家虛熱得之議脾熱口若昏因喜睡因吃食毒物積聚在脾不化腳稍冰冷議邪熱肺經感受寒邪陰陽二氣不正痰涎咳嗽議寒熱謂先寒後熱其狀如癨乃虛中有積凡兒患痞癖癥瘕皆作寒熱潮發議傷風熱鼻聲重頭痛腳熱類如傷寒候議傷暑熱煩躁引領頭目昏重時正盛暑或曾感冒議榮衛即血熱也議衛熱即氣熱榮衛不順即氣血不相參虛之致也議筋熱咬指甲見血議腎熱病作崩砂黑齒爛齦以至走馬疳極候議煩熱即啼之不已議躁熱即哭之不已皆由三焦不順心中積熱虛煩躁悶議變蒸熱只在五百七十四日之內三十二日一變六十四日一蒸在其數發作者應也議大腸熱乃是肺家有熱在裡流入大腸秘結不通議癮疹熱乃是肺經有風在表肺主皮毛故生癮疹風議痰熱因感風生痰在上鬲久不化作熱或在逆噁心議驚氣熱良由小兒受驚其驚氣不散留在上鬲無得自化故作熱毒攻在頤項之間議肚熱即是積熱症若加腳冷當與下之議客忤熱初生之兒親戚外來兒觸其邪以亂其正故作熱議癇熱驚風不散聚在經絡或入臟腑其候常發不省人事議瘛瘲熱亦驚之所受入經未傳散略作搐掣以上諸症受病治法分類於後分十種熱症附諸熱類驚熱癇熱驚氣熱瘛瘲熱客忤熱五心熱傷寒熱傷風熱傷暑熱夾驚熱夾食熱疳熱虛熱煩躁熱筋熱骨熱腎熱以上並宜與服蔥根脫甲散風熱痰熱變蒸熱肝熱大腸熱癮疹熱並宜加麥門冬子去心煎丹熱實熱血熱三焦熱小腸熱龍帶熱並宜加大黃及燈心煎瘡疹熱麻子熱溫氣熱已出症熱未出症熱並宜加紫草茸川當歸同煎餘毒熱胎熱肺熱傷寒後餘毒熱瘡疹後餘毒熱並宜加薄荷煎項上坐核作熱作腮熱癰癤毒熱並宜加大黃朴硝煎以上宜服大連翹飲子隨症加前件湯便同前潮熱榮熱衛熱瘴氣兩日一發三日一發積熱脾熱胃熱痞癖熱肚熱癯熱邪熱寒熱脾癯鬼癯夜發單瘧熱以下宜服梨漿飲子八種虛痢作熱吐熱瀉熱霍亂吐瀉熱以上並宜服正氣丸調胃散用調助胃氣不可以涼藥退熱胃氣和其熱自然而散愈虛中積熱腹痛積熱蟲痛積熱以上並推下積脫甲散亦名蔥根煎散調理嬰孩小兒傷寒體熱頭目昏沉不思飲食夾驚夾食寒熱大小便閉澀或赤或白煩躁作渴冷汗妄流夾積傷滯膈滿脹急青黃體瘦日夜大熱及療傷風傷暑驚癇客忤筋骨腎臟疳氣等熱並宜服之脫甲散良方柴胡三兩去蘆川當歸淨洗二兩龍膽草三兩去蘆白茯苓二兩半人參二兩知母三兩甘草炙四兩川芎二兩麻黃二兩去節又根一兩仲上件為細末每服一大兩水小小盞入小蔥白連須一寸同煎至半溫服不拘時候議曰此方散熱扶表救里表虛令汗不妄行裡熱令氣不閉結外即遍關內即開渠通關流行經絡開渠不壅臟腑然其知母當歸順正陰陽人參甘草和益腸胃柴胡川芎敵去寒邪茯苓龍膽止汗生津麻黃去節留根功全表裡蔥白連須出汗效正盈虧熱在表裡之間施無不可積傳鶩癇之候用立見切蔥根至良號曰脫甲奇妙述難盡議書載易詳但專誠用之對症功效率無見誚者耶大連翹飲治症在前連翹瞿麥穗滑石車前子牛蒡子炒紅芍藥各一兩山梔木通川當歸防風各半兩黃芩去心一兩半柴胡去蘆甘草炙各二兩荊芥穗一兩半蟬蛻去大腳一兩上件一十五味㕮咀每服一大兩水小小盞湯使在前議曰此方解利心經邪熱心與小腸受盛小腸乃水竇常宜通利壅則結滑則脫熱則澀盛則淋平涼心經三焦自順不待疾作而解症成而療者疏怠有之矣一十五味加湯使在前才覺蘊熱客熱寒邪風邪胃入肺經心將受之心不受觸傳於小腸或閉或澀或赤或白淋瀝不通榮衛不順壅之作疾其發多端以至鬲熱眼目膻赤唇口白瘡津液不生涕唾稠盛雖在表裡俱得其宜驚風悉能散化痰熱亦自消除連翹之功不虛設爾梨漿飲治症在前青篙取花頭用童子小便浸一二次日乾為度柴胡去蘆人參黃芩去心前胡秦艽去土甘草炙上木分㕮咀每服一歲兒半兩兩歲一兩匕水小小盞入生藕生梨梨條亦得薄荷二葉生地黃一寸同煎至半去滓通口空心食前服兩滓並煎作一服議曰此方治脾積寒熱其狀如瘧乃由脾氣陰陽相勝故也其寒在先陰勝於陽其熱在後陽勝陰陰陽循之經絡傳歸於本依前復作不越三日而止重則頭痛嘔逆久則二三歲不歇左脅有塊小者如桃李大者似壞堞治法下去症積痞塊自消然寒熱亦未能自解宜先與服梨漿飲連滓並三服定去寒熱了方可下積問之藥性寒涼何以御之答曰所謂先寒後熱猶陰陽勝伏遁相更變陰積陽虧逆之致反故寒極熱生熱極陰作反汗自汗表有少解氣聚復作氣虛愈重所服梨漿飲以毒攻毒藥用青蒿以寒禦寒其熱不有寒必無加自然藥與衛陰與陽合寒熱再潮未之有也和梨漿之功妙哉絕倫稍能知用無不得安若患三載不過兩服曾經十年只以此方妙用至純使人欽嘆而已正氣調胃散治嬰孩小兒八種虛痢作熱或吐或瀉發熱霍亂上下氣不復常心虛煩悶木作熱並不可加用寒涼之藥宜與服此方正氣調胃散兼生熟飲子如不納食宜服參氣紫蘇飲子正氣調胃散良方厚朴一兩生薑和皮二兩搗壓在缽中一二宿常番轉取二日乾慢火炒半夏一兩洗去浸七次白扁豆炒藿香葉陳皮各一兩甘草炙薏苡仁炒各半兩白茯苓白朮上為末每服一錢匕水小小盞生薑二小片棗子同煎議曰吐瀉作熱由其陰陽不順邪正相干臟腑不和上吐下瀉又有隻吐而熱者又只瀉而熱者皆是運動真氣上下不升降又吐瀉俱作曰霍亂其兒陰陽二氣不正臟腑愈虛且吐且瀉加之盛也不爾風生作疾候變即慢脾風病家不知其理醫工罔究其詳古人不述其微致後學必招利害今知吐瀉疳痢熱自裡虛發作豈可解利其表若也攻裡由虛生虛循此調理可得其宜大小一同輕重盡善至理之言明智可鑑議吐瀉詳症六法所治議曰脾不和即胃不生榮不足即氣不正胃乃脾家之本榮乃衛室之根根本堅固百虛不作表裡充實諸邪不入治法服藥有六合分水穀即與五苓散服合退暑氣即與香薷散服之合均陰陽即與既濟丹服之合溫脾胃氣調順三焦去濕即與理中丸服之合平正五臟氣散虛溫中即與正氣調胃散服之合溫中脘醒脾和胃去虛助氣開胃進食即與分氣紫蘇飲服之以上六症用藥皆和調順臟腑且臟既溫亦和既正且順熱之一木自然散此示症候萬一不可直便用寒涼藥退熱若將熱藥止吐與瀉攻發陰陽二氣差錯致作風生逐急醫風又投涼藥取次施為皆為乖繆由是吐瀉之熱不可用以寒涼或致反誤利害應時矣議潮熱有五一因傷寒之後餘毒不解成潮熱宜服脫甲散兼小柴胡湯二因痞氣有塊陰陽不均成潮熱先服梨漿飲次三稜煎丸三因癥積食傷冷滯脾胃不和成潮熱先服脫甲次拓氣下之後調胃四因陰陽不和臟腑虛怯成潮熱或胃暑濕脾瘧成潮熱單服煨姜散五因瘡疹後餘毒不解成潮熱宜服大連翹飲子更與助胃氣議曰潮熱謂熱來之有期或百一發或兩日一發或三日一發不越三日先寒後熱正定來者易治亂日者難理疾起脾胃即是瘧候同出而異名只有單熱潮發之作疳長作勞若症積傷冷積滯痞氣皆腳冷渾身熱若有蟲積其肚亦熱如火凡兒有患腳冷肚熱者便與下之須量熱輕重分數而利有蟲多者取之少則安之取蟲宜在於春旺冬實之時其或兒壯蟲盛不拘此說議痢熱凡小兒患痢之時未熱久則氣虛其臟腑虛極作熱此屬惡候才見痢候作熱此兒臟腑虛弱同於虛熱主治其或三焦熱引飲不歇四肢浮腫者理宜溫補臟腑散除濕氣喘則難治凡痢熱疳熱吐瀉熱並不可發散退熱不任寒涼藥但理其病源調其臟腑和其榮衛主其胃氣令進飲食次與痢藥服之參酌赤白多少膿血相雜裡急後重用行血厚腸胃和中脘溫臟腑其熱自然退愈凡兒患痢不問輕重悉禁葷腥冷熱炙爆醃藏應毒之物若恣口腹愈而復作若也求安須用戒絕之矣議曰幼幼患痢悉由積毒而受虛熱而發三焦不和五臟蘊伏冷熱相攻陰陽反逆是以作疾腸胃洞虛所言正患之時不熱稍愈其體溫壯眾莫能知此等皆由勞其形役其氣食其毒觸其臟餘毒不化所以作熱隱伏於百脈經絡之間與由歸本若更逐抑何得而安所用正氣謂胃智者默而唯然疳痢之熱安自內和若和則上下氣相承表裡相順使飲食以自然而然行坐以快樂而樂是謂和矣其或感眉垂首桎腹操臍撼體拘攣焦唇煩躁皆由不和也所欲和者食飼粳粟藥餌參苓蔥湯滌臥避風濕仍常以肛調胃散與服雖疾無加惟熱必愈能禁能戒且安且樂而已議積症應諸家方書並不言盡者蓋所患只因五臟受病從陰成積其脾主食由食生冷果子甘甜熱毒亦物積在中脘不化久而成疾故名曰積積之為患有輕有重其類多端病候不一豈可概舉凡小兒有積熱無不肚熱腳冷要知輕重但約肚熱為之分數其肚有及七分脹五分熱亦有三五分脹七八分熱者盛則兩脅膨脹緊滿既有此症須審其候方可服藥庶不致誤矣議曰固積病久傳作腫脹小兒腫脹之病下項諸症皆由積毒患不治而漸變作症候隨其輕重所發是以不同應小兒食肉太早無不有積因積不化無不成疳飽飫過度無不氣脹由脹受濕無不發腫頭面腳手虛浮者濕在於脾理脾去濕隨手退愈若腹肚脹腫光膨盍急至於作喘所謂乘虛入腹與疾難醫不可容易轉動臟腑須究榮衛虛實若虛及分數先宜調中理其固實方可疏利若理不能充實則壞症虛敗豈可轉動不惟無益恐涉深害
