body:
  text: 卷之十七總論腫脹腫脹二症此由虛中有積久患失治漸傳作症候傳化多端隨虛實按輕重察盛衰審表裡主治先固其本後正其標得無恙矣腫受濕腫腳手面目虛浮食毒氣腫腹肚腎蠱脹急傷寒虛氣入腹腫瀉痢虛氣入腹腫氣虛腫血虛腫榮衛俱虛腫脹疳氣脹疳極脹疳積脹氣積脹痞氣脹癖氣脹症積脹鎖肚脹急上鬲脹中脘脹食傷膨脹蛔蟲脹脾氣脹冷積脹虛積脹以上腫脹虛積並當下之用藥各有法度議腫受濕腫傷寒虛氣入腹食毒氣腫瀉痢虛氣入腹議曰此四種所患病不相同皆由虛盛而得之受濕謂脾胃受濕冷久不克化氣浮四肢頭面皆腫食毒氣由脾胃傷之冷積毒氣停留胃脘致虛入腹作種傷寒由下之大早乘虛入腹作腫瀉痢之久脾氣亦虛是以致腫以上宜平調胃氣補臟充實方可去腫先服四味理中丸減半乾薑加白朮桑白皮同煎傷寒虛腫加枳實作喘加淡豆瀉痢虛腫服正氣調胃胃氣既壯以救生丹利之其腫即退再調補臟腑用觀音散良益固平復矣氣虛腫亦名氣蠱血虛腫亦名血蠱榮衛俱虛腫亦名氣血蠱議曰小兒所患腫脹一門最為要急前人少有究竟然腫脹已作皆由榮衛不順臟腑怯弱壅滯三焦流注百脈表裡俱虛邪正相亂所以致受四大浮盛腹肚膨滿多由食毒得之飲食得之症傷得之飢飽得之積久不化諸虛所入故成斯病病由虛得或則妄亂通下因虛致虛根不能去疾加已盛是謂壞證危候智者怯而為辭庸者暴以攻擊二醫不同誠屬難治原夫智者商之謂商量斟酌輕重良者審之雖曰良工由宜審其可否之意疑者塌之疑其病盛不可利只宜與塌其氣明者起之明其虛實已定良方起活謹遵其理始可調治藥用至真對症克效即無恙矣以上先與服榮衛飲子次服分氣飲子榮衛飲子調補嬰孩氣血俱虛榮衛不順四肢頭面手足俱浮睡以至喘急者並宜服榮衛飲子良方川當歸熟乾地黃淨洗人參白茯苓川芎白朮甘草炙白芍藥枳殼研別制黃耆蜜炙陳皮上等分㕮咀每服二錢匕水小盞煎至半去滓通口不拘時候議曰榮者血溫流行於脈衛者氣順調和於絡是故榮行脈中衛行脈外陰陽相安循環無正自幼至長不離呼吸無少滯礙其脈方調其氣乃順呼吸之間脈不應息氣有違滯流注經絡隱伏臟腑虛熱則發癰疽背部實熱則患瘡痍瘑疥況其榮與衛陰及陽偏枯有作易感寒邪亦易致虛百病皆由茲始此方最良雖兒幼小並可與脈以肚其根血榮氣衛順且和矣腑寒臟虛溫且壯矣盈虧自然而平法弱自然而正陰陽調均氣脈充實乃曰妙工分氣飲子調理小兒腫脹作喘氣短促急坐臥不任四體浮腫飲食嘔逆神困喜睡宜服分氣飲子良方五味子桔梗白茯苓甘草炙陳橘皮桑白皮草果去殼大腹皮白朮枳殼去穰切炒川當歸紫蘇蘇子半夏曲上等分㕮咀每服二大錢匕水小盞生薑二小片棗子半個煎至半去滓通口不拘時候兼八味理中丸煎服以上宜用救生丹通利議曰清濁無混邪正不幹上焦得之清涼下部受之溫暖氣滯則少升降血虛則多流注雖是乳子呼吸一息其脈有至徐徐應指不違其數者亦同大人流行但隨小大受之短淺而已若也留滯其脈遲數於病大過不及者有作善主療治鬱則分之逆則順之停則利之滯則降之調理之法先宜以順其氣大抵嬰孩氣順即易治脈壯亦易理證候梢傳郁逆停滯當以先明不待傳入而後究竟此方分氣預宜進益與分水穀之分者不同為用明者察之致迂曲大效神功救生丹治小兒氣虛喘息四肢浮腫腹肚脹急衝滿脅肋乍熱乍寒或瀉或祕皆由久停虛積榮衛不順宜用推去其惡毒之氣神功救生丹良方雄黃令研硃砂各一分令研巴豆二十一粒去殼乾薑二錢上用水醋一盞以巴薑就煮令乾去薑不用將巴出油和推朱研勻雪糕搜丸如麻子大每一歲三丸並用酒浸赤為藥以少許送下議曰夫幼幼受疾其來發端無過驚風痰熱疳積吐利而已前賢衆多述論症候編者方藥究竟推詳各有確實奧見其有無辜疳積異作症候著千篇集或有罕見其症未詳其理者盡世難測難知如龜胸決肋猢猻禁是也又復有壞症惡候自服諸家丸散輕重桐投愈之不得全功疾之加為他害提脾風之類是也悠悠既久方法何宜學醫之士遇此等病未嘗告辭而屈若能此附觸類調理雖則未效猶尚庶幾多是肆臆勉強而為稍或得失利害甚重今議救生丹方載談氏所療無辜積議效驗至良晚進後生聞而知之且驚且喜蓋渠未嘗知用若也參究而又意到即參功以副全功然後乃謂神乎微乎其妙至理醫工於此等症候須當至誠施設活幼起孩十舉十全百發百中矣議脹疳氣脹疳極脹疳積脹氣積脹議曰小兒患疳症候皆由虛所傳積乃為母積既已作虛氣傳授逐成疳疾其名數種皆漸所致不可更與通利尤加重候即宜和益消疳調氣若尚有虛積便白後重當兼塌氣以去之先與服神功保童丸以至泄氣為快既泄虛氣即散放臭屁是也不傷其氣功效至良應患疳積便利無度大有功效褐丸子治小兒陰陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄瀉頻並腹中冷痛食症乳癖痃氣痞結積聚腸胃或祕或利頭面腫滿不思乳食乃療五種疳氣八種痢疾飢肉消瘦氣粗腹大神色昏憒情意不樂常服散冷熱氣調和臟腑去疳積止瀉痢進乳食生飢肉悅顏色功效非常不能縷述褐丸子良方蘿蔔子二兩微炒陳皮青皮去白各一兩黑牽牛一兩半半生半炒爆尤佳京三稜炮一兩蓬莪朮包兩胡椒半兩木香三分又一方加胡黃連半兩苦楝半兩蘿蔔子只使一兩上為細末麵糊為丸麻子大每服三五十丸煎蘿蔔湯下議曰症候不明醫之過也丸散不良士之繆也去醫裁藥審證察候猶若權衡以究標本醫藥純全之道凡調理小兒雜病須究疳證積候乃五臟所傳及至變作他患殊失源流迷而不反所以作疾此方最善寬腸下氣散結去郁其疳與積已作米作順傳逆傳並皆宜服功蓋常方大厚腸胃充實臟腑按症所療無不克效京輦之下作疳藥貨賣名聞四方活幼多數今不隱藏故述詳悉請敬用之痞氣脹癖氣脹症積脹議曰痞癖之氣同根異名作疾有塊皆在左脅男女亦同然痞者陽症癖者陰症緣小兒脾胃不和陰陽二氣交錯冷熱相制皆由積之所致故先寒後熱一如其虛汗出則息若先下卻其積則熱往往不去及增加重而又作腫虛滿頭面凡兒有是疾醫者不可輕易投砒治之其砒有大毒沖胃三焦作渴引飲水停在脾脾屬四肢亦作浮腫重則致喘煩躁虛悶倦怠不安砒之為藥豈可妄投宜先與服黎漿飲加湯使如法取令寒熱退三五日了卻與三稜丸磨化積毒以利為度去其根本若未通更服三稜煎丸治嬰孩小兒食傷生冷黏膩熱毒等物脾胃積滯久不克化令兒肚熱腳冷痞癖寒熱及療癥瘕中脘不和膨脹上膈氣壅心腹不得宣通所以作疾此藥溫良但是諸積滯食不化並宜與服三稜煎丸方京三稜蓬莪朮並炮各半兩羌花一分鱉甲去裙米醋炙令焦半兩淡豆豉二兩重巴豆二十一粒去殼川當歸半兩杏仁去皮尖一分令炒赤上前六味一處以米醋一碗煮令乾仍就炒起更細截焙為末次入當歸末又入杏仁巴淡豆和勻水煮麵糊為丸麻子大每服二十丸生薑湯下大小加減服之議曰此方亦名消痞丸又名化積丸其藥破氣行血和脾開胃應痞癖癥瘕諸積氣滯並皆療之噫調理嬰孩之法預究脾胃之源脾胃者乃飲食之臟腑也古云人無根株飲食為命然飲食之物有所宜則穀氣消血脈勻則肌膚壯精神爽有所不利則腸胃虛肢體瘦面目黃疾病作是以藥固臟腑其胃氣和即穀食自然留之其脾胃壯即穀食自然磨之若飲食遲化即氣弱飲食不化即氣虛小兒服此初安臟腑次益肌膚三焦既順百脈俱調效驗至良醫痞第一鎖肚脹急議曰此一症候兒在胞胎中無恙只由初生七日內有患觸受而成急如水火其作延久漸見加重以至肚上青筋撮口不乳其候甚速得名脹急其兒感觸邪氣入腹衝心不能自化遂變風候及至成風不可更投藥餌雖然鎖肚撮口不乳其色未變精神未亂者速便下藥以通為度方通便安功效至聖無可疑者兒已獲安吻乳如法漸次氣肚肉重歡悅可愛宜服真珠天麻丸方在前急驚證內附初生鎖肚撮口施藥法説夫人才生下男女忽有一症男在三五七女即二四六日奇偶之有數陰陽之顯道者遂感客忤邪正相干令兒肚緊青筋禁口不乳此由客情外來致襲其邪陰陽不順胃觸其正初生男女氣脈未定精神未全不經邪氣所以古人禁客一臘遠其此禍邪謂淫欲交適殺氣侵臨應非禮不正之屬總皆邪屬上古醫家著述繁雜難窮至要世俗雖有加文理無灸法血氣方生豈固經絡若以艾炷即為虛設既受此厄越日移時母泣父啼痛心待斃咸謂傷嗟誰可與活僕參執幼科傳授四世𭷱緣回祿之難淬遜三紀一日扣遇高明深詰其妙方藥祕傳屢用獲處嗚呼天地生萬物惟人尊貴人能稽仰於天地之間且天地豈特害於人自是事在遇不遇之如此稍有感傷悔怨執滯於人情者多矣僕輒行小惠普濟初生躬對神聰選材修合其或高下民戶生兒有被此難無問輕重不拘早晚施與良餌決定保全頓然蘇活豈小補哉上膈脹中浣脹食傷膨脹議曰膈與浣上下相承膨與脹輕重自別脘受疾久則痞悶膈作病停則鬱結是和膈隱胸堂脘臨脾胃膈者猶隔也有如隔礙脘者猶管也通即流利二位皆由食傷宿冷眠臥過時停滯氣不順於三焦怯弱脈虛傳於五臟所謂脾不磨食不化胃不開食無益所以膨脹若於膨脹之時不與消利遂致虛滿又於虛滿不為疏補其氣即攻中脘又於中浣不化即冒上膈既在上膈為疾必作形症傳即為重醫莫容易取愈食傷膨張宜服三稜煎丸中脘痞脹宜服王氏塌氣丸上膈郁脹宜服大茱連丸大茱連圓治小兒飲食過度膨脹胸膈上下氣不宣通鬱滯迷悶情思少樂大則作喘強食不化作渴煩躁坐臥不任肢體倦怠腹脅疼痛宜服大茱萸丸良方蓬莪朮京三稜各一分醋煮乾薑炮青皮陳皮並去白木香丁香各二兩巴豆二十一粒去殼心膜出油緣小細茱萸二錢上為末醋糊為丸麻子大每服七丸至十丸大者加服生薑棗子湯下議曰痞鬱結注所因脾胃飲食生冷黏膩積氣不化滯在胸膈乃總名上曰三焦下曰三浣上下相貫來去相侵虛處所受弱處所發致疾乃因久不克化成害或由常不宣通癥瘕痞癖積之所由至疳痢吐瀉積之所因作今用此方大寬胸膈平厚腸胃正氣溫中消疳磨積能止吐瀉進美飲食藥有神功尤宜察症蛔蟲脹議曰此症候作與脾氣冷積虛積大抵相似然小兒腹肚緊脹天明吐津沫要羹肉吃方少安乃蛔蟲候脾氣多噎逆飲食不下虛中有積腹緊吊痛冷積脹緊膨滿心腹不仕坐臥兩脅心鬲上下攻刺疼痛內蟲痛脹先與下蟲丸殺蟲其蟲困次與水晶丸推下餘症各與調胃藥服卻推下積宜服小兒沉香煎丸小沉香煎丸乳香沉香各一錢肉豆蔻一個煨杏仁一兩炒百草霜一分木香丁香各一兩巴豆十四粒出油如霜上為末煮酒封頭蠟和為丸如緑豆大每服三五丸淡生薑湯迸下應患肚痛不止服之功效常服以通為度議曰此方乃感應丸加沉乳二藥是也療小兒虛中積症症積疳疾冷積食積脾氣乳積腸胃久虛臟腑中脘不和痞氣鬱結或瀉或痢或嘔或噦腹肚疼痛兒體虛羸不堪動轉者並與服之其方此真珠丸等取積大不同耳只恐服此未能能通利若也通利誠為之幸乃曾遂虛存實和脾生胃之藥功無加諸下蟲丸治小兒多蛔蟲亦名食蟲苗蟲亦名疳蟲胃蟲亦名血蟲並宜服下蟲丸方鶴蝨炒一兩光粉炒二兩膩粉二大兩使君子一百個炒檳榔一分生龍牙根一錢貫衆子卯酉日採取者方驗緑色者佳二兩龍膽根二錢苦楝根皮酒炎二錢上為細末水煮麵為丸如麻子大每服三五十丸空心食前甘草湯下或以楮肉清汁羹與服尤妙議曰小兒疳積蟲積皆由食肉大早脾胃本弱受之不磨症傷不化何況更加肥膩冷硬之物腸胃虛怯肉積生蟲只有種蛔苗胃也蛔多令兒喜食滋味內脯之物腹肚緊脹心胸膨滿苗多令兒清瘦神困肚脹青筋疳氣漸盛腸鳴瀉臭食即嘔噦胃多令兒喜食酒肉食不生飢常作困遁嗔脹脅肋煩躁迷悶眠不安席並宜服此真蟲自化盛用利下仍須調胃和氣助之
