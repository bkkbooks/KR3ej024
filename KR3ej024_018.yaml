body:
  text: 卷之十八小兒傷寒小兒傷寒症候止議三種乃為正要有正受夾驚夾食前述傷寒並用脫甲散其病既分三種須當究論輕重鼻塞小便赤咳嗽關竅不通壯熱面紅頭疼體重渾身手足俱熱凡治小兒正受傷寒及感寒邪傷風諸症宜服人參羌活散小便赤色或心神不寧病在表裡之間或再復發宜與小柴胡湯一二服凡治小兒夾驚傷寒神困昏悸頭疼氣粗宜服王氏杜薄荷及消風散凡小兒夾食傷寒即先與微利次與脫甲散或人參羌活散下之紫霜丸為上取微利為度大抵小兒傷寒不可重表亦不重下亦不可並行表下之理今兒虛乏困重即成壞症難療議曰凡小兒傷寒雖無多事須是認症分明應傷寒傷風只可表惟有夾食宜用下之凡夾食傷寒腳微冷似有積症相類但此等傷寒自是不同不可不問知其端的然後次第進藥仍丁寧病家令避風濕與忌生冷勿令強力無恣飽食恐勞胃氣其病再復旦醫家調理即須審度無有是瘡疹盛時及左右鄰舍有無所患之者若或有之亦不妨事但表解藥與服不可妄投驚藥余無恙矣惟有壞症蓋由前人用藥不當撥亂陰陽故致為壞或因觸受風邪故致為壞或因強力食毒故致為壞或用冷溫傷經絡故致於為壞壞則難極治醫學宜乎疚心而已凡小兒傷寒候惟有咳嗽一症不為容易若有此症宜服人參枳實湯克效萬一勿可攻擊善醫者察之為良大效人參枳實湯治嬰孩小兒傷寒復氣不和順喘急咳嗽胸膈鬱塞日夜煩悶神困力乏不思飲食仍療虛痰煩滿頭目昏暈但是傷風感冷咳嗽並宜服之枳實四個米泔浸去穰切麩炒桑白皮半夏湯洗七八次切仍以參汁浸甘草炙白茯苓款冬花五味子阿膠麩炒細辛各半兩去人參一分麻黃去節苦梗各半兩上㕮咀每服一小撮水小盞生薑三片棗半個烏梅少許同煎至半去滓通口服二滓並煎議曰小兒傷寒作熱頭痛等症或已發散退熱或已化痰定喘或已安神定志或已開胃進食兒孩平復父母忘憂喜之甚善尚有一症日夜咳嗽多方不愈良由元受邪氣入肺葉內無能得出不堪吐利何由而安凡兒傷寒後及感風咳嗽不愈者宜服此方湯使煎煎如法碗盛盞蓋將口就吸徐徐服之不過三五次瘳痊此方瀉肺補氣寬膈化痰滋潤五臟和益三焦不惟理嗽調中更善小兒驚熱風痰議曰此名四症已述前篇兼載八候續之今復舉驚熱或並風痰未發陰陽二癇之前醫者即先與化痰御風退熱利驚如此遂病推究不惟繁難乃無法所治是故艱於療理若已向病於症何憑凡此回症相隨不可攻其一也利其驚則風縱退其熱則痰壅久尋茲理未究盡善忽一日省悟錢氏方宣風散正為此等兒孩病設有痰即壅有熱即閉有風即隘有驚即悶昏昏沉沉輕藥不能散重劑恐傷害但與服疏風散較之宣風只欠一味一服之間風痰驚熱悉皆消去神情慶悅四體和安觀其此藥似有狼虎困之即和順惟痰利驚散風解熱只與一服不移其時可見功效嘗見醫工調治此等症候多是疑惑進退怯懼若過其時延其日則候傳變驚目驚作風自風生痰自痰壅熱自熱聚或急或慢八候相從反復傳變遁互發越之時不可得而進此藥然疏風所療四症相待如賊方會極力一沖盡便散敗不致作害及其聚而自散者流入諸經或絡或經或脈故作搐搦引掣等候矣大效疏風散治嬰孩小兒驚熱風痰四證結聚於胸臆之間令兒昏困沉重關竅不通諸脈氣閉所以默默欲食不食欲起不起倦伏不知其症候者但不經吐利宜與服之立見蘇省大效疏風散良方錦紋大黃緊實者三兩重雞心檳榔二重舊陳橘皮去白二兩朴硝一兩黑牽牛一分半熟上五味為末每二歲兒服半兩匕三歲一兩匕先用生蜜調就次煎薄荷湯點與服不拘時候議曰風痰在上即吐在下即瀉諸鬲上下也一服之間決定安樂未可便投他藥恐相致誤常人只和用腦子麝香參苓朮附香附子無擔負之藥似此四症如何和順調理疳疾症候方議議曰五疳八痢本經所載詳明然究竟疳在五臟五病故有五名及其順逆相傳變動臟腑則病不循症候而作者豈可以五疳為數八痢為拘疳者始自於疳痢者起自於痢疳以飲食不節過傷脾胃痢即脾胃虛弱而受積毒治疳之藥理脾胃溫中補氣消疳煞蟲治痢之藥理腸胃去濕調中滋血和氣為上大效使君檳榔丸治嬰孩小兒食肉太早傷及脾胃水穀不分積滯不化疾作疳氣等候宜服大效使君檳榔良方肉豆蔻兩個炮檳榔一個生宣連胡黃連陳皮青皮川楝子肉炒蕪荑炒去皮神麯麥芽並炒木香夜明砂炒去土蘆薈川芎各一兩重麝一字上為末獖豬膽汁薄荷為丸如麻子大每服三五十丸溫飯飲下議曰積是疳之母所以有積不治乃成疳候又有治積不下其積存而臟虛成疳尤重大抵小兒患疳泄瀉無時不作風候者何惟疳瀉名熱瀉其臟腑轉動有限所以不成風候雖瀉不風亦轉它症作渴虛熱燥煩下痢腫滿喘急皆疳候虛症古云疳虛用補虛是知疳之為疾不可更利動臟腑發作之初名曰疳氣腹大脹急名曰疳虛瀉痢頻併名曰疳積五心虛煩名曰疳熱毛焦發穗肚大青筋好吃異物名曰疳極受病傳臟已極熱發往來形體枯稿面無神彩肉無血色名曰疳勞手足細小項長骨露尻臀無肉肚脹臍突名曰丁奚食加嘔噦頭骨分開作湯引飲蟲從口出名曰哺露此皆疳候又因多食生冷疳黏肥膩積滯中脘不化久亦成疳治疳之法量候輕重理其臟腑和其中脘順其三焦使胃氣溫而納食益脾丸壯以消化則臟腑自然調貼令氣脈與血脈相參肚筋力與骨力俱健神清氣爽疳消蟲化漸次安愈若以藥攻之五臟疏卻腸胃下去積毒取出蟲子雖曰醫療即非治法蓋小兒臟腑虛則生蟲虛則積滯虛則疳羸虛則脹滿何更利下若更轉動腸胃致虛由虛成疳疳虛症候乃作無辜之孩難救矣胡黃連丸治嬰孩小兒一切症候及一切虛痢他藥無功此藥極效胡黃連丸方胡黃連蘆薈草黃連肉豆蔻炮桂人參硃砂麝一字使君子去殼木香釣藤龍齒白茯苓以上各一兩重上各生用為細末取獖豬膽兩枚裂汁和末令勻卻入袋內盛之以繩札定湯煮半日取出切破袋子更入莨宕子二兩重微炒黃丹一兩重二味別研如粉入前藥和勻搗五百杵為丸如緑豆大但是疳與痢用粥飲下五七丸子幼者三丸不吃粥飲乳頭令吻能治一十二種疳痢及無辜者功效非常議曰疳之疾危發由於漸痢之覆逆傳自於延延久為逆初見其輕言之曰常後知其重告之無門是以疳痢皆由積毒嬌恣口腹因虛以致虛用害而傷害醫工見有此等自是憂疑病家欲得便蘇豈無性急更音耕遷取活展轉愈深或疳極而膠下痢或熱盛而加作渴或煩躁四體虛浮或飲食一時嘔吐常方不能安愈快劑恐越傷和惟宜服此肥肌丸治小兒一切疳氣肌瘦體弱神困力乏常服殺蟲消疳開胃進食肥肌丸方黃連一分去須川楝子肉各半兩炒川芎半兩陳皮香附子各一分酒煮炒乾木香二兩上為末水煮細麵糊為丸麻子大每服三五十丸溫飯飲下議曰驚疳積痢各分症候用藥今有小兒患疳虛困又作痢疾二候相加最為惡重疳痢並行臟腑虛乏之極熱毒差重皆系積之久滯雖曰系積無積可療乃虛受之然謂其虛補之不及所見其症不得良方以何對治雖獲其方不審其候亦難療也良由脈與病同藥與症對醫工運功扶而起之必得安藥胡黃連丸無以加諸肥肌良方亦佐勝蘭香散治小兒走馬疳牙齒潰爛以至崩砂出血齒落看蘭香散方輕粉一兩重蘭香子一兩末蜜陀僧半兩醋滓為末上研如粉傳齒及齦上立效議曰嬰孩受病症候多疳良由氣鬱三焦疳分五臟內有腎經常虛得疳名之曰急以馬走為喻治療頗難此等一症初作口氣名曰臭息次第齒黑名曰崩砂盛則齦爛名曰潰槽又盛血出名曰宣露重則齒自脫落名曰腐根其根既腐何由理之嗟吁豪家育子餔以甘肥腎堂受之虛熱或緣母在難月恣味珍羞令兒所招即非偶然而作今將祕方述於後又方傳齒立效散鴨嘴膽礬一兩重匙上煆紅研麝少許上研勻每以少許傳牙齒齦上又一方用蟾酥一字加麝和勻敷之議曰血之流行者榮也氣之循環者衛也變蒸足後飲食之間深恐有傷於榮衛而作衆疾其或氣傷於毒血傷於熱毒攻之虛臟所受何臟為虛熱蓋小兒腎之一臟常主虛不可令受熱毒攻及腎臟傷乎筋骨惟齒受骨之餘氣故先作疾名曰走馬非徐徐而作所宜服藥耳露飲地黃膏化毒丹消毒飲其外症以前行立效散及麝酥膏傳之切忌與食熱毒之物此疳不同常症乃系無辜有作醫宜深究保全為上若用常方難擬愈活獨活飲子治腎疳臭息候良方天麻木香獨活防風麝香少許細為末研和入上各一兩重為末每服一兩匕小者半兩麥門冬熟水調下三黃散治腎疳崩砂候良方牛黃大黃生地黃木香青黛上等分為末每服一兩匕熟水調服人參散治腎潰槽候良方肉豆蔻炮胡黃連人參杏仁炒甘草炙上等分為末每服一兩匕小者半兩溫熟水調服檳榔散治腎疳宣露候良方木香檳榔人參黃連甘草炙上等分為末每服一兩小者半兩熟水調服黃耆散治腎疳腐根候良方黃耆蜜炙牛黃人參天麻蠍炒杏仁炒白茯苓川當歸生地黃洗熟乾地黃洗上等分為末每服小者半兩已煎天門冬熟水調服麥門冬亦得地骨皮散治腎疳齦齶牙齒肉爛腐臭鮮血常出良方生乾地黃半兩真地骨皮細辛各一分五倍子炒令黑二兩重上為細末每用少許敷之頻與功效吃不妨議曰本經所載疳症有五謂五臟所受故得其名今述腎疳一臟有五症候者最為要急不可同常此疾具陳有五種候傳迅疾可畏乃知走馬之號不誣初發之時兒孩口臭上干胃口氣息臭爵漸進損筋齦肉生瘡或腫或爛其齒焦黑又進從牙槽肉發作瘡疱破潰膿爛又進熱逼入脈時時血出其熱注久牙齦腐壞槽寬齒脫六七歲孩落盡不復更生豈可治療今以妙方宜速與隨其傳變而理不待疾作而後藥也痢疾症候方議豆蔻散治嬰孩小兒腸胃虛弱糟粕不聚瀉痢不止或赤或白冷熱不調日夜頻並愈而又發宜服殢腸豆蔻散良方肉豆蔻一個煨胡粉炒二兩龍骨生一兩白礬枯一兩上為末每服一兩溫飯飲調服不拘時薄糊圓麻子大五六十丸議曰胡粉即真鉛粉也以鉛法造出韶州名韶粉定州名定粉總名光粉其性殢故用之以殢其腸令不虛滑豆蔻溫臟之藥安和腸胃龍骨白礬澀腸止痢所患腸虛滑下痢日夜無度者服之隨時痊瘥應葷腥之物醃藏之屬悉與禁止亦治秋間白痢至效生熟飲子治嬰孩小兒虛積痢腹肚㽱痛下痢裡急後重日夜無度宜服生熟飲子良方罌粟殼大者四個一半炙此一味去盡內瓣浮楞之者佳陳皮二片半炙甘草二寸半炙烏梅二個半煨淮棗二個半煨生薑二塊指大半煨木香一兩作兩片半煨訶子二個大者半煨黑豆六十粒半炒黃耆二寸半炙白朮二塊指大半煨川當歸二寸半煨上件各半生半熟㕮咀和勻每服參兩水小盞入瓷瓶內煮去半濾滓任意與服至多勿慮所有生黑豆不要打破只丸全同煎效議曰病有冷熱藥有生熟病有陰陽藥有造化病有虛實藥有君臣按君臣以理虛實分生熟而均冷熱治療主本之法也平和腸胃之方也順益三焦之功也安調五臟之至也陰陽既分冷熱既散腸胃既厚三焦既益五臟既順良由藥有造化且水穀自分榮衛自正糟粕自聚飲食自納其瀉與痢何患不愈生熟飲子之功乃盡天下之妙不可忽神效雞青丸治嬰孩小兒一切痢疾神效雞青丸良方木香一兩土黃連一分去須肉豆蔻一個大者生上三味先碾為粗末取雞子青搜藥作餅於慢火上炙過令黃色變紅者稍干擘破碾羅為末白麵糊丸麻子大每服三五十丸溫飯飲下議曰木香黃連一陰一陽藥木香善導水利氣脈黃連厚腸胃二味君臣相佐陰陽相順加之豆蔻溫和臟腑止瀉痢功效彌良凡兒患瀉與痢不問症候輕重並宜攙先與服不問臟腑冷熱愈多愈效然雞青為物有毒是以毒氣引藥致效若去此一味其功不作矣大效至聖千金飲子治小兒脾積虛痢便下五色先由嘔吐後作泄瀉臍腹㽱痛脅肋脹滿受濕虛鳴膿血相雜下如豆汁亦如瘀血日夜無度食少肌羸宜服大效至聖千金飲子良方綿黃耆蜜炙甘草陳皮罌粟殼炙木香白芍藥地榆川當歸枳殼制炒黑豆炒烏梅淮棗白朮訶子炮去核稱黃連上等分㕮咀每服二兩水小盞煎至半去滓通口與服議曰臟腑虛中加燥故患熱痢或爾虛寒乃患冷痢或由暑氣胃之水穀不分或受濕氣臨之腸胃有作或因食毒傷脾肺或因宿冷停積臟腑或觸因表裡不解或因冷熱相承或因飲食過多或因飢餒不及多食醃藏常啖魚鯗或是母懷胞胎恣其口膠積之日久氣不宣通遂令疾患有加發作無度畢竟腸胃虛損日夜呻吟痢下頻並宜服此方效驗若神大艾煎丸治小兒虛痢作渴不止大艾煎丸良方大艾葉燒灰乾葛粉胡粉炒海螵蛸龍齒上仵等分為末煉蜜丸雞頭子大每服一粒至二至飯飲磨化議曰下部既虛無不作瀉瀉之加虛無不成痢瀉痢轉虛故有上盛三焦不順所以作渴渴若不住則瀉不止痢不歇又以止渴其藥性涼瀉痢尤重此方兩獲全功扶救痢疾不致其虛亦不致熱白餅子治小兒秋痢號曰毒痢純下白膠肚痛白餅子良方北礬枯白淨膩粉一兩重白麵半兩胡粉炒各一兩上件和勻水搜作餅如錢大每服半餅大者一餅飯飲磨化議曰秋氣金旺則母虛矣夏月火燥則子困矣夫人五臟六腑乃循四時而行故曰秋濕脾胃若胃口有毒禁閉不食輕粉卻毒次用豆蔻面與吃兼雞青生熟飲潔服開胃醒脾乃愈術蔻面治小兒禁口痢一粒飯一吃宜服術蔻面良方白朮半兩肉豆蔻炮二枚木香二兩重上為末白麵二兩入藥水搜作劑切作條子水煮令熟用蔥白生薑鹽各少許和汁滋味與之看入多少仍兼雞青丸服香脯治小兒刮腸下痢禁口不食閉眼合口至重者香脯妙方晶豬肉一兩薄批作一片膩粉半兩重上將肉於炭火上慢炙旋鋪膩粉令勻炙令成脯每以少許與吃如未知吃且放鼻頭自然要吃此方治胃口有毒至奇至妙疳熱症候方議議曰小兒疳患乃是五臟所受積氣相傳今議患疳有患熱者由其候虛之盛積者乃疳之母所有積不治遂傳成疳又有治積不下其積存而臟虛其疳傳而脈弱臟腑傳過經絡致受由此作熱症候尤重雖不發作風痰畢竟危困沉重經云疳熱症謂勞形作渴虛煩頻嘔不食下項良方過其輕重而與服之仍擇所當勿可縱恣誤致畢違便計利害人參散治小兒疳熱虛煩作渴不思飲食四體沉重服人參散良方人參蓬莪朮川當歸龍膽草根甘草炙赤芍藥白茯苓枳殼浸去穰切作小片用麩炒令赤色上等分為末每服半兩煎麥門冬湯調服無時候神妙宣氣丸治小兒疳熱久蒸肌肉消瘦形容惟悴神情不樂飲食雖多不生肌肉宜服此方大有功效神妙宣氣丸良方蓬莪朮炮赤芍藥川當歸大黃炮鱉甲米醋炙去裙焦為度上等分為細末水煮麵糊為丸麻子大一歲二十丸熟水下大小加減蚵蚾丸治小兒患無辜疳三焦虛熱飲水不歇下痢頻並日夜無度煩躁乾嘔食入即吐如此惡症服常疳藥分水穀止煩渴治下痢進飲食但無效者宜用此方治之隨藥取安一服虛熱去兩服煩渴止三服瀉痢住不過三服諸症悉應克效萬一神聖祕蜜蚵蚾丸良方蟾蜍一枚夏月取生活者乃是溝渠中腹肚大不能跳又不能鳴者身上多痱磊是也上取糞蟲一杓放桶中更以屎灌四維令乾即留得其蟲卻將蟾蜍打殺頓在蟲上任其蟲咀食兩日間用新布作袋包裹小麻繩繫於急流中推一宿明日取上滓干瓦上焙為末入麝和勻湯浸蒸餅丸麻子大每小者二十丸大者三十丸溫飯飲下或用麥門冬子去心煎湯空心食煎日進二服功效如神宜至誠修合
