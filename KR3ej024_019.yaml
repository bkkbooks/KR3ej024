body:
  text: 卷之十九泄瀉症候方儀議小兒泄瀉傷積而作瀉者初以補藥治不止之時須當下去其積推積才下其瀉自止下之宜與小沉香煎丸理虛中積甚良多與服之或以小塌氣丸又不下更與三陵煎服之切不可以宣轉藥恐成滌蕩矣積滯已下與服調胃溫脾藥及既濟丹此乃理積瀉夏月暴瀉由其臟寒虛腸滑利泄速與契聖丹如滑不禁進殢腸散次與契聖既濟丹若洞利其瀉不常發作駭人速與殢腸未子次與朮附湯稍與遲緩其候必更療瀉之理豈可相待病家無知醫工當謹殢腸散治嬰孩小兒腸胃虛寒臟腑久冷泄瀉不止殢腸散良方真鉛粉半兩炒白石脂二錢白礬炻二錢白龍骨一錢上為末每服半錢匕大者一錢溫飯飲調下薄糊作小丸多服效契聖既濟丹治小兒陰盛陽虧臟腑虛寒泄瀉不止契聖既濟丹良方熟地黃一分白礬半夏末二錢生薑汁浸半日乾稱上為末雪糕丸如麻子每服三五十丸溫飯飲下朮附湯治小兒臟腑虛寒泄瀉洞利手足厥冷朮附湯附子半個炮了者白朮一分乾薑二錢炮甘草一錢炙上㕮咀每服一錢水小盞煎至半去滓與服手足暖止之須是洞世手足冰冷方可與服小兒吐症方議所述症候在前今具良方干復其症又有風擁吐即類痰吐治之文氣吐即類胃寒吐理之驚吐即類熱吐積滯吐即類冷吐氣逆吐即類食吐療之八白飲治嬰孩小兒脾虛胃弱膈有風痰水穀入口悉皆嘔噦體羸氣乏飲食不下霍亂吐利神情恍惚心胸膨滿中脘不和八白飲方沉香藿香葉人參草果白川乾薑炮半夏曲白芍藥白檳榔白豆蔻白茯苓白朮白扁豆炒白芷上件等分為末瀉後復吐或吐後復瀉每服一錢水小盞生薑二小片棗子半個煎三五沸通口不拘時候人參溫中丸治嬰孩小兒驚吐熱吐心神悶亂中脘不和漸加恐悸恍惚無定人參溫中丸良方人參白朮白茯苓半夏湯洗七次陳皮肉豆蔻煨上等分為細末蒸淮棗肉為丸麻子大硃砂為衣藿香生薑湯三五十丸不拘時候多服勿慮調中正胃散治嬰孩小兒中脘不和冒氣不正胃冷傷熱吐逆煩悶神困力乏飲食不美虛弱思睡睡不安穩調中正胃散良方加木香名木香散藿香葉白朮人參白茯苓甘草炙陳皮去白山藥白扁豆炒半夏曲川白姜上等分為末每服一錢水小盞生薑二小片棗子半個煎三二沸服煨附丸治嬰孩小兒積滯吐胸堂鬱結中脘痞悶氣不舒暢聞穢嘔逆即吐宜服煨附丸及溫中丸煨附丸良方黑附子二錢末丁香五個上以水搜附末裹丁香再用面劑包於糖灰中煨熟去面為末生薑自然汁丸如麻子大每服三十丸煎薑棗湯下青金丹治小兒陰陽二氣不均霍亂吐逆青金丹良方水銀一錢重硫黃上和硑令水銀不見星只作墨色取生薑汁作糊丸麻子大每服十丸至二十丸用淡生薑湯下豆蔻散治嬰孩小兒虛吐飲食之間便作嘔逆蓋由脾寒或哯無時吐後暈悶胸膛鬱結上下氣逆宜服豆蔻散及香朴丸豆蔻散良方肉豆蔻一個煨木香丁香白朮白茯苓甘草炙各錢重藿香葉一錢上為末煎藿香棗子湯調一錢半服之必效生薑湯亦得半丁丸治嬰孩小兒痰吐風壅所致或因感風痰盛咳嗽作熱煩悶神不安穩睡眠不寧可進飲食或欲飲食食之即嘔蓋由風痰在膈飲食不下先服半丁丸次用正胃散及正氣溫中散半丁丸良方半夏半服者半兩湯洗七次為末丁香一錢重碾碎上將半夏末水搜作劑包丁香再以面劑裹煨令熱去面為末生薑自然汁丸麻子大每服三二十丸淡生薑湯下正氣丸治嬰孩小兒食傷症冷逆不升降嘔吐不已胸膈留停積滯不化宜服塌氣丸或一向只作乾嘔噦聲頻作宜服正氣丸良方藿香葉厚朴生薑制陳皮半夏曲炙白朮白茯苓各一錢甘草炙二錢乾薑一錢三稜炮二錢上為末煉蜜為丸如指大每服一丸生薑棗子湯化開與服鹽豉丸治幼幼哯乳不上宜服此立效兼小沉香煎丸鹽豉丸良方咸豉七粒口內含去皮膩粉一錢匕上研丸如麻子大每服三丸至五丸藿香湯下乳頭吻亦得渴症方儀議小兒渴症一見唇紅如丹三五分者即發三五分渴若七八分紅者即七八分作渴其有發渴唇紅焦黑者即久渴虛盛疾加傳極症候危篤故也凡小兒有疳渴引飲不歇心肺虛熱唇焦舌裂有瀉渴者肌體羸弱神困力乏有痢渴者虛熱積臟眉皺肚痛有傷寒候發渴者有痞癖虛煩引飲不歇俱在三焦不順五臟蘊熱煩躁昏悸神情不樂今分症所受主治用藥治小兒三焦虛煩作渴引飲不歇宜服三黃丸如朴硝小許重作小丸子煎麥門冬飲下治小兒傷寒候發渴唇口焦乾強燥盛者竹葉石膏湯主之治小兒痞癖作渴不止大黃灰餅子主之治小兒熱瀉作渴五苓散如干葛主之煩熱香薷飲如黃連治之小便澀閉水竇不通煎車前渴王之用草前末甘草炙二味煎湯治小兒疳渴蚋子麝香丸主之喘急症候方儀小兒有困驚暴觸心肺氣虛發喘有傷寒肺氣壅盛發喘有感風咳嗽肺虛發喘有因食鹹鹺傷肺氣發虛痰作喘有食毒熱物冒觸三焦肝肺氣逆作喘喘與氣急同出異名別之輕重疾究兩端喘即口開隘於胸臆氣急即取息短滿心神迷悶盛即如之喘促不待傳變宜速降下寬中補肺利膈化痰固氣即愈惟有驚喘暴急心肺干亂停積不散金火相剋逆而不實錯亂血脈擊觸臟腑速療乃瘳緩即加重重即傳變變即八候有作八味理中丸治小兒心肺不和息數脈急上下不升降中膈痞滿郁隘胸臆坐臥煩悶神情不樂飲食不下八味理中丸方人參甘草炙白朮乾薑枳實制炒白茯苓五味子去梗桑白皮去赤皮上等分為細末煉蜜為丸小指大每服一丸淡豆豉五粒水小小盞煎至半去豉通口服無時大效雄朱化痰定喘丸治小兒因驚發喘逆觸心肺暴急張口虛煩神困大效雄朱化痰定喘丸方雄黃硃砂各一錢研蟬蛻全蠍炒地龍白殭蠶天南星白附子炮各一分輕粉半錢重上為末麵糊為丸麻子大每服三十丸薄荷茶清送下食後服又方定喘飲子天麻防風羌活甘草炙人參苦梗白朮川芎半夏曲上等分㕮咀每服二錢匕水一小盞入麥門冬子十四粒同煎去滓通口食後服雄黃丹治小兒齁䶎喘滿咳嗽心胸煩悶傷熱觸毒雄黃丹良方雄黃硃砂各一錢令研杏仁十四粒炒巴豆七粒豉淡者二十一粒杏巴豉三味用米醋半盞乾薑一片指大煮令乾研成膏皂角一寸蜜炙焦先去子與皮法制牛膽一分同雄朱與杏膏研令細上和入杏膏麵糊為丸麻子大每服一歲兒五丸壯者七丸三歲十丸淡生薑湯下
