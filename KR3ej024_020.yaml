body:
  text: 卷之二十瘡疹症候方議凡兒所患瘡疹水豆麻子蚊丁火疱等諸家之說或有異同大抵此症出乎五臟肺曰水疱肝曰膿疱心曰血疱脾曰黃疱腎曰黑子小兒不問長幼所出黑子陷者最為惡候或因風吹或由觸毒皮下隱隱出而不透名黑陷子死者多矣良由服藥有誤冷冰其內毒不發出為害甚重凡瘡疹之疾症有多端其欲發出之時或有作熱者不作熱者有驚有掣者有狂燥者有叫哭者有煩躁者有自汗者有譫語者有呵缺者有遁悶者有神昏者有嘔吐者乃緣所發於五臟虛實之不同耳或謂耳鼻腳梢中指冷為之驗者屢究之或中或否今得至要妙訣凡兒作熱有如傷寒候疑惑之間不敢直謂者但者耳後有紅脈赤縷定是瘡疹症候更無可疑若發驚不可下驚藥有熱不可退熱有汗不可止汗或吐不可理吐但順其表溫其中自然而發出或有首尾不可下或曰首尾皆可下衆疑謂之非說愚曰二家所說皆善也且兒氣脈充實宜微下之恐作煩躁若也氣虛直不可下恐瀉易脫如欲利下即用消毒飲子七寶洗心散或四順清涼飲一二服以通為度切不可用真珠丸及有巴粉之類並宜禁之如有熱煩躁與順大連翹飲加紫草茸功效但減黃芩今人才見瘡疹已出未出便與升麻葛根湯其性頗寒只宜少少與服其或不當者蓋用大過反壞其表凡服葛根湯宜加白芍藥糯米人參紫草茸川當歸功效甚良議癥瘕痞癖癥音真又音呈傷食得之痛刺脅肋心胸煩悶飲食不下吐逆噁心久不醫治漸成癥結又曰食結瘕音瑕又音加傷血得之胸膈鬱悶痛引少腹時或攻築上搶心胸雖不阻食肌肉不生久而不治漸成瘕結又曰血結痞音甫又音匕又音婢傷氣得之心腹膨脹肚大脅滿痛刺往來注𤚎左肋面黃肌瘦倦怠無力久而不治漸在痞塊又曰氣塊癖音僻傷積得之其症如腸澼之疾便利無度滑不成糞似痢非痢似蟲非蟲腹肚干痛上築心胸滿悶久而不治頑結不散復結成塊有類痞狀以上四症皆作寒熱有如瘧候一般悉由傷及五臟惟痞癖左脅肋塊其氣結聚男女皆在左脅曰症大同小異凡治寒熱先以梨漿飲進一二服退其寒熱其寒熱已消去三五日後方可與服磨痞丸即日日頻頻與服癥瘕之疾只與三稜丸下去積毒以通為度人參蘿蔔飲治小兒痞癖因食砒藥丸子作渴煩躁頭面浮腫腹肚緊脹喘促坐臥不得肌體羸瘦困乏寒熱尚在宜服人參蘿蔔飲方白朮苦梗甘草炙人參麥門冬子去心上等分為末每服一大錢匕取生蘿蔔汁半盞煎至半候冷與服豆蔻草果飲子治小兒痞氣未解重復取利致之虛乏腹肚㽲痛不思飲食麵目虛浮強食嘔吐宜服此方豆蔻草果飲子良方肉豆蔻一個煨草果檳榔各個綿黃耆槌蜜炙白茯苓白芍藥白朮甘草陳皮各錢半夏曲一錢上㕮咀每服二錢匕生薑三小片烏梅半個棗子一個用藤紙包裹蘸濕煨令香熟去紙用水小小盞煎至半去滓通口空心食前兩滓並煎兼與小沉香煎丸服之功效眼患症候方議凡小兒患眼皆由熱毒得之方藥甚衆惟有斑瘡眼患此疾最為惡候若有是疾皆由兒病不謹口腹或斑瘡方愈便與食毒散熱熱毒入肝腎之間便作腫痛羞明怕日眵淚難開毒者謂其炙爆醃藏油麵白卵黃牛母豬米醋鮭鯗鮓醬雞羊鵝鴨蝦蟹魚鱉腥膻鱔鰻飛禽包氣之屬悉為斯咎及至熱退痛止睛中白翳已生或一隻兩晴隨其輕重得之宜速與療透關散治小兒斑瘡初作眼患痛澀羞明怕日出淚頻多或已覺漸成白翳子宜用神效透關散良方蓽澄茄不拘不少上為細末每以少許吹入鼻中於食後頻數吹之諸症皆可用之大效點明膏治斑瘡眼患只在百日內治之容易久即氣定難以療理大效點明膏良方覆盆根處處有史路傍柱高五七尺者上掘取土中根淨洗搗取粉澄濾令細日乾每用蜜和以少許點白丁上令其自消自散日二三次點用至妙立消膏治小兒眼患初作粟醫浮醫或來或去漸發差大侵睛減明至妙立消膏良方雪白食鹽生研少許須以淨器上以大燈心點鹽輕手指定浮醫就齪凡三五次點見效令子勿驚恐不疼痛亦不礙人多投之勿慮屢用克效生乾地黃湯治小兒疳蝕眼患閉合不開羞明怕日及至開眼有如內障朦朦失所宜服生乾地黃湯方生乾地黃熟乾地黃各乙兩並洗麥門冬子去心半兩川當歸一分枳殼米甘浸一宿麩炒稱一分杏仁湯泡去皮尖麩炒令赤防風甘草炙赤芍藥各一分上㕮咀每服一大錢水小小盞以黑豆七粒煎至黑豆熟去滓通口服小防風湯治小兒熱毒眼患小防風湯方大黃蒸山梔子甘草炙赤芍藥川當歸洗防風羌活上等分㕮咀每服二大錢水小小盞煎至半去滓通口服食後小流氣飲治小兒風毒眼患小流氣飲方蟬蛻去大腳甘草炙羌活天麻川當歸赤芍藥防風大黃腦薄荷杏仁上件等分㕮咀每服大錢水小小盞煎至半去滓通口食後服小菊花膏治小兒積毒眼患小菊花膏良方黃連黃芩大黃菊花羌活蒼朮米泔浸荊芥穗防風上等分為末煉蜜為膏尾指大每服一餅細嚼白湯下總議小兒眼患議曰除疳蝕斑瘡二症外皆由五臟所積熱毒而作又有胎內受氣乘母所食熱毒稍長因毒相觸忽作障瞑不由腫赤熱毒積成其候者此等決定難醫若加寒涼之藥壞害尤甚若赤腫眵淚疼痛醫膜謹謹與忌其熱毒之物清心涼肝順氣行血解熱散毒認症瀉臟常宜用四順清涼飲隨風熱毒所發輕重加藥與服萬一克效不必執殢方藥指症攻療蓋小兒無患氣眼所患即與大人不同至重者謂赤腫等俱作宜與利下即便解散若有瘀血眼胞內外四維腫盛即從鼻中取出敗血立愈既無氣眼不作攀胬雖有赤脈貫睛亦是熱毒所致即不可鉤鐮針割凡當利下並以大黃藥洗心散之屬乃佳治諸病雜方石韋散治小兒熱淋沙淋石淋石韋散方石韋去尾海金沙木通滑石上為末水小盞煎至半通口服桃紅丸治小兒齁䶎咳嗽痰涎壅盛或作喘急桃紅丸良方天南星乙分炮白附子炮川烏炮各分石膏二錢煨地龍乙錢白礬枯乙兩上為末自然薑汁搜丸麻子大硃砂為衣令半紅半白每服三五十丸淡生薑湯下犀角地黃膏天門冬麥門冬各去心白茯苓茯神生地黃各洗稱前胡柴胡人參玄參甘草炙川芎天麻防風羌活上等分為末煆金墨一挺留性煉蜜丸大金箔為衣每服一粒薄荷湯化服丹毒至效散治小兒一切丹毒及龍帶發作至效散方先服消毒飲次用敷之黃丹一兩重朴硝一兩重赤小豆兩頭齊者為末半合上研令勻井水調以雞毛刷立效犀灰散治小兒心經虛熱小便澀痛筒管內疼不可忍者犀灰散良方蠶蛻紙不拘多少上燒留性為末入麝每服半錢匕燈心湯調磁石散治小兒湯火傷磁石散方景德鎮瓷器不拘多少上打碎埋灶內炭火鋪上經一宿取出放地上出火毒碾為末入黃丹水調敷湯火傷處茆根湯治小兒傷寒後有一症忽然鼻中出血五七歲以上至大人亦有此作名紅汗謂不魯解表其汗出血故縱鼻出者自解茆根湯方生地黃汁生蜜酒各小小盞茆根一握搗煎汁如稠糖上共煎取一盞相和溫服小小半盞立效治小兒心肺蘊熱及心血妄行鼻衄出血不止良方上將故藤紙被一片作捻子包麝燒熏入鼻或吹入鼻中又令患人吸呷尤佳故藤紙被至舊亦得或燒納小瓶中留性每服二錢入麝酒調服極妙木舌金絲膏治小兒心脾受熱唇口生瘡仍治慕口唇舌白鵝口舌白重舌舌下硬木舌舌腫硬以上皆繫心脾熱並宜用下項藥敷腳心次服連翹飲子仍與金絲膏刷口內舌上功效吳茱萸不拘多少上為末用釅米醋調塗腳心更以紙貼糊黏敷之立效又有重齶一證於上齶令生一肉如指大小赤腫妨食及吻乳斯由熱極而作速宜下之不爾熱毒流咽喉加其腫塞悶絶而蛻宜服疏風散下之方在前生肌散治小兒腳腫生瘡及諸瘡口不合者生肌散方真地骨皮五倍子甘草各生黃柏炙黃連炒上為細末乾摻瘡上以粗末用沸湯泡蘸洗干處津液調敷大效金絲膏無治小兒口瘡方黃丹一錢生蜜一兩上相和深甌盛甑內蒸令黑為度每用少許雞毛蘸刷口內天南星丸治小兒痰多哮呷喘急咳嗽天南星丸方天南星炮半夏湯洗七次白礬枯各一錢雄黃細研一錢上為末煎熬皂角膏為丸入少許面作糊丸如麻子大每服二三十丸淡生薑湯送下通關散治乳幼被母鼻息吹著兒囟令兒鼻塞不能食乳通關散良方香附子炒三分川芎七分荊芥四分白殭蠶炒三分細辛荃二分豬牙皂角一分上為末取生蔥白去須搗調藥塗囟門上祕敷頭痜瘡方吳茱萸鹽醃者佳如無以口鹽浸一二日上為末釅末醋調刷敷頭上大人肩蛆瘡用之立效茱連丸治小兒夏月暴瀉注下茱連丸方土黃連去須吳茱萸各一兩陳皮半兩去白上為末水煮麵糊為丸如麻子大每服二十丸飲下摩風膏治小兒遍身疥瘙癢摩風膏方苦參歷青蕪荑炒黃蠟各一錢巴豆三粒去殼輕粉五真麻油半兩蠍二立上同油煎至巴焦濾去所煎物入輕粉和勻敷疥功效薑黃散治小兒血淋方薑黃為末上每服半錢用紅酒調下連二三服以通為度小牛黃丸治小兒膈熱痰涎稠盛心神不寧睡不安穩煩躁怔忪四體作熱宜與服之但覺驚風痰熱常服功效乾葛截炒取末一兩甘草炙一錢黃芩去心與浮皮一分防風半兩麝半字山梔子半兩去皮取二上為細末入麝和勻如皂子大煉蜜為丸常服薄荷湯化下四聖湯治二十一症白朮人參白茯苓甘草炙治久吐胃寒加石連子木香黃耆名生胃散治嘔嘔噦噦不止加白扁豆薏苡仁並炒藿香名銀白散治胸膈煩悶冷熱不調痰涎咳嗽不美飲食日夜壯熱加知莊具莊烏梅乾姜名寬中散治腹肚疼痛加陳皮青皮棗子生薑名溫中散治夜啼煩躁腹肚冷痛加沉香硃砂名鎮心虧邪散治表裡虛弱時氣作熱欲傳疹候加細辛栝蔞名惺惺散治脾寒胃熱陰陽不順溫壯常作加滑石地骨皮名六神散治霍亂吐利神不安穩加藿香丁香名藿香散治脾胃虛弱飲食不進加製厚朴陳皮等分名平胃散治吐食不納穀氣加丁香半夏曲名益神散治脾胃久虛不納食頻吐或瀉不止加肉豆蔻青皮天台烏藥名理中散治熱瀉水穀不分加瞿麥車前子名導赤散治虛熱寒躁安神定志加犀角川芎名安神散治心氣不足神情恍惚加石菖蒲石蓮肉石膏名補心散治體熱夜啼煩躁加白附子全蠍膩粉名清神散治脾虛肌瘦神困面無顏色食不克化腸胃久寒吐逆無時加黑附子枳殼吳茱萸麥蘖細辛名溫脾散治霍亂吐逆或腸鳴自利腹肚疼痛加川白姜名人參散治傷寒身熱頭痛煩渴加麻黃乾葛天麻硃砂名解肌散治心神不寧驚悸煩赤瘈癡加硃砂羌活防風天麻名鎮心散治脾胃虛弱腹肚泄利調中進食加訶子陳皮名益黃散治虛積痢腹肚痛裡急頻並加陳皮罌粟殼名調中散以上二十一症所加藥味並有詳載集著其善以顯其功樂哉契聖達理豈可遁諸理天麻散南星半兩水浸春秋五日冬七日夏三日硃砂一兩射香一字每一字杏仁湯調化下人參湯亦可
