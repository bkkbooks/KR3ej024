body:
  text: 卷之十十種症候發端治法略序切聞天地之大惟人之性蓋矣物象之眾惟人之志鑑矣是故人為一物而靈於物氣受一元而妙於元惟智者為能明之然其天地不陷乎人物之根於是人物不迯乎天地之數無情者悉由造化而生有情者皆自交接而養倘諳先王之道君君臣臣父父子子成人人為後達乎上古參同天性順合聖意小人不知其所以愚情反是曷足與語哉嗟乎既為醫工調理幼幼誠為不易須當裁度幼幼稟賦形骸有壯羸怯弱於脈較之涵蓄情性有寬緩暴急於神察之輕清重濁以氣定之冷熱虛實以色推之若也形體不壯神全則未為咎色脈不充氣固則無作恙氣與神而有虧藉乎丸散脈共色以無補宜乎療醫氣壯即脈順脈順即神全神全即色正色正即五臟安和百脈調適矣色脈若不正定即與固其真氣真氣若不和則神不悅神不悅則形體何安觀其脈則知其氣氣若不順則形萎羸察其氣則知其神神若不清則氣濁亂神者五臟之主也氣者一身之權也色者虛實之表也脈者溥變之令也脈之流行不可不察色之變易不可不究神之散漫不可不療氣之盛衰不可不理嬰孩五臟受虛其面白其氣怯其神潰其脈亂其體尫羸五臟受熱其唇紅其氣促其神昏其脈數其體枯槁五臟受實其臉赤其氣壅其神劣其脈浮其體煩躁五臟受冷其準黃其氣泄其神困其脈沉其體嗜臥所由冷熱虛實傳受驚疳積痢凡病按其標則知其本省其絕則起其危後進攻醫但按圖說執滯湯劑不務實效今著是書乃述源流不特贅贅褊求一隅以別之儘性考究以羨補不足益有餘故也即非調絃膠柱緣木求魚之謂歟熟研其議至理自明輒搜難解之意載留斯怢好術之士足知可法以備闊略後世有㚄簡要得無隱藏當與智者鑑議庶彰不朽云耳一急驚風候醫雲陽癇也手足搐搦涎潮大熱醫家下之其所用藥往往利以經粉或水銀巴豆皆有毒等既已蘇省之後精神由尚昏沉未夷貝乳食者或有餘熱其候欲得安痊和平只可用平穩藥調胃氣不可直便與服燥熱藥若與服之其候復作何可怪耶議曰小見驚風之後胃氣多虛不食沉沉默默或瀉尚不止只可助胃生氣須以截風藥移在平胃散或觀音散中謂用全蠍天麻殭蠶白附防風羌活之類生薑棗子同煎自然胃壯瀉止諸風不作雖則驚熱及搐搦皆去其精神未爽不可便謂無事若用補藥助虛乾薑豆蔻硫黃附子之類則熱復來其候又發非病不除醫者妄謬病家無見亦不可不告凡治急驚之候正謂醫療豈可據云調理之說用藥乃在一時之久若也寬緩症候轉加深重醫者既知當下即可量其輕重如病五六分只下三四分許隨通且利熱去痰消則病與症次第徐徐而減瘥若不揣度一概並蕩下之大過傷害臟腑疾傳陰症乃作慢驚風候豈可臨時生胃回陽誠為枉究既是醫工莫不知之矣二慢驚風候醫云陰癇也良由急驚用寒涼之藥太過轉動深重乃傳作慢驚或因吐利不止而成慢驚或因澡浴感風不解而作慢驚或因風食二癇不治而變成慢驚或因咳嗽下痰轉虛而成慢驚因由甚眾概而舉之病家怕驚不怕瀉良醫怕瀉不怕驚其瀉不止則驚風愈盛若與治驚更用寒涼之藥且瀉轉多病加進重矣議曰小兒脾胃虛怯方作吐瀉其症有五有熱吐冷吐虛吐痰吐食吐所言熱吐者謂母飲酒吃肥炙爆醃藏或冒風傷暑致熱兒吻乳入胃遂成熱吐冷吐者謂兒胃冷加以宿冷之物與食即吐虛吐者其兒肌弱神困疳積未消胃堂久虛即吐痰吐者其兒胃氣本虛復感寒邪生痰作熱留滯胸膈故吐食吐者其兒胃弱飲食不節強食傷脾作熱袖困吐後即逆病家但知其吐不明其所以吐且吐兼瀉共作名曰霍亂其吐候又推輕重有五初則乳自流出謂之哯哯之不已即謂之吐吐之不也即作嘔嘔之不已即傳逆逆之不已即作噦於月反自嘔逆噦皆有出聲動氣嘔者口開而作逆者心胸上下氣逆郁築噦者無物可出即膈虛胃寒引氣噦噦作聲此等候惡須更症變即慢脾風熱吐者先去風痰冷吐虛吐與生胃氣痰吐下卻其痰次與正氣食吐宜與塌氣豈可一概理之吐瀉不止脾虛風生眼開慢驚眼合慢脾治之不當更下驚藥死不旋踵豈可得而救療兒分長幼病察虛實有吐瀉三五日發風者有一日半日而發者大抵女孩以吐為急男以瀉為速若氣虛暴瀉暴吐才作便得之惟有疳瀉不成風候水則患無辜症終於虛乏矣但滯腸止瀉為良吐即生胃為正截風之藥加而用之凡驚藥及寒涼之藥切不可用亦不可用大熱藥其候乃屬陰症醫者裁之勿佞為幸三小兒熱症古分十種為總例有驚熱疳熱風熱潮熱傷寒熱瘧熱積熱丹熱瘡疹熱餘毒熱議曰十種熱症病各不同已有觸類而作潮熱者即痞癖熱也類近積熱症先腹肚熱腳冷者是傷寒熱與瘡疹熱亦相類且傷寒有三種皆從表發入里且瘡疹隨五臟所受從里出表故不同根風熱與驚熱亦相近疳熱與餘毒熱類疳有五症瘧有五候皆由脾家陰陽不順若驚熱盛即風熱作丹毒熱有數種皆五臟熱毒所作自上發下曰毒自下發上曰丹總名之曰丹毒各隨輕重人有一種名曰龍帶橫腰過肚上或至胸前相交者重有如火燔其候亦同丹治病後餘毒熱諸症皆有之須適輕重類諸症而調解不可越前病用藥如傷寒後有餘毒熱即於傷寒調理不及而解余皆效之大抵驚熱涼之風熱化之疳熱補之潮熱散之傷寒熱解之瘧熱分之積熱利之丹熱消之瘡疹熱順表之諸症餘熱皆和之此理雖則大概如是言畢竟用之有理乃為醫士善學設有不遵其理者斯可謂之管見之四小兒積症王氏有可治不可治其說已載於家寶議曰古人有言不盡意者非失言也妙用奇功不可得而著乎紙筆之聞且學者初機未可便得純粹廣見多聞性識開通心智自然運出然後可謂之醫者意也此科最為難事積症最為要緊今病家將作尋常醫者不至急切治之若等閒病之有緩速及至傳變方覺困重久務良工信乎野老不虛云耳東漢王氏不言疳與瀉及痢即述症而已所症治未病之病凡小兒有自幼及長不患驚風癇痙癲痙者有之矣未聞無患積症者謂五臟之所積名曰積六腑之所聚名曰聚且小兒只理五臟受病故不有六聚候者何腑屬陽雖有疾不治而自愈且胃屬腑氣生以漸乃脾主食有疾當治之臟屬陰治之充難調治四季有積欲下之理皆可用藥但與究其虛實然後利之既有積氣不能全實量其輕重故古人有挨積磨積消積化積無下積之說是知積之一症不可直便獨下若積虛極先和脾調胃令其充實次與推下若積症二三並作之者可先下而急與調胃藥服之稍用倒置不免為它咎乃計利害所議積症作疾無可與之安和一味當下斯為良法有積不可安養久則為它病矣惟痞癖症先宜定去寒熱寒熱已去方可挨下以通為度下之大過反生重熱雖有重熱即不宜用涼藥乃於調理胃氣藥與治之充宜深究無令得矣
